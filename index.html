// ===================== GESTÃO DE USUÁRIOS (Firestore) =====================
function emailParaKey(email) { if (!email) return ""; return email.toLowerCase().replace(/[^a-z0-9]/g, "_"); }
const db = () => window._db;
const usersCol = () => db().collection("users");
const userDoc = (email) => usersCol().doc(emailParaKey(email));

function getUsuarios() {
  return usersCol().get().then((snap) => snap.docs.map((d) => d.data()).filter((u) => u && u.email));
}

function getUsuario(email) {
  return userDoc(email).get().then((d) => d.exists ? d.data() : null);
}

function getUsuarioByKey(key) {
  return usersCol().doc(key).get().then((d) => d.exists ? d.data() : null);
}

function saveUsuario(data) {
  return userDoc(data.email).set(data);
}

function updateUsuario(email, patch) {
  return userDoc(email).update(patch);
}

function gerarCodigo() { return String(Math.floor(100000 + Math.random() * 900000)); }

function loginUsuario(email, senha) {
  return getUsuario(email).then((u) => {
    if (!u || u.senha !== senha) return { ok: false, erro: "E-mail ou senha incorretos." };
    if (!u.verificado) return { ok: false, erro: "E-mail ainda não verificado.", pendente: true, email: u.email };
    return { ok: true, user: u };
  });
}

function cadastrarUsuario(email, senha, nome) {
  return getUsuario(email).then((existing) => {
    if (existing) return { ok: false, erro: "Este e-mail já está cadastrado." };
    const codigo = gerarCodigo();
    const user = { email: email.toLowerCase(), senha, nome: nome || email.split("@")[0],
      verificado: false, codigo, codigoExpira: Date.now() + 30 * 60 * 1000,
      plano: "Free", criadoEm: new Date().toLocaleDateString("pt-BR") };
    return saveUsuario(user).then(() => ({ ok: true, codigo, email: user.email }));
  });
}

function verificarCodigo(email, codigo) {
  return getUsuario(email).then((u) => {
    if (!u) return { ok: false, erro: "Usuário não encontrado." };
    if (u.verificado) return { ok: true };
    if (Date.now() > u.codigoExpira) return { ok: false, erro: "Código expirado. Cadastre-se novamente." };
    if (u.codigo !== codigo.trim()) return { ok: false, erro: "Código incorreto." };
    return updateUsuario(email, { verificado: true, codigo: null }).then(() => ({ ok: true }));
  });
}

function reenviarCodigo(email) {
  const codigo = gerarCodigo();
  return updateUsuario(email, { codigo, codigoExpira: Date.now() + 30 * 60 * 1000 }).then(() => codigo);
}

function solicitarResetSenha(email) {
  return getUsuario(email).then((u) => {
    if (!u) return null;
    const codigo = gerarCodigo();
    return updateUsuario(email, { codigoReset: codigo, codigoResetExpira: Date.now() + 30 * 60 * 1000 })
      .then(() => ({ codigo, email: u.email }));
  });
}

function confirmarResetSenha(email, codigo, novaSenha) {
  return getUsuario(email).then((u) => {
    if (!u) return { ok: false, erro: "E-mail não encontrado." };
    if (!u.codigoReset || u.codigoReset !== codigo.trim()) return { ok: false, erro: "Código incorreto." };
    if (Date.now() > u.codigoResetExpira) return { ok: false, erro: "Código expirado. Solicite um novo." };
    return updateUsuario(email, { senha: novaSenha, codigoReset: null, codigoResetExpira: null })
      .then(() => ({ ok: true }));
  });
}

// ===================== ERP NO FIRESTORE =====================
const erpDoc = (userKey) => db().collection("erp").doc(userKey);
const ERP_KEYS = ["produtos","insumos","maquinas","orcamentos","pedidos","cond"];

function loadErp(userKey) {
  return erpDoc(userKey).get().then((d) => {
    if (!d.exists) return {};
    const raw = d.data();
    const result = {};
    ERP_KEYS.forEach((k) => {
      if (raw[k] !== undefined) {
        try { result[k] = typeof raw[k] === "string" ? JSON.parse(raw[k]) : raw[k]; }
        catch { /* ignora */ }
      }
    });
    return result;
  });
}

function saveErpField(userKey, field, value) {
  return erpDoc(userKey).set({ [field]: JSON.stringify(value) }, { merge: true }).catch(() => {});
}

function zerarUsuario(userKey) {
  const PFX = `ms3d_${userKey}_`;
  ["produtos","insumos","maquinas","orcamentos","pedidos","cond","plan","version"].forEach((k) => localStorage.removeItem(PFX + k));
  if (window._db) erpDoc(userKey).delete().catch(() => {});
}

// monta o texto do orçamento (compartilhado por WhatsApp e PDF)
function textoOrcamento(o, cond) {
  const linhas = (o.itens || []).map((it) => `• ${it.qtd}x ${it.nome}${it.cor ? " (" + it.cor + ")" : ""} — ${brl(it.preco)} un = ${brl(it.preco * it.qtd)}`);
  const total = (o.itens || []).reduce((a, it) => a + it.preco * it.qtd, 0);
  return { linhas, total };
}
function enviarWhats(o, cond) {
  const { linhas, total } = textoOrcamento(o, cond);
  const empresa = (cond && cond.empresa) || "";
  const partes = [];
  if (empresa) partes.push(`*${empresa}*`);
  partes.push(`*Orçamento ${o.id}*`);
  if (o.cliente) partes.push(`Cliente: ${o.cliente}`);
  partes.push("", ...linhas, "", `*Total: ${brl(total)}*`, "");
  partes.push(`Sinal: ${o.sinal || 0}% para iniciar a produção`);
  partes.push(`Pagamento: ${o.pagamento || ""}`);
  partes.push(`Produção: ${o.prazoProducao || ""}`);
  partes.push(`Entrega: ${o.prazoEntrega || ""}`);
  partes.push(`Validade: ${o.validade || ""}`);
  if (cond && cond.contatoEmpresa) partes.push("", `Contato: ${cond.contatoEmpresa}`);
  const texto = encodeURIComponent(partes.join("\n"));
  const fone = (o.contato || "").replace(/\D/g, "");
  const url = fone ? `https://wa.me/55${fone}?text=${texto}` : `https://wa.me/?text=${texto}`;
  window.open(url, "_blank");
}

function calcular(input, ctx) {
  ctx = ctx || {};
  const insumos = ctx.insumos || [];
  const maquinas = ctx.maquinas || [];

  // ---- 2. MATERIAL ----
  // fonte: 'estoque' (custo médio do TIPO de material no estoque) | 'manual' (custoMaterial)
  let custoMatUn;
  if (input.matFonte === "estoque") {
    custoMatUn = custoMedioMaterial(insumos, input.matTipo);
    if (!custoMatUn) custoMatUn = input.custoMaterial || 0; // fallback se não há esse tipo no estoque
  } else {
    custoMatUn = input.custoMaterial || 0;
  }
  // peso da peça: se cadastrou peso por cor, usa a SOMA dos pesos das cores
  const pesoCores = (input.coresAtivo && input.cores && input.cores.length)
    ? input.cores.reduce((a, c) => a + (Number(c.peso) || 0), 0) : null;
  const pesoPeca = pesoCores != null ? pesoCores : (input.consumo || 0);
  const custoMaterial = custoMatUn * (pesoPeca + (input.perdas || 0));

  // ---- 3. OPERACIONAL (energia + depreciação + manutenção) ----
  // modo: 'maquina' (máquina específica) | 'medio' (média do custo/hora de todas) | 'manual'
  let custoOperacional = 0;
  const h = input.horasImpressao || 0;
  if (input.opMode === "manual") {
    custoOperacional = input.opManual || 0;
  } else if (input.opMode === "maquina" && input.maquinaId && maquinas.find((x) => x.id === input.maquinaId)) {
    const m = maquinas.find((x) => x.id === input.maquinaId);
    custoOperacional = custoHoraMaquina(m) * h;
  } else if (maquinas.length) {
    // médio = média do custo/hora de cada máquina (não soma, não média de parâmetros)
    const mediaCustoHora = avg(maquinas.map((x) => custoHoraMaquina(x)));
    custoOperacional = mediaCustoHora * h;
  }

  // ---- 4. MÃO DE OBRA ----
  // modo: 'tempo' | 'manual' | 'nao'
  let custoMaoObra = 0;
  if (input.moMode === "tempo") {
    const min = (input.setup || 0) + (input.retirada || 0) + (input.acabamento || 0) + (input.embalagemMin || 0);
    custoMaoObra = (min / 60) * (input.moHora || CFG.horaOperacional);
  } else if (input.moMode === "manual") {
    custoMaoObra = input.moManual || 0;
  }

  // ---- 5. ACESSÓRIOS ----
  // lista [{fonte:'estoque'|'manual', insumoId, qtd, custoManual}]
  let custoAcessorios = 0;
  (input.acessorios || []).forEach((a) => {
    if (a.fonte === "estoque" && a.insumoId) {
      const ins = insumos.find((i) => i.id === a.insumoId);
      custoAcessorios += (ins ? ins.custoUn : 0) * (a.qtd || 1);
    } else {
      custoAcessorios += (a.custoManual || 0) * (a.qtd || 1);
    }
  });

  // ---- 6. DESPACHO ----
  // lista [{fonte, insumoId, qtd, custoManual}] + brinde manual
  let custoDespacho = 0;
  (input.despacho || []).forEach((d) => {
    if (d.fonte === "estoque" && d.insumoId) {
      const ins = insumos.find((i) => i.id === d.insumoId);
      custoDespacho += (ins ? ins.custoUn : 0) * (d.qtd || 1);
    } else {
      custoDespacho += (d.custoManual || 0) * (d.qtd || 1);
    }
  });
  const brinde = input.brindeAtivo ? (input.brindeValor || 0) : 0;
  custoDespacho += brinde;

  // ---- CUSTO DE PRODUÇÃO (saída da etapa, independente de canal) ----
  const taxaFalhas = input.taxaFalhas || 0;
  const custoProducao = (custoMaterial + custoOperacional + custoMaoObra + custoAcessorios) * (1 + taxaFalhas);
  const custoLogistico = custoDespacho; // despacho = logística da peça
  const custoTotalPeca = custoProducao + custoLogistico;

  // ---- IMPOSTO (regime selecionado) ----
  const taxaImposto = input.impostoTaxa != null ? input.impostoTaxa : 0.06;
  // toggles: considerar ou não Ads/Marketing e Reserva de segurança
  const usarAds = input.usarAds !== false;
  const usarSeg = input.usarSeg !== false;

  // ---- PREÇOS POR CANAL ----
  const canaisAtivos = (input.canaisCustom && input.canaisCustom.length) ? input.canaisCustom : CANAIS;
  const lucroAlvoModo = input.lucroAlvoModo || "rs";
  const lucroAlvoRS = lucroAlvoModo === "rs" ? (input.lucroAlvoValor != null ? input.lucroAlvoValor : CFG.lucroAlvoRS) : 0;
  const lucroAlvoPct = lucroAlvoModo === "pct" ? (input.lucroAlvoValor || 0.15) : 0;
  const cenarios = canaisAtivos.map((c) => precoDoCanal(custoTotalPeca, c, taxaImposto, usarAds, usarSeg, lucroAlvoRS, lucroAlvoPct, lucroAlvoModo));
  const canalRef = input.canalRef || "Mercado Livre";
  const ref = cenarios.find((x) => x.nome === canalRef) || cenarios[0];
  const canal = canaisAtivos.find((c) => c.nome === canalRef) || canaisAtivos[1] || canaisAtivos[0];
  const totalPct = ref.totalPct, baseMaisTarifa = ref.baseMaisTarifa;
  const precoMinimo = ref.precoMinimo, precoSaudavel = ref.precoSaudavel, precoPremium = ref.precoPremium;
  const adsPct = usarAds ? canal.ads : 0;
  const segPct = usarSeg ? canal.seg : 0;

  // preço que será praticado (definido pelo usuário no resumo)
  const precoPraticado = input.precoPraticado || precoSaudavel;
  const lucroPraticado = precoPraticado - baseMaisTarifa - precoPraticado * totalPct;
  const margemAtual = precoPraticado ? lucroPraticado / precoPraticado : 0;
  let status = "Inviável";
  if (precoPraticado >= precoSaudavel) status = "Saudável";
  else if (precoPraticado >= precoMinimo) status = "Apertado";

  // ---- DISTRIBUIÇÃO DO PREÇO PRATICADO (anatomia do preço) ----
  const distrib = {
    custoProducaoPeca: custoProducao,
    despacho: custoLogistico,
    tarifaFixa: canal.tarifa + canal.frete,
    comissao: precoPraticado * canal.comissao,
    pagamento: precoPraticado * canal.pgto,
    ads: precoPraticado * adsPct,
    imposto: precoPraticado * taxaImposto,
    seguranca: precoPraticado * segPct,
    lucro: lucroPraticado,
    usarAds, usarSeg,
  };

  // ROAS (sobre o canal de referência, no preço praticado)
  const pctSemAds = canal.comissao + canal.pgto + taxaImposto + segPct;
  const custoSemAdsRS = baseMaisTarifa + precoPraticado * pctSemAds;
  const margemAntesAds = (precoPraticado - custoSemAdsRS) / precoPraticado;
  const acosMax = Math.max(0, margemAntesAds - CFG.lucroLiquidoAds);
  const roasMeta = acosMax > 0 ? 1 / acosMax : 0;
  const investMaxVenda = precoPraticado * acosMax;

  return { canal, canalRef, cenarios, taxaImposto, usarAds, usarSeg, distrib, custoMatUn, pesoPeca, custoMaterial, custoOperacional, custoMaoObra, custoAcessorios, custoDespacho, brinde,
    custoProducao, custoLogistico, custoTotalPeca, totalPct, baseMaisTarifa,
    precoMinimo, precoSaudavel, precoPremium, precoPraticado, lucroPraticado, lucroAtual: lucroPraticado, margemAtual, status,
    margemAntesAds, acosMax, roasMeta, investMaxVenda,
    custoEnergia: custoOperacional, custoMaquinaPeca: 0 };
}
function precoDoCanal(custoTotalPeca, c, taxaImposto, usarAds, usarSeg, lucroAlvoRS, lucroAlvoPct, lucroAlvoModo) {
  const ads = usarAds === false ? 0 : c.ads;
  const seg = usarSeg === false ? 0 : c.seg;
  const totalPct = c.comissao + c.pgto + ads + (taxaImposto || 0) + seg;
  const baseMaisTarifa = custoTotalPeca + c.frete + c.tarifa;
  const precoMinimo = baseMaisTarifa / (1 - totalPct);
  let precoSaudavel;
  if (lucroAlvoModo === "pct" && lucroAlvoPct > 0) {
    // preço tal que lucro/preço = lucroAlvoPct
    const denom = 1 - totalPct - lucroAlvoPct;
    precoSaudavel = denom > 0 ? baseMaisTarifa / denom : precoMinimo * 1.5;
  } else {
    precoSaudavel = (baseMaisTarifa + (lucroAlvoRS != null ? lucroAlvoRS : CFG.lucroAlvoRS)) / (1 - totalPct);
  }
  const precoPremium = precoSaudavel * (1 + CFG.markupPremium);
  return { nome: c.nome, totalPct, baseMaisTarifa, precoMinimo, precoSaudavel, precoPremium };
}
// custo médio por TIPO de material (PLA, PETG...), ponderado por estoque
function custoMedioMaterial(insumos, tipo) {
  const itens = insumos.filter((i) => i.material === tipo && (i.cat === "Filamento" || i.cat === "Resina"));
  if (!itens.length) return 0;
  const totalQtd = itens.reduce((a, i) => a + (i.estoque || 0), 0);
  if (totalQtd > 0) return itens.reduce((a, i) => a + i.custoUn * (i.estoque || 0), 0) / totalQtd;
  return avg(itens.map((i) => i.custoUn)); // sem estoque: média simples
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }
// custo/hora de uma máquina = energia + depreciação + manutenção
function custoHoraMaquina(m) {
  if (!m) return 0;
  return (m.potenciaKw || 0) * (m.tarifaEnergia || 0) + (m.valor || 0) / (m.vidaUtilH || 1) + (m.manutHora || 0);
}

function App({ userKey = "default", onLogout }) {
  // ===================== ESTADO GLOBAL (persistido) =====================
  const STORAGE_VERSION = "10";
  const PFX = `ms3d_${userKey}_`;
  React.useEffect(() => {
    const v = localStorage.getItem(PFX + "version");
    if (v !== STORAGE_VERSION) {
      ["produtos", "insumos", "maquinas", "orcamentos", "pedidos", "cond"].forEach((k) => localStorage.removeItem(PFX + k));
      localStorage.setItem(PFX + "version", STORAGE_VERSION);
    }
  }, []);
  const LS = (k, def) => {
    try {
      if (localStorage.getItem(PFX + "version") !== STORAGE_VERSION) return def;
      const v = localStorage.getItem(PFX + k); return v ? JSON.parse(v) : def;
    } catch { return def; }
  };
  const save = (k, v) => { try { localStorage.setItem(PFX + k, JSON.stringify(v)); } catch {} };
  const resetDados = () => {
    ["produtos","insumos","maquinas","orcamentos","pedidos","cond"].forEach((k) => localStorage.removeItem(PFX + k));
    erpDoc(userKey).delete().catch(() => {});
    setProdutos(PRODUTOS_SEED); setInsumos(INSUMOS_SEED); setMaquinas(MAQUINAS_SEED); setOrcamentos(ORC_SEED); setPedidos(PEDIDOS_SEED); setCond(COND_SEED);
  };

  const [tab, setTab] = React.useState("dashboard");
  const [plan, setPlan] = React.useState(LS("plan", "Free"));
  const [adminMode, setAdminMode] = React.useState(false);
  const [nomeUsuario, setNomeUsuario] = React.useState("");
  React.useEffect(() => {
    getUsuarioByKey(userKey).then((u) => {
      if (!u) return;
      if (u.plano && u.plano !== plan) setPlan(u.plano);
      setAdminMode(isAdmin(u.email));
      if (u.nome) setNomeUsuario(u.nome);
    });
  }, [userKey]);
  const acessos = PLAN_ACCESS[plan] || PLAN_ACCESS["Free"];
  const canAccess = (tabId) => tabId === "admin" ? adminMode : acessos.includes(tabId);
  const [showPlans, setShowPlans] = React.useState(false);

  const [produtos, setProdutos] = React.useState(() => LS("produtos", PRODUTOS_SEED));
  const [insumos, setInsumos] = React.useState(() => LS("insumos", INSUMOS_SEED));
  const [maquinas, setMaquinas] = React.useState(() => LS("maquinas", MAQUINAS_SEED));
  const [orcamentos, setOrcamentos] = React.useState(() => LS("orcamentos", ORC_SEED));
  const [pedidos, setPedidos] = React.useState(() => LS("pedidos", PEDIDOS_SEED));
  const [cond, setCond] = React.useState(() => LS("cond", COND_SEED));
  const erpReady = React.useRef(false);

  // Carrega dados do Firestore ao logar
  React.useEffect(() => {
    erpReady.current = false;
    loadErp(userKey).then((data) => {
      if (data.produtos !== undefined) setProdutos(data.produtos);
      if (data.insumos !== undefined) setInsumos(data.insumos);
      if (data.maquinas !== undefined) setMaquinas(data.maquinas);
      if (data.orcamentos !== undefined) setOrcamentos(data.orcamentos);
      if (data.pedidos !== undefined) setPedidos(data.pedidos);
      if (data.cond !== undefined) setCond(data.cond);
    }).finally(() => { erpReady.current = true; });
  }, [userKey]);

  React.useEffect(() => {
    save("plan", plan);
    getUsuarioByKey(userKey).then((u) => { if (u) updateUsuario(u.email, { plano: plan }); });
  }, [plan]);
  React.useEffect(() => { save("produtos", produtos); if (erpReady.current) saveErpField(userKey, "produtos", produtos); }, [produtos]);
  React.useEffect(() => { save("insumos", insumos); if (erpReady.current) saveErpField(userKey, "insumos", insumos); }, [insumos]);
  React.useEffect(() => { save("maquinas", maquinas); if (erpReady.current) saveErpField(userKey, "maquinas", maquinas); }, [maquinas]);
  React.useEffect(() => { save("orcamentos", orcamentos); if (erpReady.current) saveErpField(userKey, "orcamentos", orcamentos); }, [orcamentos]);
  React.useEffect(() => { save("cond", cond); if (erpReady.current) saveErpField(userKey, "cond", cond); }, [cond]);
  React.useEffect(() => { save("pedidos", pedidos); if (erpReady.current) saveErpField(userKey, "pedidos", pedidos); }, [pedidos]);

  // ===================== CALCULADORA (estado de trabalho) =====================
  const [input, setInput] = React.useState({
    // 1. Identificação (só descrição — SKU é gerado no catálogo)
    nome: "Suporte de headset 3D",
    taxaFalhas: 0.08, horasImpressao: 7,
    // 2. Material (custo médio por TIPO no estoque, ou manual)
    matFonte: "estoque", matTipo: "PLA", custoMaterial: 0.10, consumo: 80, perdas: 10,
    coresAtivo: false, cores: [],
    // 3. Operacional
    opMode: "maquina", maquinaId: "MAQ-1", opManual: 0,
    // 4. Mão de obra
    moMode: "tempo", moHora: 25, setup: 5, retirada: 5, acabamento: 12, embalagemMin: 6, moManual: 0,
    // 5. Acessórios
    acessorios: [],
    // 6. Despacho
    despacho: [{ fonte: "estoque", insumoId: "EMB-CAIXA-P", qtd: 1, custoManual: 0 }],
    brindeAtivo: true, brindeValor: 1,
    // preço (definido no resumo)
    canalRef: "Mercado Livre", precoPraticado: 0,
    impostoRegime: "Simples Nacional", impostoTaxa: 0.06,
    usarAds: true, usarSeg: true,
    // lucro alvo
    lucroAlvoModo: "rs", lucroAlvoValor: 15,
    // canais customizados
    canaisCustom: null, showCanaisConfig: false,
    // kits
    kitQtd: 3, kitDesconto: 0.08, kitEmbExtra: 1.75, kitBrindeExtra: 1,
  });
  const set = (k, v) => setInput((s) => ({ ...s, [k]: v }));
  const r = React.useMemo(() => calcular(input, { insumos, maquinas }), [input, insumos, maquinas]);

  const kit = React.useMemo(() => {
    const precoKit = r.precoSaudavel * input.kitQtd * (1 - input.kitDesconto);
    const custoProdKit = r.custoProducao * input.kitQtd;
    const custoLogKit = r.custoLogistico + input.kitEmbExtra + input.kitBrindeExtra;
    const lucroUnit = r.precoSaudavel - r.custoProducao - r.custoLogistico - r.canal.tarifa - r.precoSaudavel * r.totalPct;
    const lucroKit = precoKit - custoProdKit - custoLogKit - r.canal.tarifa - precoKit * r.totalPct;
    return { precoKit, lucroUnit, lucroKit, lucroKitUnit: lucroKit / input.kitQtd,
      margemUnit: lucroUnit / r.precoSaudavel, margemKit: lucroKit / precoKit };
  }, [r, input]);

  // ===================== AÇÕES DO FLUXO =====================
  // gera SKU automático a partir da descrição + sequencial
  const gerarSku = (nome) => {
    const base = (nome || "PROD").normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .toUpperCase().replace(/[^A-Z0-9 ]/g, "").trim().split(/\s+/).slice(0, 2)
      .map((w) => w.slice(0, 4)).join("-") || "PROD";
    let n = 1, sku;
    do { sku = `${base}-${String(n).padStart(3, "0")}`; n++; } while (produtos.some((p) => p.sku === sku));
    return sku;
  };

  // 2) Cadastrar produto precificado no catálogo (SKU gerado aqui)
  const salvarNoCatalogo = () => {
    // insumo do material: casa pelo tipo (primeiro insumo daquele material)
    let insumoId = null;
    const doTipo = insumos.find((i) => i.material === input.matTipo && (i.cat === "Filamento" || i.cat === "Resina"));
    if (doTipo) insumoId = doTipo.id;
    const novo = {
      sku: gerarSku(input.nome),
      nome: input.nome, canal: r.canalRef,
      custo: round2(r.custoTotalPeca),
      precoMin: round2(r.precoMinimo), precoSaudavel: round2(r.precoSaudavel), precoPremium: round2(r.precoPremium),
      precoPraticado: round2(r.precoPraticado),
      margem: round2(r.margemAtual * 100), estoquePronto: 0, horasImpressao: input.horasImpressao,
      insumoId, consumoUn: round2((r.pesoPeca || 0) + (input.perdas || 0)),
      matTipo: input.matTipo, custoMatUn: round2(r.custoMatUn * 1000) / 1000,
      cores: input.coresAtivo ? (input.cores || []).filter((c) => c.cor) : [],
      impostoTaxa: r.taxaImposto, usarAds: r.usarAds, usarSeg: r.usarSeg,
    };
    setProdutos((p) => [...p, novo]);
    setTab("catalogo");
  };

  // 3) Gerar orçamento (da calculadora) — começa com 1 item, editável depois
  const gerarOrcamento = () => {
    const orc = {
      id: "ORC-" + (1000 + orcamentos.length + 1), cliente: "Novo cliente", contato: "",
      itens: [{ sku: gerarSku(input.nome), nome: input.nome, qtd: 1, cor: (input.coresAtivo && input.cores[0]) ? input.cores[0].cor : "", preco: round2(r.precoPraticado) }],
      total: round2(r.precoPraticado), status: "Rascunho", data: hoje(),
      sinal: cond.sinal, prazoProducao: cond.prazoProducao, prazoEntrega: cond.prazoEntrega, validade: cond.validade, pagamento: cond.pagamento,
    };
    setOrcamentos((o) => [orc, ...o]);
    setTab("orcamentos");
  };

  // monta um item de pedido com gate individual
  const montarItem = (it) => {
    const prod = produtos.find((p) => p.sku === it.sku);
    const qtd = it.qtd || 1;
    const temPronto = prod && prod.estoquePronto >= qtd;
    const insumoId = prod ? prod.insumoId : null;
    const insumo = insumoId ? insumos.find((i) => i.id === insumoId) : null;
    const necessario = prod ? (prod.consumoUn || 0) * qtd : 0;
    const temInsumo = !insumo || insumo.estoque >= necessario;
    return { sku: it.sku, produto: it.produto || (prod ? prod.nome : it.nome), qtd, cor: it.cor || "",
      preco: it.preco || (prod ? (prod.precoPraticado || prod.precoSaudavel) : 0),
      insumoId, necessario, temPronto, temInsumo };
  };
  // etapa do pedido a partir dos itens (agregado)
  const etapaDosItens = (itens) => {
    if (itens.every((i) => i.temPronto)) return "Embalar";
    if (itens.some((i) => !i.temPronto && !i.temInsumo)) return "Aguardando insumo";
    return "Produzir";
  };

  // 4) Orçamento aprovado vira pedido (com todos os itens)
  const aprovarOrcamento = (orc) => {
    setOrcamentos((o) => o.map((x) => x.id === orc.id ? { ...x, status: "Aprovado" } : x));
    criarPedido({ cliente: orc.cliente, canal: "Venda direta", origem: "Orçamento " + orc.id,
      itens: orc.itens.map((it) => ({ sku: it.sku, produto: it.nome, qtd: it.qtd, cor: it.cor, preco: it.preco })) });
  };

  // 4/5) Criar pedido (multi-itens) + gate de estoque por item
  const criarPedido = (base) => {
    // aceita {itens:[...]} ou item único {sku,qtd,...}
    const brutos = base.itens && base.itens.length ? base.itens : [{ sku: base.sku, produto: base.produto, qtd: base.qtd, cor: base.cor, preco: base.preco }];
    const itens = brutos.map(montarItem);
    const etapa = etapaDosItens(itens);
    const ped = {
      id: "P-" + String(pedidos.length + 1).padStart(4, "0"),
      cliente: base.cliente || "Cliente", canal: base.canal, origem: base.origem || base.canal,
      prioridade: base.prioridade || "Normal", etapa, data: hoje(),
      itens: itens.map(({ temPronto, temInsumo, ...keep }) => keep),
    };
    // baixa produto pronto dos itens que tinham estoque
    itens.filter((i) => i.temPronto).forEach((i) => {
      setProdutos((ps) => ps.map((p) => p.sku === i.sku ? { ...p, estoquePronto: p.estoquePronto - i.qtd } : p));
    });
    setPedidos((q) => [ped, ...q]);
    setTab("pedidos");
  };

  // Avançar etapa: Aguardando insumo -> Produzir -> (baixa insumos) -> Embalar -> Despachado
  const avancar = (id) => {
    setPedidos((q) => q.map((p) => {
      if (p.id !== id) return p;
      if (p.etapa === "Aguardando insumo") {
        // revalida todos os itens contra o estoque atual
        const ok = p.itens.every((it) => {
          if (!it.insumoId) return true;
          const ins = insumos.find((x) => x.id === it.insumoId);
          return !ins || ins.estoque >= it.necessario;
        });
        return ok ? { ...p, etapa: "Produzir" } : p;
      }
      if (p.etapa === "Produzir") {
        // baixa o insumo de cada item
        p.itens.forEach((it) => {
          if (it.insumoId && it.necessario) {
            setInsumos((arr) => arr.map((i) => i.id === it.insumoId ? { ...i, estoque: Math.max(0, i.estoque - it.necessario) } : i));
          }
        });
        return { ...p, etapa: "Embalar" };
      }
      if (p.etapa === "Embalar") return { ...p, etapa: "Despachado", data: hoje() };
      return p;
    }));
  };

  const TABS = [
    { id: "dashboard", label: "Dashboard", icon: "▦" },
    { sep: "OPERAÇÃO" },
    { id: "calc", label: "1 · Precificar", icon: "₿" },
    { id: "catalogo", label: "2 · Catálogo", icon: "▤" },
    { id: "orcamentos", label: "3 · Orçamentos", icon: "✎" },
    { id: "pedidos", label: "4 · Pedidos", icon: "⊞" },
    { id: "estoque", label: "Insumos", icon: "⬡" },
    { id: "maquinas", label: "Máquinas", icon: "🖨" },
    { id: "producao", label: "Produção", icon: "⚙" },
    { sep: "ANÁLISE" },
    { id: "roas", label: "ROAS", icon: "📣" },
    { id: "kits", label: "Kitficação", icon: "▣" },
    { id: "academia", label: "Academia", icon: "🎓" },
    ...(adminMode ? [{ sep: "ADMIN" }, { id: "admin", label: "Painel Admin", icon: "🛡" }] : []),
  ];

  // métricas de fluxo p/ badges e dashboard
  const fila = {
    aguardando: pedidos.filter((p) => p.etapa === "Aguardando insumo"),
    produzir: pedidos.filter((p) => p.etapa === "Produzir"),
    embalar: pedidos.filter((p) => p.etapa === "Embalar"),
    despachado: pedidos.filter((p) => p.etapa === "Despachado"),
  };
  const itensBaixos = insumos.filter((i) => i.estoque <= i.min).length;

  return (
    <div className="shell" style={{ background: C.bg, minHeight: "100vh", color: C.ink, fontFamily: "'DM Sans',system-ui,sans-serif", display: "flex" }}>
      <Estilos />
      {/* Sidebar */}
      <aside className="sidebar" style={{ width: 222, borderRight: `1px solid ${C.line}`, padding: "18px 12px", position: "sticky", top: 0, height: "100vh", flexShrink: 0, overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 6px 18px" }}>
          <div style={{ width: 32, height: 32, borderRadius: 9, background: `linear-gradient(135deg,${C.accent},#ff9466)`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#1a1207" }}>M</div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 15, lineHeight: 1 }}>Margem<br />Segura <span style={{ color: C.accent }}>3D</span></div>
        </div>
        {TABS.map((t, idx) => {
          if (t.sep) return <div key={idx} className="navsep" style={{ fontSize: 10, color: C.sub, fontWeight: 700, letterSpacing: 1.2, padding: "14px 12px 6px" }}>{t.sep}</div>;
          const locked = !canAccess(t.id);
          let badge = 0;
          if (!locked && t.id === "pedidos") badge = fila.aguardando.length + fila.produzir.length + fila.embalar.length;
          if (!locked && t.id === "estoque") badge = itensBaixos;
          return (
            <NavBtn key={t.id} t={t} active={tab === t.id} locked={locked}
              onClick={() => locked ? setShowPlans(true) : setTab(t.id)}
              badge={badge} badgeColor={t.id === "estoque" ? C.bad : C.accent}
            />
          );
        })}
        <button onClick={() => setShowPlans(true)} style={{ width: "calc(100% - 0px)", marginTop: 16, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 12, cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}>
          <div style={{ fontSize: 11, color: C.sub }}>Plano atual</div>
          <div style={{ fontWeight: 700, color: C.accent, fontFamily: "Sora" }}>{plan} <span style={{ fontSize: 11, color: C.sub, fontWeight: 400 }}>· gerenciar</span></div>
        </button>
        <div style={{ marginTop: 10, padding: "8px 12px", background: C.panel2, border: `1px solid ${adminMode ? C.accent : C.line}`, borderRadius: 10, fontSize: 11, color: C.sub }}>
          {adminMode && <div style={{ fontSize: 10, fontWeight: 800, color: C.accent, marginBottom: 3, letterSpacing: 1 }}>🛡 ADMINISTRADOR</div>}
          <div style={{ fontWeight: 700, color: C.ink, fontSize: 13 }}>👤 {nomeUsuario || userKey}</div>
        </div>
        {onLogout && (
          <button onClick={() => { if (confirm("Sair da conta? Seus dados ficam salvos.")) onLogout(); }}
            style={{ width: "100%", marginTop: 6, background: "transparent", border: `1px solid ${C.line}`, borderRadius: 10, padding: "9px 12px", cursor: "pointer", textAlign: "left", fontFamily: "inherit", color: C.sub, fontSize: 13, fontWeight: 600 }}>
            ⎋ Sair da conta
          </button>
        )}
      </aside>

      <main className="main" style={{ flex: 1, padding: "24px 28px", maxWidth: 1150, minWidth: 0 }}>
        {tab === "dashboard" && <Dashboard pedidos={pedidos} fila={fila} produtos={produtos} insumos={insumos} itensBaixos={itensBaixos} go={setTab} />}
        {tab === "calc" && <Calculadora input={input} set={set} setInput={setInput} r={r} insumos={insumos} maquinas={maquinas} salvarNoCatalogo={salvarNoCatalogo} gerarOrcamento={gerarOrcamento} go={setTab} />}
        {tab === "catalogo" && <Catalogo produtos={produtos} setProdutos={setProdutos} criarPedido={criarPedido} setInput={setInput} go={setTab} insumos={insumos} />}
        {tab === "orcamentos" && <Orcamentos orcamentos={orcamentos} setOrcamentos={setOrcamentos} aprovar={aprovarOrcamento} produtos={produtos} cond={cond} setCond={setCond} />}
        {tab === "pedidos" && <Pedidos pedidos={pedidos} fila={fila} avancar={avancar} produtos={produtos} criarPedido={criarPedido} />}
        {tab === "estoque" && <Insumos insumos={insumos} setInsumos={setInsumos} />}
        {tab === "maquinas" && <Maquinas maquinas={maquinas} setMaquinas={setMaquinas} />}
        {tab === "producao" && <Producao maquinas={maquinas} produtos={produtos} fila={fila} go={setTab} />}
        {tab === "roas" && <Roas r={r} />}
        {tab === "kits" && <Kits input={input} set={set} r={r} kit={kit} />}
        {tab === "academia" && <Academia go={setTab} plan={plan} />}
        {tab === "admin" && adminMode && <AdminPanel />}
      </main>

      {showPlans && <PlansModal plan={plan} setPlan={setPlan} close={() => setShowPlans(false)} resetDados={resetDados} userKey={userKey} onLogout={onLogout} />}
    </div>
  );
}

// ---------- DASHBOARD (centro de controle) ----------
function Dashboard({ pedidos, fila, produtos, insumos, itensBaixos, go }) {
  const vendas = pedidos.filter((p) => p.etapa === "Despachado");
  const totalPed = (p) => (p.itens || []).reduce((a, it) => a + it.preco * it.qtd, 0);
  const receita = vendas.reduce((a, p) => a + totalPed(p), 0);
  const margemMedia = produtos.length ? produtos.reduce((a, p) => a + (p.margem || 0), 0) / produtos.length : 0;
  const valorEstoque = insumos.reduce((a, i) => a + i.estoque * i.custoUn, 0);
  // sugestões inteligentes
  const sugestoes = [];
  if (fila.aguardando.length) sugestoes.push({ t: `${fila.aguardando.length} pedido(s) parados por falta de insumo — repor já`, go: "estoque", c: C.bad });
  if (fila.produzir.length) sugestoes.push({ t: `${fila.produzir.length} pedido(s) aguardando produção`, go: "pedidos", c: C.warn });
  if (fila.embalar.length) sugestoes.push({ t: `${fila.embalar.length} pedido(s) prontos para embalar`, go: "pedidos", c: C.accent2 });
  if (itensBaixos) sugestoes.push({ t: `${itensBaixos} insumo(s) abaixo do mínimo — repor`, go: "estoque", c: C.bad });
  const semMargem = produtos.filter((p) => (p.margem || 0) < 15);
  if (semMargem.length) sugestoes.push({ t: `${semMargem.length} produto(s) com margem < 15% — revisar preço`, go: "catalogo", c: C.warn });
  if (!sugestoes.length) sugestoes.push({ t: "Operação saudável — tudo em dia ✓", go: "dashboard", c: C.good });

  return (
    <div>
      <H title="Dashboard" sub="Centro de controle da operação" />
      <div className="grid-kpi" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 18 }}>
        <KPI label="Receita despachada" value={brl(receita)} c={C.good} />
        <KPI label="Margem média catálogo" value={pct(margemMedia / 100)} c={margemMedia < 15 ? C.warn : C.accent} onClick={() => go("catalogo")} />
        <KPI label="Na produção" value={`${fila.produzir.length}`} c={C.warn} onClick={() => go("pedidos")} />
        <KPI label="Para embalar" value={`${fila.embalar.length}`} c={C.accent2} onClick={() => go("pedidos")} />
      </div>
      <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 14 }}>
        <Card title="Esteira de pedidos">
          <Esteira fila={fila} />
          <div style={{ marginTop: 14 }}>
            {pedidos.slice(0, 5).map((p) => (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.line}` }}>
                <div><div style={{ fontWeight: 600, fontSize: 13 }}>{p.id} · {(p.itens || []).length} item(ns) · {brl(totalPed(p))}</div>
                  <div style={{ fontSize: 11, color: C.sub }}>{p.cliente} · {p.origem}</div></div>
                <EtapaTag e={p.etapa} />
              </div>
            ))}
          </div>
        </Card>
        <Card title="Sugestões da operação">
          {sugestoes.map((s, i) => (
            <div key={i} onClick={() => go(s.go)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", marginBottom: 8, background: C.panel2, borderRadius: 10, cursor: "pointer", borderLeft: `3px solid ${s.c}` }}>
              <span style={{ fontSize: 13 }}>{s.t}</span>
            </div>
          ))}
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}`, fontSize: 12, color: C.sub }}>
            Valor em estoque de insumos: <b style={{ color: C.ink }}>{brl(valorEstoque)}</b>
          </div>
        </Card>
      </div>
    </div>
  );
}

function Esteira({ fila }) {
  const etapas = [
    { k: "Aguardando", n: fila.aguardando.length, c: C.bad },
    { k: "Produzir", n: fila.produzir.length, c: C.warn },
    { k: "Embalar", n: fila.embalar.length, c: C.accent2 },
    { k: "Despachado", n: fila.despachado.length, c: C.good },
  ];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      {etapas.map((e, i) => (
        <React.Fragment key={e.k}>
          <div style={{ flex: 1, background: C.panel2, borderRadius: 10, padding: "12px 10px", textAlign: "center", borderTop: `3px solid ${e.c}` }}>
            <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: e.c }}>{e.n}</div>
            <div style={{ fontSize: 11, color: C.sub }}>{e.k}</div>
          </div>
          {i < etapas.length - 1 && <span style={{ color: C.sub, fontSize: 16 }}>→</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ---------- 1 · PRECIFICAR (wizard de 6 etapas) ----------
function Calculadora({ input, set, setInput, r, insumos, maquinas, salvarNoCatalogo, gerarOrcamento, go }) {
  const [etapa, setEtapa] = React.useState(0);
  const statusColor = r.status === "Saudável" ? C.good : r.status === "Apertado" ? C.warn : C.bad;
  const passos = ["Identificação", "Material", "Operacional", "Mão de obra", "Acessórios", "Despacho", "Resumo"];
  const acessInsumo = insumos.filter((i) => i.cat === "Acessório");
  const embInsumo = insumos.filter((i) => i.cat === "Embalagem");
  // cores disponíveis no estoque para o tipo de material selecionado
  const coresMaterial = insumos.filter((i) => (i.cat === "Filamento" || i.cat === "Resina") && i.material === input.matTipo && i.cor);

  // helpers de lista (acessórios / despacho)
  const addItem = (campo, item) => setInput((s) => ({ ...s, [campo]: [...(s[campo] || []), item] }));
  const updItem = (campo, idx, patch) => setInput((s) => ({ ...s, [campo]: s[campo].map((x, i) => i === idx ? { ...x, ...patch } : x) }));
  const delItem = (campo, idx) => setInput((s) => ({ ...s, [campo]: s[campo].filter((_, i) => i !== idx) }));

  return (
    <div>
      <H title="1 · Precificar produto" sub="Monte o custo de produção passo a passo" />
      {/* progresso */}
      <div style={{ display: "flex", gap: 4, marginBottom: 18, flexWrap: "wrap" }}>
        {passos.map((p, i) => (
          <button key={p} onClick={() => setEtapa(i)} style={{ flex: 1, minWidth: 90, background: i === etapa ? C.accent : i < etapa ? C.panel2 : C.panel,
            color: i === etapa ? "#1a1207" : i < etapa ? C.ink : C.sub, border: `1px solid ${i === etapa ? C.accent : C.line}`,
            borderRadius: 8, padding: "8px 6px", fontSize: 11.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {i < 6 ? `${i + 1}. ` : ""}{p}
          </button>
        ))}
      </div>

      <div className="grid-wizard" style={{ display: "grid", gridTemplateColumns: "1.15fr 0.85fr", gap: 18 }}>
        <Card>
          {/* ---- 1 IDENTIFICAÇÃO ---- */}
          {etapa === 0 && (<>
            <ST n="1" t="Identificação do produto" />
            <F label="Descrição do produto" text value={input.nome} onChange={(v) => set("nome", v)} />
            <Hint>O SKU é gerado automaticamente quando você salvar no catálogo (a partir da descrição). O canal de venda e o preço são definidos no resumo, ao final.</Hint>
          </>)}

          {/* ---- 2 MATERIAL ---- */}
          {etapa === 1 && (<>
            <ST n="2" t="Custo de material" />
            <Sel label="Tipo de material" value={input.matTipo} onChange={(v) => {
              const m = MATERIAIS.find((x) => x.tipo === v);
              set("matTipo", v); if (m && input.matFonte !== "estoque") set("custoMaterial", m.refUn);
            }} options={MATERIAIS.map((m) => m.tipo)} />
            <Fonte value={input.matFonte} onChange={(v) => set("matFonte", v)}
              opcoes={[["estoque", "Custo médio do estoque"], ["manual", "Informar custo manual"]]} />
            {input.matFonte === "estoque" ? (
              <div style={{ padding: "10px 12px", borderRadius: 10, background: C.panel2, marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: C.sub }}>Custo médio de {input.matTipo} no estoque</div>
                <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: C.accent }}>{brl(r.custoMatUn)} <span style={{ fontSize: 12, color: C.sub, fontWeight: 400 }}>/ g</span></div>
                <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>Média ponderada por estoque de todas as cores/variações de {input.matTipo}.</div>
              </div>
            ) : (
              <F label="Custo por grama (R$/g)" value={input.custoMaterial} step={0.001} onChange={(v) => set("custoMaterial", v)} suffix="R$" />
            )}
            <Row>
              <F label={input.coresAtivo ? "Peso total (soma das cores)" : "Peso da peça (g)"} value={input.coresAtivo ? round2(r.pesoPeca) : input.consumo}
                onChange={(v) => set("consumo", v)} />
              <F label="Perdas/suporte (g)" value={input.perdas} onChange={(v) => set("perdas", v)} />
            </Row>
            <Hint>Custo de material = (peso + perdas) × custo por grama. Atual: <b>{brl(r.custoMaterial)}</b></Hint>

            <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 10, background: C.panel2 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 14 }}>
                <input type="checkbox" checked={input.coresAtivo} onChange={(e) => set("coresAtivo", e.target.checked)} /> Cadastrar peso por cor (opcional)
              </label>
              {input.coresAtivo && (<div style={{ marginTop: 10 }}>
                {(input.cores || []).map((c, idx) => (
                  <div key={idx} className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.4fr 0.9fr auto", gap: 10, marginBottom: 8, alignItems: "end" }}>
                    <label style={{ display: "block" }}>
                      <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Cor</div>
                      <select value={c.cor} onChange={(e) => updItem("cores", idx, { cor: e.target.value })}
                        style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
                        <option value="">— selecione —</option>
                        {coresMaterial.map((i) => <option key={i.id} value={i.cor}>{i.cor}</option>)}
                      </select>
                    </label>
                    <F label="Peso (g)" value={c.peso} onChange={(v) => updItem("cores", idx, { peso: v })} />
                    <div style={{ paddingBottom: 8 }}><MiniBtn onClick={() => delItem("cores", idx)}>✕</MiniBtn></div>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                  <Btn small ghost onClick={() => addItem("cores", { cor: coresMaterial[0] ? coresMaterial[0].cor : "", peso: input.consumo })}>＋ Adicionar cor</Btn>
                  <span style={{ fontSize: 13, color: C.sub }}>Peso total: <b style={{ color: C.ink }}>{round2(r.pesoPeca)} g</b></span>
                </div>
                {!coresMaterial.length && <Hint>Nenhuma cor de {input.matTipo} cadastrada nos insumos. <a onClick={() => go("estoque")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar insumo →</a></Hint>}
                <Hint>O peso da peça passa a ser a soma das cores. A cor não muda o preço — preço único por produto.</Hint>
              </div>)}
            </div>
          </>)}

          {/* ---- 3 OPERACIONAL ---- */}
          {etapa === 2 && (<>
            <ST n="3" t="Custo operacional (energia + depreciação + manutenção)" />
            <Fonte value={input.opMode} onChange={(v) => set("opMode", v)}
              opcoes={[["maquina", "Máquina específica"], ["medio", "Custo médio das máquinas"], ["manual", "Valor manual"]]} />
            {input.opMode === "maquina" && (
              maquinas.length ? <Sel label="Máquina" value={input.maquinaId} onChange={(v) => set("maquinaId", v)} options={maquinas.map((m) => m.id)} />
                : <Hint>Nenhuma máquina cadastrada. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar máquinas →</a></Hint>
            )}
            {input.opMode === "medio" && (
              maquinas.length
                ? <Hint>Usando a <b>média do custo/hora</b> de {maquinas.length} máquina(s): <b style={{ color: C.accent }}>{brl(avg(maquinas.map((m) => custoHoraMaquina(m))))}/h</b>.</Hint>
                : <Hint>Nenhuma máquina cadastrada para calcular a média. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar →</a></Hint>
            )}
            {input.opMode === "manual" && <F label="Custo operacional manual (por peça)" value={input.opManual} step={0.1} onChange={(v) => set("opManual", v)} suffix="R$" />}
            <F label="Tempo de impressão (h)" value={input.horasImpressao} step={0.5} onChange={(v) => set("horasImpressao", v)} />
            {input.opMode !== "manual" && <Hint>Energia + depreciação (valor ÷ vida útil) + manutenção, multiplicados pelas horas. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Editar máquinas →</a></Hint>}
            <Hint>Custo operacional atual: <b>{brl(r.custoOperacional)}</b></Hint>
          </>)}

          {/* ---- 4 MÃO DE OBRA ---- */}
          {etapa === 3 && (<>
            <ST n="4" t="Custo de mão de obra" />
            <Fonte value={input.moMode} onChange={(v) => set("moMode", v)}
              opcoes={[["tempo", "Por tempo de trabalho"], ["manual", "Valor manual"], ["nao", "Não considerar"]]} />
            {input.moMode === "tempo" && (<>
              <F label="Custo da hora de trabalho (R$/h)" value={input.moHora} step={1} onChange={(v) => set("moHora", v)} suffix="R$" />
              <Row><F label="Setup (min)" value={input.setup} onChange={(v) => set("setup", v)} /><F label="Retirada (min)" value={input.retirada} onChange={(v) => set("retirada", v)} /></Row>
              <Row><F label="Acabamento (min)" value={input.acabamento} onChange={(v) => set("acabamento", v)} /><F label="Embalar (min)" value={input.embalagemMin} onChange={(v) => set("embalagemMin", v)} /></Row>
            </>)}
            {input.moMode === "manual" && <F label="Custo de mão de obra manual" value={input.moManual} step={0.5} onChange={(v) => set("moManual", v)} suffix="R$" />}
            {input.moMode === "nao" && <Hint>Mão de obra não será considerada no custo.</Hint>}
            <Hint>Mão de obra atual: <b>{brl(r.custoMaoObra)}</b></Hint>
          </>)}

          {/* ---- 5 ACESSÓRIOS ---- */}
          {etapa === 4 && (<>
            <ST n="5" t="Custo de acessórios" />
            <Hint>Argola, rabicho, barbante… Adicione quantos precisar, do estoque ou manual.</Hint>
            {(input.acessorios || []).map((a, idx) => (
              <ItemLinha key={idx} item={a} insumosLista={acessInsumo} tipoLabel="acessório"
                onChange={(patch) => updItem("acessorios", idx, patch)} onDel={() => delItem("acessorios", idx)} />
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn small ghost onClick={() => addItem("acessorios", { fonte: "estoque", insumoId: acessInsumo[0] ? acessInsumo[0].id : "", qtd: 1, custoManual: 0 })}>＋ Acessório do estoque</Btn>
              <Btn small ghost onClick={() => addItem("acessorios", { fonte: "manual", insumoId: "", descManual: "", qtd: 1, custoManual: 1 })}>＋ Acessório manual</Btn>
            </div>
            <Hint>Total de acessórios: <b>{brl(r.custoAcessorios)}</b></Hint>
          </>)}

          {/* ---- 6 DESPACHO ---- */}
          {etapa === 5 && (<>
            <ST n="6" t="Custo de despacho" />
            <Hint>Caixa, saco, sacola, proteção… Do estoque ou manual.</Hint>
            {(input.despacho || []).map((d, idx) => (
              <ItemLinha key={idx} item={d} insumosLista={embInsumo} tipoLabel="embalagem"
                onChange={(patch) => updItem("despacho", idx, patch)} onDel={() => delItem("despacho", idx)} />
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn small ghost onClick={() => addItem("despacho", { fonte: "estoque", insumoId: embInsumo[0] ? embInsumo[0].id : "", qtd: 1, custoManual: 0 })}>＋ Embalagem do estoque</Btn>
              <Btn small ghost onClick={() => addItem("despacho", { fonte: "manual", insumoId: "", descManual: "", qtd: 1, custoManual: 1 })}>＋ Item manual</Btn>
            </div>
            <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 10, background: C.panel2 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 14 }}>
                <input type="checkbox" checked={input.brindeAtivo} onChange={(e) => set("brindeAtivo", e.target.checked)} /> Incluir brinde
              </label>
              {input.brindeAtivo && <div style={{ marginTop: 8 }}><F label="Valor do brinde" value={input.brindeValor} step={0.1} onChange={(v) => set("brindeValor", v)} suffix="R$" /></div>}
            </div>
            <Hint>Total de despacho: <b>{brl(r.custoDespacho)}</b></Hint>
          </>)}

          {/* ---- RESUMO ---- */}
          {etapa === 6 && (<>
            <ST n="✓" t="Resumo e definição de preço" />
            <Label>Custo de produção</Label>
            <LinhaCusto k="Material" v={r.custoMaterial} />
            <LinhaCusto k="Operacional" v={r.custoOperacional} />
            <LinhaCusto k="Mão de obra" v={r.custoMaoObra} />
            <LinhaCusto k="Acessórios" v={r.custoAcessorios} />
            <div style={{ borderTop: `1px solid ${C.line}`, margin: "8px 0", paddingTop: 8 }}>
              <LinhaCusto k={`Subtotal + falhas (${pct(input.taxaFalhas)})`} v={r.custoProducao} bold />
            </div>
            <LinhaCusto k="Despacho (logística)" v={r.custoLogistico} />
            <div style={{ borderTop: `2px solid ${C.accent}`, margin: "8px 0", paddingTop: 8 }}>
              <LinhaCusto k="CUSTO DE PRODUÇÃO DA PEÇA" v={r.custoTotalPeca} big />
            </div>
            <Row><F label="Taxa de falhas (0–1)" value={input.taxaFalhas} step={0.01} onChange={(v) => set("taxaFalhas", v)} /><div /></Row>

            <div style={{ marginTop: 18 }}><Label>Meta de lucro líquido</Label></div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              {["rs","pct"].map((m) => (
                <button key={m} onClick={() => { set("lucroAlvoModo", m); set("lucroAlvoValor", m === "rs" ? 15 : 0.20); }}
                  style={{ flex: 1, background: input.lucroAlvoModo === m ? C.accent : C.panel2, color: input.lucroAlvoModo === m ? "#1a1207" : C.sub,
                    border: `1px solid ${input.lucroAlvoModo === m ? C.accent : C.line}`, borderRadius: 8, padding: "7px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                  {m === "rs" ? "R$ fixo por peça" : "% de margem"}
                </button>
              ))}
            </div>
            <F label={input.lucroAlvoModo === "rs" ? "Lucro mínimo desejado por peça (R$)" : "Margem de lucro desejada (ex: 0.25 = 25%)"}
              value={input.lucroAlvoValor} step={input.lucroAlvoModo === "rs" ? 0.5 : 0.01}
              onChange={(v) => set("lucroAlvoValor", v)} />
            <Hint>
              {input.lucroAlvoModo === "rs"
                ? <>Preço "Saudável" = cobre todos os custos + <b style={{color:C.accent}}>{brl(input.lucroAlvoValor)}</b> de lucro líquido por peça.</>
                : <>Preço "Saudável" garante margem líquida de <b style={{color:C.accent}}>{pct(input.lucroAlvoValor)}</b> sobre o preço de venda.</>}
            </Hint>

            <div style={{ marginTop: 18 }}><Label>Imposto praticado</Label></div>
            <Row>
              <Sel label="Regime tributário" value={input.impostoRegime} onChange={(v) => {
                const reg = IMPOSTOS.find((x) => x.regime === v);
                set("impostoRegime", v);
                if (reg && v !== "Personalizado") set("impostoTaxa", reg.taxa);
              }} options={IMPOSTOS.map((i) => i.regime)} />
              <F label="Alíquota sobre a venda" value={input.impostoTaxa}
                step={0.005} onChange={(v) => { set("impostoTaxa", v); set("impostoRegime", "Personalizado"); }} suffix="(0–1)" />
            </Row>
            <Hint>Imposto = {pct(r.taxaImposto)} sobre o preço de venda. Afeta todos os cenários de preço abaixo.</Hint>

            <div style={{ marginTop: 18 }}><Label>Componentes opcionais</Label></div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <Toggle ativo={input.usarAds} onClick={() => set("usarAds", !input.usarAds)}
                titulo="Ads / Marketing" desc={`${pct(r.canal.ads)} do preço`} />
              <Toggle ativo={input.usarSeg} onClick={() => set("usarSeg", !input.usarSeg)}
                titulo="Reserva de segurança" desc={`${pct(r.canal.seg)} do preço`} />
            </div>
            <Hint>Desligar um componente o remove do cálculo de preço e da distribuição.</Hint>

            <div style={{ marginTop: 18 }}><Label>Cenário de preços por canal</Label></div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ color: C.sub, fontSize: 11, textAlign: "left", textTransform: "uppercase" }}>
                  <th style={{ padding: "6px 8px" }}>Canal</th><th style={{ padding: "6px 8px" }}>Mínimo</th>
                  <th style={{ padding: "6px 8px" }}>Saudável</th><th style={{ padding: "6px 8px" }}>Premium</th><th style={{ padding: "6px 8px" }}></th></tr></thead>
                <tbody>
                  {r.cenarios.map((c) => (
                    <tr key={c.nome} style={{ borderTop: `1px solid ${C.line}`, background: c.nome === r.canalRef ? C.panel2 : "transparent" }}>
                      <td style={{ padding: "9px 8px", fontWeight: 600 }}>{c.nome}</td>
                      <td style={{ padding: "9px 8px", color: C.sub }}>{brl(c.precoMinimo)}</td>
                      <td style={{ padding: "9px 8px", color: C.accent, fontWeight: 700 }}>{brl(c.precoSaudavel)}</td>
                      <td style={{ padding: "9px 8px" }}>{brl(c.precoPremium)}</td>
                      <td style={{ padding: "9px 8px" }}>
                        <button onClick={() => { set("canalRef", c.nome); set("precoPraticado", round2(c.precoSaudavel)); }}
                          style={{ background: c.nome === r.canalRef ? C.accent : "transparent", color: c.nome === r.canalRef ? "#1a1207" : C.sub,
                            border: `1px solid ${c.nome === r.canalRef ? C.accent : C.line}`, padding: "4px 10px", borderRadius: 7, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                          {c.nome === r.canalRef ? "Selecionado" : "Usar"}</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ marginTop: 12 }}>
              <button onClick={() => {
                if (!input.showCanaisConfig && !input.canaisCustom) set("canaisCustom", JSON.parse(JSON.stringify(CANAIS)));
                set("showCanaisConfig", !input.showCanaisConfig);
              }} style={{ background: "transparent", border: `1px solid ${C.line}`, color: C.sub, padding: "6px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                ⚙ {input.showCanaisConfig ? "Ocultar" : "Personalizar taxas dos canais"}
              </button>
              {input.canaisCustom && <button onClick={() => { set("canaisCustom", null); set("showCanaisConfig", false); }}
                style={{ marginLeft: 8, background: "transparent", border: `1px solid ${C.bad}`, color: C.bad, padding: "6px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                ↺ Restaurar padrão
              </button>}
            </div>

            {input.showCanaisConfig && input.canaisCustom && (
              <div style={{ marginTop: 12, overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead><tr style={{ color: C.sub, fontSize: 10, textTransform: "uppercase", textAlign: "left" }}>
                    <th style={{ padding: "6px 6px" }}>Canal</th>
                    <th style={{ padding: "6px 6px" }}>Comissão</th>
                    <th style={{ padding: "6px 6px" }}>Pgto</th>
                    <th style={{ padding: "6px 6px" }}>Ads</th>
                    <th style={{ padding: "6px 6px" }}>Tarifa R$</th>
                    <th style={{ padding: "6px 6px" }}>Frete R$</th>
                    <th style={{ padding: "6px 6px" }}>Reserva</th>
                  </tr></thead>
                  <tbody>
                    {input.canaisCustom.map((c, idx) => {
                      const upd = (campo, val) => {
                        const novo = input.canaisCustom.map((x, i) => i === idx ? { ...x, [campo]: val } : x);
                        set("canaisCustom", novo);
                      };
                      const inp = (campo, val) => (
                        <input type="text" inputMode="decimal" defaultValue={String(val).replace(".",",")}
                          onBlur={(e) => { const n = parseFloat(e.target.value.replace(",",".")); if (!isNaN(n)) upd(campo, n); }}
                          style={{ width: 64, background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "4px 6px", borderRadius: 6, fontSize: 12, fontFamily: "inherit", textAlign: "right" }} />
                      );
                      return (
                        <tr key={c.nome} style={{ borderTop: `1px solid ${C.line}` }}>
                          <td style={{ padding: "6px 6px", fontWeight: 600 }}>{c.nome}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("comissao", c.comissao)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("pgto", c.pgto)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("ads", c.ads)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("tarifa", c.tarifa)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("frete", c.frete)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("seg", c.seg)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <Hint>Valores decimais: comissão 16% = 0.16 · Tarifa e Frete em R$ · Clique fora do campo para aplicar.</Hint>
              </div>
            )}

            <div style={{ marginTop: 16, padding: "14px", borderRadius: 12, background: C.panel2 }}>
              <Label>Preço que será praticado — {r.canalRef}</Label>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 6 }}>Preço de venda (R$) — digite livremente e pressione Enter ou clique fora para aplicar</div>
              <PrecoLivreInput value={input.precoPraticado || round2(r.precoSaudavel)} onChange={(v) => set("precoPraticado", v)} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 4, flexWrap: "wrap", gap: 6 }}>
                <span style={{ color: C.sub }}>Lucro líquido: <b style={{ color: r.lucroPraticado >= 0 ? C.good : C.bad }}>{brl(r.lucroPraticado)}</b>
                  {" · "}{pct(r.margemAtual)}
                  {input.lucroAlvoModo === "rs" && r.lucroPraticado < input.lucroAlvoValor &&
                    <span style={{ color: C.warn, marginLeft: 6 }}>(meta: {brl(input.lucroAlvoValor)})</span>}
                  {input.lucroAlvoModo === "pct" && r.margemAtual < input.lucroAlvoValor &&
                    <span style={{ color: C.warn, marginLeft: 6 }}>(meta: {pct(input.lucroAlvoValor)})</span>}
                </span>
                <span style={{ fontWeight: 700, color: statusColor }}>{r.status}</span>
              </div>
            </div>

            <div style={{ marginTop: 18 }}><Label>Distribuição do preço praticado</Label></div>
            <Distribuicao r={r} />
          </>)}

          {/* navegação */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 8 }}>
            <Btn ghost disabled={etapa === 0} onClick={() => setEtapa((e) => Math.max(0, e - 1))}>← Voltar</Btn>
            {etapa < 6 ? <Btn onClick={() => setEtapa((e) => Math.min(6, e + 1))}>Próximo →</Btn>
              : <span style={{ fontSize: 12, color: C.sub, alignSelf: "center" }}>Pronto! Salve no catálogo ao lado →</span>}
          </div>
        </Card>

        {/* painel lateral fixo */}
        <div>
          <Card style={{ marginBottom: 16 }}>
            <Label>Custo de produção</Label>
            <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 30, color: C.accent }}>{brl(r.custoTotalPeca)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>saída desta etapa</div>
            <div style={{ marginTop: 14 }}>
              <Bar label="Material" v={r.custoMaterial} total={r.custoTotalPeca} c={C.accent} fmt={brl} />
              <Bar label="Operacional" v={r.custoOperacional} total={r.custoTotalPeca} c={C.blue} fmt={brl} />
              <Bar label="Mão de obra" v={r.custoMaoObra} total={r.custoTotalPeca} c={C.accent2} fmt={brl} />
              <Bar label="Acessórios" v={r.custoAcessorios} total={r.custoTotalPeca} c={C.purple} fmt={brl} />
              <Bar label="Despacho" v={r.custoLogistico} total={r.custoTotalPeca} c={C.pink} fmt={brl} />
            </div>
          </Card>
          <Card>
            <Label>Preço · {r.canalRef}</Label>
            <PriceRow label="Mínimo" value={r.precoMinimo} sub="cobre custos" />
            <PriceRow label="Saudável" value={r.precoSaudavel} sub={`+ ${brl(CFG.lucroAlvoRS)} lucro`} big accent />
            <PriceRow label="Premium" value={r.precoPremium} sub={`+${pct(CFG.markupPremium)}`} />
            <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10, background: C.panel2, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 12, color: C.sub }}>Praticado: {brl(r.precoPraticado)}</span>
              <span style={{ fontWeight: 700, color: statusColor, fontSize: 13 }}>{r.status} · {pct(r.margemAtual)}</span>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <Btn onClick={salvarNoCatalogo} full>＋ Salvar no catálogo</Btn>
              <Btn onClick={gerarOrcamento} ghost full>✎ Orçamento</Btn>
            </div>
            {etapa < 6 && <Hint>Defina o canal e o preço praticado no passo "Resumo".</Hint>}
          </Card>
        </div>
      </div>
    </div>
  );
}

// Linha de item (acessório/despacho) com fonte estoque/manual
function ItemLinha({ item, insumosLista, onChange, onDel, tipoLabel }) {
  const insSel = item.fonte === "estoque" ? insumosLista.find((i) => i.id === item.insumoId) : null;
  const custoUn = item.fonte === "estoque" ? (insSel ? insSel.custoUn : 0) : (item.custoManual || 0);
  const subtotal = custoUn * (item.qtd || 0);
  return (
    <div style={{ background: C.panel2, borderRadius: 10, padding: 12, marginBottom: 8 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
        <select value={item.fonte} onChange={(e) => onChange({ fonte: e.target.value })}
          style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "6px 8px", borderRadius: 8, fontSize: 12, fontFamily: "inherit" }}>
          <option value="estoque">Do estoque</option><option value="manual">Manual</option>
        </select>
        <span style={{ fontSize: 11, color: C.sub }}>{tipoLabel}</span>
        <div style={{ marginLeft: "auto" }}><MiniBtn onClick={onDel}>✕</MiniBtn></div>
      </div>
      <div className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.6fr 0.9fr 0.7fr", gap: 10 }}>
        {/* Descrição */}
        {item.fonte === "estoque" ? (
          <label style={{ display: "block" }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Descrição</div>
            <select value={item.insumoId} onChange={(e) => onChange({ insumoId: e.target.value })}
              style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
              {insumosLista.length ? insumosLista.map((i) => <option key={i.id} value={i.id}>{i.nome}</option>) : <option value="">— sem itens no estoque —</option>}
            </select>
          </label>
        ) : (
          <F label="Descrição" text value={item.descManual || ""} onChange={(v) => onChange({ descManual: v })} />
        )}
        {/* Custo unitário */}
        {item.fonte === "estoque" ? (
          <label style={{ display: "block" }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Custo unitário</div>
            <div style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.sub, padding: "8px 10px", borderRadius: 8, fontSize: 14 }}>{brl(custoUn)}</div>
          </label>
        ) : (
          <F label="Custo unitário" value={item.custoManual} step={0.1} onChange={(v) => onChange({ custoManual: v })} suffix="R$" />
        )}
        {/* Quantidade */}
        <F label="Qtd" value={item.qtd} onChange={(v) => onChange({ qtd: v })} />
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", fontSize: 12, color: C.sub, marginTop: 6 }}>
        Subtotal: <b style={{ color: C.ink, marginLeft: 6 }}>{brl(subtotal)}</b>
      </div>
    </div>
  );
}
function Fonte({ value, onChange, opcoes }) {
  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
      {opcoes.map(([v, label]) => (
        <button key={v} onClick={() => onChange(v)} style={{ flex: 1, minWidth: 110, background: value === v ? C.accent : C.panel2,
          color: value === v ? "#1a1207" : C.sub, border: `1px solid ${value === v ? C.accent : C.line}`, borderRadius: 8,
          padding: "8px 6px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{label}</button>
      ))}
    </div>
  );
}
function Toggle({ ativo, onClick, titulo, desc }) {
  return (
    <button onClick={onClick} style={{ flex: 1, minWidth: 150, textAlign: "left", display: "flex", alignItems: "center", gap: 10,
      background: ativo ? "rgba(255,107,53,.10)" : C.panel2, border: `1px solid ${ativo ? C.accent : C.line}`,
      borderRadius: 10, padding: "10px 12px", cursor: "pointer", fontFamily: "inherit" }}>
      <span style={{ width: 38, height: 22, borderRadius: 11, background: ativo ? C.accent : C.line, position: "relative", flexShrink: 0, transition: "background .15s" }}>
        <span style={{ position: "absolute", top: 2, left: ativo ? 18 : 2, width: 18, height: 18, borderRadius: 9, background: "#fff", transition: "left .15s" }} />
      </span>
      <span>
        <div style={{ fontSize: 13, fontWeight: 700, color: ativo ? C.ink : C.sub }}>{titulo}</div>
        <div style={{ fontSize: 11, color: C.sub }}>{ativo ? "Considerando · " + desc : "Não considerar"}</div>
      </span>
    </button>
