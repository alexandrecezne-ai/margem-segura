// ---- Calculo a partir de produto do catálogo ----
function calcFromCatalogo(produto, canalNome, precoCustom, config) {
  const canaisFc = (config && config.canais && config.canais.length) ? config.canais : CANAIS;
  const canal = canaisFc.find((c) => c.nome === canalNome) || canaisFc[0];
  const taxaImposto = produto.impostoTaxa || 0;
  const usarAds = produto.usarAds !== false;
  const usarSeg = produto.usarSeg !== false;
  const ads = usarAds ? canal.ads : 0;
  const seg = usarSeg ? canal.seg : 0;
  const totalPct = canal.comissao + canal.pgto + ads + taxaImposto + seg;
  const baseMaisTarifa = (produto.custo || 0) + (canal.tarifa || 0) + (canal.frete || 0);
  const precoMinimo = totalPct < 1 ? baseMaisTarifa / (1 - totalPct) : baseMaisTarifa * 2;
  const precoSaudavel = produto.precoSaudavel || precoMinimo * 1.3;
  const precoPraticado = precoCustom > 0 ? precoCustom : (produto.precoPraticado || precoSaudavel);
  const lucro = precoPraticado - baseMaisTarifa - precoPraticado * totalPct;
  const margem = precoPraticado > 0 ? lucro / precoPraticado : 0;
  const lucroHora = produto.horasImpressao > 0 ? lucro / produto.horasImpressao : null;
  const pctSemAds = canal.comissao + canal.pgto + taxaImposto + seg;
  const custoSemAds = baseMaisTarifa + precoPraticado * pctSemAds;
  const margemAntesAds = precoPraticado > 0 ? (precoPraticado - custoSemAds) / precoPraticado : 0;
  const acosMax = Math.max(0, margemAntesAds - 0.12);
  const roasMeta = acosMax > 0 ? 1 / acosMax : 0;
  const investMaxVenda = precoPraticado * acosMax;
  const status = precoPraticado >= precoSaudavel ? "Saudável" : precoPraticado >= precoMinimo ? "Apertado" : "Inviável";
  const statusColor = status === "Saudável" ? C.good : status === "Apertado" ? C.warn : C.bad;
  return { canal, totalPct, baseMaisTarifa, precoMinimo, precoSaudavel, precoPraticado, lucro, margem, lucroHora, margemAntesAds, acosMax, roasMeta, investMaxVenda, status, statusColor, usarAds, usarSeg, taxaImposto, produto };
}

function SeletorProduto({ produtos, sku, setSku, canalNome, setCanalNome, preco, setPreco, label, canais }) {
  const canaisSel = (canais && canais.length) ? canais : CANAIS;
  const prod = produtos.find((p) => p.sku === sku);
  const estiloSel = { background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit", width: "100%" };
  return (
    <Card style={{ marginBottom: 16 }}>
      <Label>{label || "Produto do catálogo"}</Label>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 12, alignItems: "end" }}>
        <label>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Produto</div>
          <select value={sku} onChange={(e) => {
            setSku(e.target.value);
            const p = produtos.find((x) => x.sku === e.target.value);
            if (p) { setCanalNome(p.canal); setPreco(p.precoPraticado || p.precoSaudavel || 0); }
          }} style={estiloSel}>
            <option value="">— Usar produto da calculadora —</option>
            {produtos.map((p) => <option key={p.sku} value={p.sku}>{p.nome} ({p.sku})</option>)}
          </select>
        </label>
        <label>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Canal de vendas</div>
          <select value={canalNome} onChange={(e) => setCanalNome(e.target.value)} style={estiloSel}>
            {canaisSel.map((c) => <option key={c.nome} value={c.nome}>{c.nome}</option>)}
          </select>
        </label>
        <label>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Preço praticado (R$)</div>
          <PrecoLivreInput value={preco} onChange={setPreco} fontSize={14} fontWeight={600} />
        </label>
      </div>
      {prod && (
        <div style={{ marginTop: 12, display: "flex", gap: 16, flexWrap: "wrap", fontSize: 12, color: C.sub }}>
          <span>Custo: <b style={{ color: C.ink }}>{brl(prod.custo)}</b></span>
          <span>Preço mín: <b style={{ color: C.ink }}>{brl(prod.precoMin)}</b></span>
          <span>Preço saudável: <b style={{ color: C.accent }}>{brl(prod.precoSaudavel)}</b></span>
          <span>Horas impressão: <b style={{ color: C.ink }}>{prod.horasImpressao}h</b></span>
        </div>
      )}
    </Card>
  );
}

function PainelLucro({ calc, horasImpressao, moHora }) {
  const lh = calc.lucroHora != null ? calc.lucroHora : (horasImpressao > 0 ? calc.lucro / horasImpressao : null);
  const corLucro = calc.lucro >= 0 ? C.good : C.bad;
  const corLH = lh == null ? C.sub : lh <= 0 ? C.bad : lh < (moHora || 25) ? C.warn : C.good;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: "14px 16px" }}>
        <div style={{ fontSize: 11, color: C.sub, textTransform: "uppercase", letterSpacing: 0.8 }}>Lucro líquido / peça</div>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 26, color: corLucro, margin: "4px 0" }}>{brl(calc.lucro)}</div>
        <div style={{ fontSize: 12, color: C.sub }}>{pct(calc.margem)} de margem · <span style={{ color: calc.statusColor, fontWeight: 700 }}>{calc.status}</span></div>
      </div>
      <div style={{ background: C.panel, border: `1px solid ${lh != null ? corLH : C.line}44`, borderRadius: 12, padding: "14px 16px" }}>
        <div style={{ fontSize: 11, color: C.sub, textTransform: "uppercase", letterSpacing: 0.8 }}>Lucro / hora de máquina</div>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 26, color: lh != null ? corLH : C.sub, margin: "4px 0" }}>
          {lh != null ? <>{brl(lh)}<span style={{ fontSize: 13, fontWeight: 400 }}>/h</span></> : "—"}
        </div>
        <div style={{ fontSize: 12, color: C.sub }}>
          {lh != null ? `${brl(calc.lucro)} ÷ ${(calc.produto || {}).horasImpressao || horasImpressao || "?"}h` : "Informe as horas de impressão"}
        </div>
      </div>
    </div>
  );
}

function Roas({ r, produtos, config }) {
  const [sku, setSku] = React.useState("");
  const [canalNome, setCanalNome] = React.useState(r.canalRef || "Mercado Livre");
  const [preco, setPreco] = React.useState(r.precoPraticado || 0);

  const prod = produtos.find((p) => p.sku === sku);
  const calc = prod ? calcFromCatalogo(prod, canalNome, preco, config) : { ...r, lucro: r.lucroPraticado, margem: r.margemAtual, lucroHora: r.horasImpressao > 0 ? r.lucroPraticado / r.horasImpressao : null, status: r.status, statusColor: r.status === "Saudável" ? C.good : r.status === "Apertado" ? C.warn : C.bad, produto: null };

  return (
    <div>
      <H title="ROAS & Anúncios" sub="Quanto investir em mídia mantendo margem — por produto e canal" />
      <SeletorProduto produtos={produtos} sku={sku} setSku={setSku} canalNome={canalNome} setCanalNome={setCanalNome} preco={preco} setPreco={setPreco} label="Produto para análise" canais={(config && config.canais && config.canais.length) ? config.canais : CANAIS} />
      <PainelLucro calc={calc} horasImpressao={prod ? prod.horasImpressao : 0} moHora={round2(custoHoraEfetivo(config))} />
      <Card style={{ maxWidth: 680 }}>
        <Label>Análise de anúncios — {canalNome}</Label>
        <BigStat label="Preço praticado" value={brl(calc.precoPraticado)} />
        <BigStat label="Margem antes de ads" value={pct(calc.margemAntesAds)} hint="margem sem considerar verba de ads" />
        <BigStat label="ACOS máximo" value={pct(calc.acosMax)} hint="% máxima da receita gastável em ads" />
        <BigStat label="ROAS meta" value={calc.roasMeta ? `${calc.roasMeta.toFixed(1)}×` : "—"} accent hint="receita por R$ 1,00 investido em ads" />
        <BigStat label="Investimento máx. por venda" value={brl(calc.investMaxVenda)} hint="teto de gasto para não corroer margem" />
        <div style={{ marginTop: 16, padding: 14, borderRadius: 10, background: C.panel2, fontSize: 13, color: C.sub, lineHeight: 1.6 }}>
          {calc.acosMax <= 0
            ? "⚠️ Sem margem para ads — suba o preço ou reduza custos antes de anunciar."
            : calc.roasMeta <= 3 ? "🟢 Alta folga: comporta mídia agressiva com segurança."
            : calc.roasMeta <= 6 ? "🟡 Folga controlada: monitore o ACOS de perto."
            : "🔴 Margem apertada para ads: priorize orgânico ou aumente o ticket."}
        </div>
      </Card>
    </div>
  );
}

// ---------- KITS ----------
function Kits({ produtos, config }) {
  const [sub, setSub] = React.useState("combo");
  const canais = (config && config.canais && config.canais.length) ? config.canais : CANAIS;
  const cHora = round2(custoHoraEfetivo(config));
  const impostoPadrao = config && config.impostoTaxa != null ? config.impostoTaxa : 0.06;
  const precoTab = (p) => p ? (p.precoPraticado || p.precoSaudavel || 0) : 0;

  // ================= KIT / COMBO =================
  const [itensKit, setItensKit] = React.useState([]);
  const [canalKit, setCanalKit] = React.useState((canais.find((c) => c.nome === "Mercado Livre") || canais[0]).nome);
  const [precoKitIn, setPrecoKitIn] = React.useState(0);
  const [embExtra, setEmbExtra] = React.useState(2);
  const [brindeExtra, setBrindeExtra] = React.useState(0);
  const addItemKit = () => { const p = produtos[0]; if (!p) return; setItensKit((arr) => [...arr, { sku: p.sku, qtd: 1 }]); };
  const updItemKit = (i, patch) => setItensKit((arr) => arr.map((x, k) => k === i ? { ...x, ...patch } : x));
  const delItemKit = (i) => setItensKit((arr) => arr.filter((_, k) => k !== i));

  const cKit = canais.find((c) => c.nome === canalKit) || canais[0];
  let subtotalTab = 0, custoProducaoItens = 0, economiaLog = 0, horasKit = 0, lucroSeparado = 0, semDetalhe = 0;
  const detKit = { material: 0, maquina: 0, mo: 0, acessorios: 0 };
  itensKit.forEach(({ sku, qtd }) => {
    const p = produtos.find((x) => x.sku === sku); if (!p) return;
    const q = qtd || 1; const pt = precoTab(p);
    const cp = custosProduto(p);
    const imposto = p.impostoTaxa != null ? p.impostoTaxa : impostoPadrao;
    const pctItem = (cKit.comissao || 0) + (cKit.pgto || 0) + (p.usarAds === false ? 0 : (cKit.ads || 0)) + (p.usarSeg === false ? 0 : (cKit.seg || 0)) + imposto;
    subtotalTab += pt * q; horasKit += (p.horasImpressao || 0) * q;
    custoProducaoItens += cp.producao * q;
    economiaLog += cp.logistico * q; // embalagens individuais que o kit dispensa
    if (cp.det) { detKit.material += cp.det.material * q; detKit.maquina += cp.det.maquina * q; detKit.mo += cp.det.mo * q; detKit.acessorios += cp.det.acessorios * q; }
    else semDetalhe += q;
    // venda separada: cada unidade é uma venda completa (com sua embalagem individual e tarifa)
    lucroSeparado += pt * q - ((p.custo || 0)) * q - pt * q * pctItem - (cKit.tarifa || 0) * q;
  });
  const pctKit = (cKit.comissao || 0) + (cKit.pgto || 0) + (cKit.ads || 0) + (cKit.seg || 0) + impostoPadrao;
  const custoKit = custoProducaoItens + (embExtra || 0) + (brindeExtra || 0);
  const precoKit = precoKitIn > 0 ? precoKitIn : round2(subtotalTab);
  const descKit = subtotalTab > 0 ? Math.max(0, 1 - precoKit / subtotalTab) : 0;
  const lucroKit = precoKit - custoKit - (cKit.tarifa || 0) - precoKit * pctKit;
  const margemKit = precoKit > 0 ? lucroKit / precoKit : 0;
  const precoMinKit = pctKit < 1 ? (custoKit + (cKit.tarifa || 0)) / (1 - pctKit) : 0;
  const lucroHoraKit = horasKit > 0 ? lucroKit / horasKit : null;
  const statusKit = precoKit < precoMinKit ? ["Inviável", C.bad] : (lucroHoraKit != null && lucroHoraKit < cHora) ? ["Apertado", C.warn] : ["Saudável", C.good];
  const qtdTotKit = itensKit.reduce((a, i) => a + (i.qtd || 1), 0);

  // ================= ATACADO =================
  const [ataSku, setAtaSku] = React.useState("");
  const [canalAta, setCanalAta] = React.useState("Venda direta");
  const [embLote, setEmbLote] = React.useState(15);
  const [embUnAta, setEmbUnAta] = React.useState(0.5);
  const [faixas, setFaixas] = React.useState([{ qtd: 10, desc: 0.05 }, { qtd: 25, desc: 0.10 }, { qtd: 50, desc: 0.15 }, { qtd: 100, desc: 0.20 }]);
  const updFaixa = (i, patch) => setFaixas((arr) => arr.map((x, k) => k === i ? { ...x, ...patch } : x));
  const addFaixa = () => setFaixas((arr) => [...arr, { qtd: 200, desc: 0.25 }]);
  const delFaixa = (i) => setFaixas((arr) => arr.filter((_, k) => k !== i));

  const pAta = produtos.find((x) => x.sku === ataSku);
  const cAta = canais.find((c) => c.nome === canalAta) || canais[0];
  const ptAta = precoTab(pAta);
  const cpAta = custosProduto(pAta);
  const impAta = pAta && pAta.impostoTaxa != null ? pAta.impostoTaxa : impostoPadrao;
  const pctAta = (cAta.comissao || 0) + (cAta.pgto || 0) + (pAta && pAta.usarAds === false ? 0 : (cAta.ads || 0)) + (pAta && pAta.usarSeg === false ? 0 : (cAta.seg || 0)) + impAta;
  // mínimo no varejo (custo cheio, com embalagem individual) — referência de tabela
  const precoMinVarejo = pAta && pctAta < 1 ? ((pAta.custo || 0) + (cAta.tarifa || 0)) / (1 - pctAta) : 0;
  const descMaxVarejo = ptAta > 0 ? Math.max(0, 1 - precoMinVarejo / ptAta) : 0;

  const linhasAta = pAta ? faixas.map((f) => {
    const qtd = Math.max(1, Math.round(f.qtd || 1));
    const precoUn = ptAta * (1 - (f.desc || 0));
    const receita = precoUn * qtd;
    // custo do lote: produção × qtd + embalagem unitária do lote × qtd + embalagem do lote (diluída)
    const custoTot = cpAta.producao * qtd + (embUnAta || 0) * qtd + (embLote || 0);
    const custoVarejoTot = (pAta.custo || 0) * qtd; // como seria com embalagem individual de varejo
    const economiaLogF = Math.max(0, custoVarejoTot - custoTot);
    const lucroTot = receita - custoTot - receita * pctAta - (cAta.tarifa || 0) * qtd;
    const horasTot = (pAta.horasImpressao || 0) * qtd;
    const lucroHora = horasTot > 0 ? lucroTot / horasTot : null;
    // mínimo unitário desta faixa (lote dilui a embalagem fixa → mínimo cai com o volume)
    const custoUnFaixa = cpAta.producao + (embUnAta || 0) + (embLote || 0) / qtd;
    const minFaixa = pctAta < 1 ? (custoUnFaixa + (cAta.tarifa || 0)) / (1 - pctAta) : 0;
    const status = precoUn < minFaixa ? ["Inviável", C.bad] : (lucroHora != null && lucroHora < cHora) ? ["Atenção", C.warn] : ["Saudável", C.good];
    return { qtd, desc: f.desc || 0, precoUn, receita, custoTot, economiaLogF, lucroTot, lucroUn: lucroTot / qtd, margem: receita > 0 ? lucroTot / receita : 0, horasTot, lucroHora, minFaixa, status };
  }) : [];

  const thA = { padding: "8px 6px", fontSize: 11, color: C.sub, textAlign: "left", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" };
  const tdA = { padding: "8px 6px", fontSize: 13, whiteSpace: "nowrap" };

  return (
    <div>
      <H title="Kitficação & Atacado" sub="Combos para aumentar o ticket · faixas de volume sem destruir a margem" />
      <Fonte value={sub} onChange={setSub} opcoes={[["combo", "▣ Kit / Combo"], ["atacado", "⬚ Atacado"]]} />

      {/* ================= COMBO ================= */}
      {sub === "combo" && (<>
        {!produtos.length && <Card><Empty txt="Cadastre produtos no Catálogo para montar kits." /></Card>}
        {produtos.length > 0 && (
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
          <Card title="Montagem do kit" style={{ flex: 1.3, minWidth: 330 }}>
            {itensKit.map((it, i) => {
              const p = produtos.find((x) => x.sku === it.sku);
              return (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1.8fr 0.6fr auto auto", gap: 8, marginBottom: 8, alignItems: "center" }}>
                  <select value={it.sku} onChange={(e) => updItemKit(i, { sku: e.target.value })} style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit", minWidth: 0 }}>
                    {produtos.map((pp) => <option key={pp.sku} value={pp.sku}>{pp.nome}</option>)}
                  </select>
                  <NumCellCfg value={it.qtd} onChange={(v) => updItemKit(i, { qtd: Math.max(1, Math.round(v)) })} />
                  <span style={{ fontSize: 12, color: C.sub }}>{brl(precoTab(p) * (it.qtd || 1))}</span>
                  <MiniBtn onClick={() => delItemKit(i)}>✕</MiniBtn>
                </div>
              );
            })}
            <Btn small ghost onClick={addItemKit}>＋ Adicionar produto</Btn>
            <Hint>Repita o mesmo produto para kit de unidades iguais, ou combine produtos diferentes para um combo de valor agregado.</Hint>
            <div style={{ marginTop: 12 }}>
              <Sel label="Canal de venda do kit" value={canalKit} onChange={setCanalKit} options={canais.map((c) => c.nome)} />
              <Row>
                <F label="Embalagem extra (R$)" value={embExtra} step={0.5} onChange={setEmbExtra} suffix="R$" />
                <F label="Brinde extra (R$)" value={brindeExtra} step={0.5} onChange={setBrindeExtra} suffix="R$" />
              </Row>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Preço do kit (R$)</div>
              <PrecoLivreInput value={precoKitIn || round2(subtotalTab)} onChange={setPrecoKitIn} />
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {[0.05, 0.08, 0.12].map((d) => (
                  <button key={d} onClick={() => setPrecoKitIn(round2(subtotalTab * (1 - d)))}
                    style={{ background: C.panel2, border: `1px solid ${C.line}`, color: C.sub, borderRadius: 7, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>−{Math.round(d * 100)}%</button>
                ))}
                <span style={{ fontSize: 12, color: descKit > 0 ? C.warn : C.sub, alignSelf: "center" }}>{descKit > 0 ? `desconto de ${pct(descKit)} sobre a tabela (${brl(subtotalTab)})` : `tabela: ${brl(subtotalTab)}`}</span>
              </div>
            </div>
          </Card>

          <Card title={`Resultado do kit (${qtdTotKit} unid.)`} style={{ flex: 1, minWidth: 300 }}>
            {itensKit.length === 0 && <Hint>Adicione produtos ao kit para ver a análise.</Hint>}
            {itensKit.length > 0 && (<>
              <BigStat label="Preço do kit" value={brl(precoKit)} hint={`mínimo viável: ${brl(precoMinKit)}`} accent />
              <BigStat label="Lucro do kit" value={brl(lucroKit)} hint={`margem ${pct(margemKit)}`} />
              <BigStat label="Lucro por hora" value={lucroHoraKit != null ? `${brl(lucroHoraKit)}/h` : "—"} hint={`sua hora: ${brl(cHora)} · ${horasKit}h de impressão`} />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: `1px solid ${C.line}` }}>
                <span style={{ fontSize: 14 }}>Status</span>
                <span style={{ fontWeight: 800, fontFamily: "Sora", color: statusKit[1] }}>{statusKit[0]}</span>
              </div>

              <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 14px", marginTop: 12 }}>
                <div style={{ fontSize: 11, color: C.sub, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Composição de custos do kit · {brl(custoKit)}</div>
                {detKit.material + detKit.maquina + detKit.mo + detKit.acessorios > 0 ? (<>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Material das peças</span><b style={{ color: C.ink }}>{brl(detKit.material)}</b></div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Máquina (energia + depreciação + manut.)</span><b style={{ color: C.ink }}>{brl(detKit.maquina)}</b></div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Mão de obra</span><b style={{ color: C.ink }}>{brl(detKit.mo)}</b></div>
                  {detKit.acessorios > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Acessórios</span><b style={{ color: C.ink }}>{brl(detKit.acessorios)}</b></div>}
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Provisão de falhas</span><b style={{ color: C.ink }}>{brl(Math.max(0, custoProducaoItens - detKit.material - detKit.maquina - detKit.mo - detKit.acessorios))}</b></div>
                </>) : (
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Produção das peças</span><b style={{ color: C.ink }}>{brl(custoProducaoItens)}</b></div>
                )}
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub, borderTop: `1px solid ${C.line}`, paddingTop: 6, marginTop: 6 }}><span>Embalagem do kit</span><b style={{ color: C.ink }}>{brl(embExtra || 0)}</b></div>
                {(brindeExtra || 0) > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub }}><span>Brinde do kit</span><b style={{ color: C.ink }}>{brl(brindeExtra)}</b></div>}
                {economiaLog > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginTop: 6 }}><span style={{ color: C.good }}>✓ Embalagens individuais dispensadas</span><b style={{ color: C.good }}>− {brl(economiaLog)}</b></div>}
                {semDetalhe > 0 && <div style={{ fontSize: 11, color: C.warn, marginTop: 6 }}>⚠ {semDetalhe} unid. de produto(s) antigo(s) sem composição salva — usando o custo total (sem separar embalagem). Reprecifique e salve de novo para detalhar.</div>}
              </div>

              <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 14px", marginTop: 12 }}>
                <div style={{ fontSize: 11, color: C.sub, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Kit vs vender separado</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}><span style={{ color: C.sub }}>Separado ({itensKit.length > 0 ? `${qtdTotKit} vendas` : "—"})</span><b>{brl(lucroSeparado)}</b></div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 2 }}><span style={{ color: C.sub }}>No kit (1 venda)</span><b style={{ color: lucroKit >= lucroSeparado ? C.good : C.warn }}>{brl(lucroKit)}</b></div>
                <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>{lucroKit >= lucroSeparado ? "✓ O kit rende mais — uma embalagem, uma tarifa e um frete em vez de vários." : `O desconto come ${brl(lucroSeparado - lucroKit)} vs vender separado (mesmo já economizando ${brl(economiaLog)} em embalagens). Vale se o kit destravar a venda que não aconteceria.`}</div>
              </div>
              <Hint>Imposto do kit estimado pelo regime padrão das Configurações ({pct(impostoPadrao)}).</Hint>
            </>)}
          </Card>
        </div>
        )}
      </>)}

      {/* ================= ATACADO ================= */}
      {sub === "atacado" && (<>
        {!produtos.length && <Card><Empty txt="Cadastre produtos no Catálogo para simular atacado." /></Card>}
        {produtos.length > 0 && (<>
          <Card style={{ marginBottom: 16 }}>
            <Label>Produto e canal</Label>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
              <label><div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Produto</div>
                <select value={ataSku} onChange={(e) => setAtaSku(e.target.value)} style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
                  <option value="">— selecione —</option>
                  {produtos.map((p) => <option key={p.sku} value={p.sku}>{p.nome} ({p.sku})</option>)}
                </select></label>
              <Sel label="Canal" value={canalAta} onChange={setCanalAta} options={canais.map((c) => c.nome)} />
            </div>
            {pAta && (<>
              <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginTop: 8, fontSize: 13 }}>
                <span style={{ color: C.sub }}>Preço de tabela: <b style={{ color: C.ink }}>{brl(ptAta)}</b></span>
                <span style={{ color: C.sub }}>Mínimo no varejo: <b style={{ color: C.ink }}>{brl(precoMinVarejo)}</b></span>
                <span style={{ color: C.sub }}>Desconto máx. (varejo): <b style={{ color: descMaxVarejo > 0.05 ? C.good : C.warn }}>{pct(descMaxVarejo)}</b></span>
              </div>
              <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 14px", marginTop: 12 }}>
                <div style={{ fontSize: 11, color: C.sub, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Composição de custos por unidade</div>
                <div style={{ display: "flex", gap: 18, flexWrap: "wrap", fontSize: 12 }}>
                  {cpAta.det ? (<>
                    <span style={{ color: C.sub }}>Material <b style={{ color: C.ink }}>{brl(cpAta.det.material)}</b></span>
                    <span style={{ color: C.sub }}>Máquina <b style={{ color: C.ink }}>{brl(cpAta.det.maquina)}</b></span>
                    <span style={{ color: C.sub }}>MO <b style={{ color: C.ink }}>{brl(cpAta.det.mo)}</b></span>
                    {cpAta.det.acessorios > 0 && <span style={{ color: C.sub }}>Acessórios <b style={{ color: C.ink }}>{brl(cpAta.det.acessorios)}</b></span>}
                  </>) : null}
                  <span style={{ color: C.sub }}>Produção <b style={{ color: C.accent2 }}>{brl(cpAta.producao)}</b></span>
                  <span style={{ color: C.sub }}>Logística varejo <b style={{ color: cpAta.logistico > 0 ? C.warn : C.sub }}>{brl(cpAta.logistico)}</b>{cpAta.logistico > 0 && <span style={{ color: C.good }}> ← otimizável no lote</span>}</span>
                </div>
                {!cpAta.det && cpAta.logistico === 0 && <div style={{ fontSize: 11, color: C.warn, marginTop: 6 }}>⚠ Produto antigo sem composição salva — usando o custo total como produção. Reprecifique e salve de novo para separar a embalagem.</div>}
              </div>
              <Row>
                <F label="Embalagem do lote (R$, fixo por pedido)" value={embLote} step={1} onChange={setEmbLote} suffix="R$" />
                <F label="Embalagem por unidade no lote (R$)" value={embUnAta} step={0.1} onChange={setEmbUnAta} suffix="R$" />
              </Row>
            </>)}
          </Card>

          {pAta && (
            <Card title="Faixas de atacado">
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 920 }}>
                  <thead><tr>
                    <th style={thA}>Qtd</th><th style={thA}>Desc. %</th><th style={thA}>Preço un.</th><th style={thA}>Mín. un.</th><th style={thA}>Receita</th>
                    <th style={thA}>Custo</th><th style={thA}>Lucro total</th><th style={thA}>Lucro/un.</th><th style={thA}>Margem</th><th style={thA}>Horas</th><th style={thA}>Lucro/h</th><th style={thA}>Status</th><th style={thA}></th>
                  </tr></thead>
                  <tbody>
                    {linhasAta.map((l, i) => (
                      <tr key={i} style={{ borderTop: `1px solid ${C.line}` }}>
                        <td style={{ ...tdA, width: 80 }}><NumCellCfg value={faixas[i].qtd} onChange={(v) => updFaixa(i, { qtd: Math.max(1, Math.round(v)) })} /></td>
                        <td style={{ ...tdA, width: 80 }}><NumCellCfg pct value={faixas[i].desc} onChange={(v) => updFaixa(i, { desc: Math.max(0, Math.min(0.95, v)) })} /></td>
                        <td style={{ ...tdA, fontWeight: 600, color: l.precoUn < l.minFaixa ? C.bad : C.ink }}>{brl(l.precoUn)}</td>
                        <td style={{ ...tdA, color: C.sub }}>{brl(l.minFaixa)}</td>
                        <td style={tdA}>{brl(l.receita)}</td>
                        <td style={tdA}>{brl(l.custoTot)}{l.economiaLogF > 0.005 && <div style={{ fontSize: 10, color: C.good }}>− {brl(l.economiaLogF)} log.</div>}</td>
                        <td style={{ ...tdA, fontFamily: "Sora", fontWeight: 700, color: l.lucroTot >= 0 ? C.ink : C.bad }}>{brl(l.lucroTot)}</td>
                        <td style={tdA}>{brl(l.lucroUn)}</td>
                        <td style={tdA}>{pct(l.margem)}</td>
                        <td style={tdA}>{round2(l.horasTot)}h</td>
                        <td style={{ ...tdA, color: l.lucroHora == null ? C.sub : l.lucroHora >= cHora ? C.good : l.lucroHora > 0 ? C.warn : C.bad }}>{l.lucroHora != null ? `${brl(l.lucroHora)}/h` : "—"}</td>
                        <td style={tdA}><span style={{ fontSize: 11, fontWeight: 700, color: l.status[1], background: `${l.status[1]}22`, padding: "3px 9px", borderRadius: 8 }}>{l.status[0]}</span></td>
                        <td style={tdA}><MiniBtn onClick={() => delFaixa(i)}>✕</MiniBtn></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ marginTop: 10 }}><Btn small ghost onClick={addFaixa}>＋ Adicionar faixa</Btn></div>
              <Hint>O <b>mínimo unitário cai com o volume</b>: a embalagem do lote se dilui entre as unidades e a embalagem individual de varejo sai da conta — essa é a economia real do atacado (coluna Custo, em verde). Mas os dois testes continuam: preço abaixo do mínimo da faixa é prejuízo garantido, e <b>lucro/hora</b> abaixo da sua hora ({brl(cHora)}/h) significa ocupar a impressora por dias rendendo pouco. Confira na aba Produção se a frota tem as horas livres antes de fechar.</Hint>
            </Card>
          )}
        </>)}
      </>)}
    </div>
  );
}

// ---------- ACADEMIA ----------
const AULAS = [
  { cap: "Cap. 1", titulo: "Vender muito ≠ lucrar", txt: "Pare de precificar por intuição: custo real + margem + estratégia de canal.", foco: "Conceito base", tab: "dashboard", free: true },
  { cap: "Cap. 3", titulo: "Custo de produção real", txt: "Material com perdas, energia real, mão de obra, manutenção/depreciação por hora e provisão de falhas.", foco: "1 · Precificar", tab: "calc", free: true },
  { cap: "Cap. 6", titulo: "Custo de marketplace", txt: "Comissão, taxa e tarifa fixa mudam o preço mínimo por canal.", foco: "1 · Precificar · campo Canal", tab: "calc" },
  { cap: "Cap. 7", titulo: "ROAS meta e limite de ads", txt: "ROAS meta = 1 / ACOS máximo. Abaixo disso, vende mas corrói margem.", foco: "Análise · ROAS", tab: "roas" },
  { cap: "Cap. 8", titulo: "Os três preços", txt: "Mínimo cobre custos, saudável adiciona lucro, premium sustenta posicionamento.", foco: "1 · Precificar · resultado", tab: "calc" },
  { cap: "Cap. 10", titulo: "Kitficação", txt: "Kit só vale se aumentar lucro absoluto e preservar a margem unitária.", foco: "Análise · Kitficação", tab: "kits" },
  { cap: "Cap. 12", titulo: "Gestão da operação", txt: "Acompanhe a esteira: produção, embalar, despacho. Ocupação alta pede atenção.", foco: "Dashboard · Pedidos", tab: "pedidos" },
];
// ============================================================
// FINANCEIRO — DRE (competência) | Caixa (regime de caixa) | Distribuição (pró-labore)
// ============================================================
function addMeses(d, n) { const x = new Date(d); const dia = x.getDate(); x.setMonth(x.getMonth() + n); if (x.getDate() < dia) x.setDate(0); return x; }

function LinhaFin({ k, v, neg, big, sub, cor }) {
  return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: big ? "10px 0" : "7px 0", borderBottom: `1px solid ${C.line}` }}>
    <div><span style={{ fontSize: big ? 14 : 13, color: big ? C.ink : C.sub, fontWeight: big ? 700 : 400 }}>{k}</span>{sub && <div style={{ fontSize: 11, color: C.sub, opacity: 0.7 }}>{sub}</div>}</div>
    <span style={{ fontFamily: "Sora", fontWeight: big ? 800 : 600, fontSize: big ? 20 : 14, color: cor || (neg ? C.bad : C.ink) }}>{neg && v > 0 ? "− " : ""}{brl(Math.abs(v))}</span></div>;
}

function Financeiro({ pedidos, setPedidos, produtos, config, setConfig, lancamentos, setLancamentos }) {
  const [sub, setSub] = React.useState("dre");
  const fin = config.fin || { proLabore: 0, reservaPct: 0.05, custosFixos: [] };
  const upFin = (patch) => setConfig((c) => ({ ...c, fin: { ...(c.fin || {}), ...patch } }));
  const canaisCfg = (config.canais && config.canais.length) ? config.canais : CANAIS;
  const canalDe = (nome) => canaisCfg.find((c) => c.nome === nome) || { comissao: 0, pgto: 0, tarifa: 0, repasseDias: 0 };
  const brutoPedido = (p) => (p.itens || []).reduce((a, i) => a + (i.preco || 0) * (i.qtd || 1), 0);
  const qtdPedido = (p) => (p.itens || []).reduce((a, i) => a + (i.qtd || 1), 0);
  const custoPedido = (p) => (p.itens || []).reduce((a, i) => { const pr = produtos.find((x) => x.sku === i.sku); return a + (pr ? (pr.custo || 0) : 0) * (i.qtd || 1); }, 0);

  const despachados = pedidos.filter((p) => p.etapa === "Despachado");
  // Recebíveis: pedidos despachados OU com pagamento registrado (venda direta cobrada antes do despacho)
  const cart = config.cartao || {};
  const recPagasDe = (p) => p.parcelasPagas || (p.recebido ? { 1: p.recebidoEm || p.data } : {});
  const elegiveis = pedidos.filter((p) => p.etapa === "Despachado" || (p.pagamento && p.pagamento.forma));
  const recebiveis = [];
  elegiveis.forEach((p) => {
    const c = canalDe(p.canal); const bruto = brutoPedido(p); const qtd = qtdPedido(p);
    const pg = p.pagamento && p.pagamento.forma ? p.pagamento : null;
    const pagas = recPagasDe(p);
    const dBase = pg && pg.dataVenda ? parseDataBR(pg.dataVenda) : parseDataBR(p.data);
    if (pg && pg.forma === "credito" && (pg.parcelas || 1) > 1 && cart.porParcela !== false) {
      // crédito parcelado recebido por parcela: 1 recebível por mês
      const n = pg.parcelas;
      const liqTotal = Math.max(0, bruto * (1 - taxaPgtoPedido(pg, c, cart)));
      for (let k = 1; k <= n; k++) {
        recebiveis.push({ ped: p, parcela: k, totParc: n, canal: p.canal || "—", forma: pg.forma,
          bruto: round2(bruto / n), liquido: round2(liqTotal / n),
          prev: dBase ? addDias(dBase, 30 * k) : null, recebido: !!pagas[k], recebidoEm: pagas[k] });
      }
    } else if (pg) {
      // venda direta com pagamento único (pix, dinheiro, débito, crédito à vista ou antecipado)
      const taxa = taxaPgtoPedido(pg, c, cart);
      const dias = pg.forma === "credito" ? (cart.repasseDias != null ? cart.repasseDias : 30) : pg.forma === "debito" ? 1 : 0;
      recebiveis.push({ ped: p, parcela: 1, totParc: 1, canal: p.canal || "—", forma: pg.forma,
        bruto, liquido: Math.max(0, bruto * (1 - taxa)),
        prev: dBase ? addDias(dBase, dias) : null, recebido: !!pagas[1], recebidoEm: pagas[1] });
    } else {
      // marketplace: repasse do canal após o despacho
      const liquido = Math.max(0, bruto * (1 - (c.comissao || 0) - (c.pgto || 0)) - (c.tarifa || 0) * qtd);
      recebiveis.push({ ped: p, parcela: 1, totParc: 1, canal: p.canal || "—", forma: "",
        bruto, liquido, prev: dBase ? addDias(dBase, c.repasseDias || 0) : null, recebido: !!pagas[1], recebidoEm: pagas[1] });
    }
  });
  recebiveis.sort((a, b) => (a.prev ? a.prev.getTime() : 0) - (b.prev ? b.prev.getTime() : 0));

  // ---- seletor de mês ----
  const agora = new Date();
  const mesesSet = new Set([mesKeyOf(agora)]);
  despachados.forEach((p) => { const d = parseDataBR(p.data); if (d) mesesSet.add(mesKeyOf(d)); });
  recebiveis.forEach((r) => { if (r.recebidoEm) { const d = parseDataBR(r.recebidoEm); if (d) mesesSet.add(mesKeyOf(d)); } });
  lancamentos.forEach((l) => { const d = parseDataBR(l.data); if (d) mesesSet.add(mesKeyOf(d)); });
  const meses = Array.from(mesesSet).sort().reverse();
  const [mes, setMes] = React.useState(mesKeyOf(agora));

  // ---- DRE (competência: pedidos despachados no mês) ----
  const pedMes = despachados.filter((p) => { const d = parseDataBR(p.data); return d && mesKeyOf(d) === mes; });
  let receita = 0, taxasCanal = 0, custoPecas = 0;
  pedMes.forEach((p) => {
    const c = canalDe(p.canal); const b = brutoPedido(p);
    const pg = p.pagamento && p.pagamento.forma ? p.pagamento : null;
    const txPgto = taxaPgtoPedido(pg, c, cart);
    receita += b; taxasCanal += b * ((pg ? 0 : (c.comissao || 0)) + txPgto) + (pg ? 0 : (c.tarifa || 0) * qtdPedido(p));
    custoPecas += custoPedido(p);
  });
  const impostos = receita * (config.impostoTaxa || 0);
  const receitaLiq = receita - taxasCanal - impostos;
  const margemContrib = receitaLiq - custoPecas;
  const fixosTotal = (fin.custosFixos || []).reduce((a, f) => a + (f.valor || 0), 0);
  const proLabore = fin.proLabore || 0;
  const resultado = margemContrib - fixosTotal - proLabore;
  const mcPct = receita > 0 ? margemContrib / receita : 0;

  // ---- CAIXA ----
  const hojeD = new Date(); hojeD.setHours(0, 0, 0, 0);
  const em30 = addDias(hojeD, 30);
  const pendentes = recebiveis.filter((r) => !r.recebido);
  const aReceber30 = pendentes.filter((r) => r.prev && r.prev <= em30).reduce((a, r) => a + r.liquido, 0);
  const atrasados = pendentes.filter((r) => r.prev && r.prev < hojeD);
  const saidasPrev30 = lancamentos.filter((l) => l.tipo === "saida" && !l.pago && parseDataBR(l.data) && parseDataBR(l.data) <= em30).reduce((a, l) => a + (l.valor || 0), 0);
  const projecao30 = aReceber30 - saidasPrev30;

  const marcarRecebido = (id, parcela) => setPedidos((q) => q.map((p) => {
    if (p.id !== id) return p;
    const k = parcela || 1;
    const pagas = { ...(p.parcelasPagas || (p.recebido ? { 1: p.recebidoEm || p.data } : {})) };
    if (pagas[k]) delete pagas[k]; else pagas[k] = hoje();
    const todas = (p.pagamento && (p.pagamento.parcelas || 1) > 1) ? Object.keys(pagas).length >= p.pagamento.parcelas : !!pagas[1];
    return { ...p, parcelasPagas: pagas, recebido: todas, recebidoEm: todas ? (pagas[1] || hoje()) : undefined };
  }));

  // lançamentos manuais
  const [lf, setLf] = React.useState({ tipo: "saida", desc: "", valor: 0, data: hoje(), parcelas: 1 });
  const addLanc = () => {
    if (!lf.desc || !(lf.valor > 0)) { alert("Preencha a descrição e um valor maior que zero."); return; }
    const d0 = parseDataBR(lf.data); if (!d0) { alert("Data inválida. Use o formato DD/MM/AAAA."); return; }
    const n = lf.tipo === "saida" ? Math.max(1, Math.round(lf.parcelas || 1)) : 1;
    const novos = [];
    for (let k = 0; k < n; k++) {
      novos.push({ id: "L-" + Date.now() + "-" + k, tipo: lf.tipo, desc: lf.desc + (n > 1 ? ` (${k + 1}/${n})` : ""), valor: round2(lf.valor / n), data: fmtBR(addMeses(d0, k)), pago: k === 0 && lf.tipo === "entrada" });
    }
    setLancamentos((arr) => [...novos, ...arr]);
    setLf({ tipo: lf.tipo, desc: "", valor: 0, data: hoje(), parcelas: 1 });
  };
  const togglePago = (id) => setLancamentos((arr) => arr.map((l) => l.id === id ? { ...l, pago: !l.pago } : l));
  const delLanc = (id) => { if (confirm("Excluir este lançamento?")) setLancamentos((arr) => arr.filter((l) => l.id !== id)); };
  const lancOrdenados = [...lancamentos].sort((a, b) => { const da = parseDataBR(a.data), db = parseDataBR(b.data); return (db ? db.getTime() : 0) - (da ? da.getTime() : 0); });

  // ---- DISTRIBUIÇÃO (regime de caixa do mês selecionado) ----
  const recMes = recebiveis.filter((r) => { if (!r.recebido) return false; const d = parseDataBR(r.recebidoEm || r.ped.data); return d && mesKeyOf(d) === mes; });
  const recLiq = recMes.reduce((a, r) => a + r.liquido, 0);
  const recBruto = recMes.reduce((a, r) => a + r.bruto, 0);
  const entrMan = lancamentos.filter((l) => l.tipo === "entrada" && l.pago && parseDataBR(l.data) && mesKeyOf(parseDataBR(l.data)) === mes).reduce((a, l) => a + (l.valor || 0), 0);
  const saidasPg = lancamentos.filter((l) => l.tipo === "saida" && l.pago && parseDataBR(l.data) && mesKeyOf(parseDataBR(l.data)) === mes).reduce((a, l) => a + (l.valor || 0), 0);
  const baseCaixa = recLiq + entrMan;
  const provImp = recBruto * (config.impostoTaxa || 0);
  const aposCustos = baseCaixa - provImp - saidasPg - fixosTotal;
  const reserva = Math.max(0, aposCustos) * (fin.reservaPct || 0);
  const disponivel = aposCustos - reserva;
  const cobertura = proLabore > 0 ? Math.max(0, Math.min(1, disponivel / proLabore)) : 0;
  const lucroRetido = Math.max(0, disponivel - proLabore);
  // ponto de equilíbrio (vendas brutas necessárias p/ cobrir fixos + pró-labore, pela MC% do mês)
  const vendasNecessarias = mcPct > 0 ? (fixosTotal + proLabore) / mcPct : 0;

  // custos fixos (edição)
  const updFixo = (i, patch) => upFin({ custosFixos: (fin.custosFixos || []).map((f, k) => k === i ? { ...f, ...patch } : f) });
  const addFixo = () => upFin({ custosFixos: [...(fin.custosFixos || []), { nome: "Novo custo fixo", valor: 0 }] });
  const delFixo = (i) => upFin({ custosFixos: (fin.custosFixos || []).filter((_, k) => k !== i) });

  const statusRec = (r) => {
    if (r.recebido) return <Tag t="Recebido" />;
    if (!r.prev) return <Tag t="—" />;
    if (r.prev < hojeD) return <span style={{ fontSize: 11, fontWeight: 700, color: C.bad, background: `${C.bad}22`, padding: "3px 9px", borderRadius: 8 }}>Atrasado</span>;
    if (r.prev.getTime() === hojeD.getTime()) return <span style={{ fontSize: 11, fontWeight: 700, color: C.warn, background: `${C.warn}22`, padding: "3px 9px", borderRadius: 8 }}>Hoje</span>;
    return <span style={{ fontSize: 11, fontWeight: 700, color: C.sub, background: `${C.sub}22`, padding: "3px 9px", borderRadius: 8 }}>Previsto</span>;
  };
  const tdS = { padding: "8px 6px", fontSize: 13 };
  const thS = { padding: "8px 6px", fontSize: 11, color: C.sub, textAlign: "left", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
        <div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22 }}>Financeiro</div>
          <div style={{ fontSize: 13, color: C.sub, marginTop: 3 }}>DRE mostra se você lucra. Caixa mostra quando o dinheiro entra. Distribuição mostra quanto pode tirar.</div>
        </div>
        <select value={mes} onChange={(e) => setMes(e.target.value)} style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 12px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
          {meses.map((m) => <option key={m} value={m}>{mesLabel(m)}</option>)}
        </select>
      </div>

      <Fonte value={sub} onChange={setSub} opcoes={[["dre", "📊 DRE (competência)"], ["caixa", "💵 Caixa"], ["dist", "🪙 Distribuição"]]} />

      {/* ================= DRE ================= */}
      {sub === "dre" && (
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
          <Card title={`DRE de ${mesLabel(mes)} — regime de competência`} style={{ flex: 2, minWidth: 340 }}>
            <LinhaFin k="Receita bruta" sub={`${pedMes.length} pedido(s) despachado(s) no mês`} v={receita} big />
            <LinhaFin k="Comissões, taxas e tarifas dos canais" v={taxasCanal} neg />
            <LinhaFin k={`Impostos (${pct(config.impostoTaxa || 0)})`} v={impostos} neg />
            <LinhaFin k="Receita líquida" v={receitaLiq} big />
            <LinhaFin k="Custo das peças vendidas" sub="produção + despacho (do catálogo)" v={custoPecas} neg />
            <LinhaFin k={`Margem de contribuição (${pct(mcPct)})`} v={margemContrib} big cor={margemContrib >= 0 ? C.accent2 : C.bad} />
            <LinhaFin k="Custos fixos do negócio" v={fixosTotal} neg />
            <LinhaFin k="Pró-labore (seu salário alvo)" v={proLabore} neg />
            <LinhaFin k="Resultado do mês" v={resultado} big cor={resultado >= 0 ? C.good : C.bad} />
            <Hint>A DRE reconhece a venda no mês do <b>despacho</b>, independente de quando o dinheiro cai (isso é o regime de competência). Compras de insumo não aparecem aqui — viram estoque e entram como custo quando a peça é vendida.</Hint>
          </Card>
          <Card title="Leitura rápida" style={{ flex: 1, minWidth: 280 }}>
            <BigStat label="Margem de contribuição" value={pct(mcPct)} hint="quanto sobra de cada R$ vendido" accent />
            <BigStat label="Ponto de equilíbrio" value={vendasNecessarias > 0 ? brl(vendasNecessarias) : "—"} hint="vendas brutas/mês p/ cobrir fixos + pró-labore" />
            <BigStat label="Vendido este mês" value={brl(receita)} hint={receita >= vendasNecessarias && vendasNecessarias > 0 ? "meta atingida ✓" : vendasNecessarias > 0 ? `faltam ${brl(Math.max(0, vendasNecessarias - receita))}` : "sem vendas no mês"} />
            <Hint>Se o resultado é positivo mas o caixa aperta, o dinheiro está preso nos repasses — veja a aba Caixa. Se o caixa está bom mas o resultado é negativo, você pode estar consumindo capital de giro.</Hint>
          </Card>
        </div>
      )}

      {/* ================= CAIXA ================= */}
      {sub === "caixa" && (<>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(170px,1fr))", gap: 12, marginBottom: 16 }}>
          <KPI label="A receber (30 dias)" value={brl(aReceber30)} c={C.blue} />
          <KPI label="Repasses atrasados" value={`${atrasados.length} · ${brl(atrasados.reduce((a, r) => a + r.liquido, 0))}`} c={atrasados.length ? C.bad : C.good} />
          <KPI label="Saídas previstas (30 dias)" value={brl(saidasPrev30)} c={C.warn} />
          <KPI label="Projeção líquida (30 dias)" value={brl(projecao30)} c={projecao30 >= 0 ? C.good : C.bad} />
        </div>

        <Card title="Recebíveis — repasses dos pedidos despachados">
          {recebiveis.length === 0 && <Hint>Nenhum pedido despachado ainda. Quando um pedido chega em "Despachado" no kanban, ele aparece aqui com a data prevista de repasse do canal (configurável em Configurações → Canais).</Hint>}
          {recebiveis.length > 0 && (
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 700 }}>
                <thead><tr><th style={thS}>Pedido</th><th style={thS}>Cliente</th><th style={thS}>Canal / forma</th><th style={thS}>Venda</th><th style={thS}>Repasse previsto</th><th style={thS}>Líquido</th><th style={thS}>Status</th><th style={thS}></th></tr></thead>
                <tbody>
                  {recebiveis.map((r) => (
                    <tr key={r.ped.id + "-" + r.parcela} style={{ borderTop: `1px solid ${C.line}`, opacity: r.recebido ? 0.65 : 1 }}>
                      <td style={{ ...tdS, fontWeight: 600 }}>{r.ped.id}{r.totParc > 1 && <span style={{ color: C.sub, fontWeight: 400 }}> · {r.parcela}/{r.totParc}</span>}</td>
                      <td style={tdS}>{r.ped.cliente}</td>
                      <td style={tdS}>{r.canal}{r.forma && <div style={{ fontSize: 10, color: C.accent2 }}>{FORMAS_PGTO[r.forma] || r.forma}{r.forma === "credito" && r.totParc > 1 ? ` ${r.totParc}×` : ""}</div>}</td>
                      <td style={tdS}>{r.ped.pagamento && r.ped.pagamento.dataVenda ? r.ped.pagamento.dataVenda : r.ped.data}</td>
                      <td style={tdS}>{fmtBR(r.prev)}</td>
                      <td style={{ ...tdS, fontFamily: "Sora", fontWeight: 700 }}>{brl(r.liquido)}<div style={{ fontSize: 10, color: C.sub, fontWeight: 400 }}>bruto {brl(r.bruto)}</div></td>
                      <td style={tdS}>{statusRec(r)}</td>
                      <td style={tdS}><Btn small ghost={r.recebido} onClick={() => marcarRecebido(r.ped.id, r.parcela)}>{r.recebido ? "Desfazer" : "✓ Recebi"}</Btn></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <Hint>O líquido estimado desconta comissão, taxa de pagamento e tarifa do canal. Impostos não são descontados aqui — eles são provisionados na Distribuição.</Hint>
        </Card>

        <Card title="Lançamentos manuais — compras, contas e outras entradas/saídas" style={{ marginTop: 16 }}>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div style={{ width: 150 }}><Sel label="Tipo" value={lf.tipo === "saida" ? "Saída (pagar)" : "Entrada (receber)"} onChange={(v) => setLf({ ...lf, tipo: v.startsWith("Saída") ? "saida" : "entrada" })} options={["Saída (pagar)", "Entrada (receber)"]} /></div>
            <div style={{ flex: 2, minWidth: 160 }}><F label="Descrição" text value={lf.desc} onChange={(v) => setLf({ ...lf, desc: v })} /></div>
            <div style={{ width: 110 }}><F label="Valor total (R$)" value={lf.valor} onChange={(v) => setLf({ ...lf, valor: v })} /></div>
            <div style={{ width: 120 }}><F label="Data (1ª parcela)" text value={lf.data} onChange={(v) => setLf({ ...lf, data: v })} /></div>
            {lf.tipo === "saida" && <div style={{ width: 90 }}><F label="Parcelas" value={lf.parcelas} onChange={(v) => setLf({ ...lf, parcelas: v })} /></div>}
            <div style={{ marginBottom: 12 }}><Btn small onClick={addLanc}>+ Lançar</Btn></div>
          </div>
          <Hint>Compra parcelada no cartão? Lance o valor total com o nº de parcelas — o sistema cria um desencaixe por mês. Marque cada parcela como paga quando a fatura fechar. Lembre: a compra de insumo entra no caixa aqui, mas na DRE ela vira estoque (não despesa).</Hint>
          {lancOrdenados.length > 0 && (
            <div style={{ overflowX: "auto", marginTop: 8 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 560 }}>
                <thead><tr><th style={thS}>Pago</th><th style={thS}>Data</th><th style={thS}>Descrição</th><th style={thS}>Tipo</th><th style={thS}>Valor</th><th style={thS}></th></tr></thead>
                <tbody>
                  {lancOrdenados.map((l) => (
                    <tr key={l.id} style={{ borderTop: `1px solid ${C.line}`, opacity: l.pago ? 0.65 : 1 }}>
                      <td style={tdS}><input type="checkbox" checked={!!l.pago} onChange={() => togglePago(l.id)} style={{ accentColor: C.accent, width: 16, height: 16, cursor: "pointer" }} /></td>
                      <td style={tdS}>{l.data}</td>
                      <td style={tdS}>{l.desc}</td>
                      <td style={tdS}><span style={{ fontSize: 11, fontWeight: 700, color: l.tipo === "saida" ? C.bad : C.good }}>{l.tipo === "saida" ? "Saída" : "Entrada"}</span></td>
                      <td style={{ ...tdS, fontFamily: "Sora", fontWeight: 700, color: l.tipo === "saida" ? C.bad : C.good }}>{l.tipo === "saida" ? "−" : "+"} {brl(l.valor)}</td>
                      <td style={tdS}><MiniBtn onClick={() => delLanc(l.id)}>✕</MiniBtn></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      </>)}

      {/* ================= DISTRIBUIÇÃO ================= */}
      {sub === "dist" && (
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
          <Card title={`Cascata de ${mesLabel(mes)} — o que dá para tirar`} style={{ flex: 2, minWidth: 340 }}>
            <LinhaFin k="Recebido no mês (líquido dos canais)" sub={`${recMes.length} repasse(s) confirmado(s) + entradas manuais`} v={baseCaixa} big />
            <LinhaFin k={`Provisão de impostos (${pct(config.impostoTaxa || 0)} s/ bruto recebido)`} v={provImp} neg />
            <LinhaFin k="Compras e saídas pagas no mês" sub="lançamentos marcados como pagos" v={saidasPg} neg />
            <LinhaFin k="Custos fixos do negócio" v={fixosTotal} neg />
            <LinhaFin k={`Reserva de segurança (${pct(fin.reservaPct || 0)})`} v={reserva} neg />
            <LinhaFin k="Disponível para pró-labore" v={disponivel} big cor={disponivel >= proLabore ? C.good : disponivel > 0 ? C.warn : C.bad} />
            <div style={{ margin: "14px 0 6px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                <span style={{ color: C.sub }}>Cobertura do seu salário alvo ({brl(proLabore)})</span>
                <b style={{ color: cobertura >= 1 ? C.good : C.warn }}>{pct(cobertura)}</b>
              </div>
              <div style={{ height: 10, background: C.bg, borderRadius: 6, overflow: "hidden" }}>
                <div style={{ width: `${cobertura * 100}%`, height: "100%", background: cobertura >= 1 ? C.good : C.warn, borderRadius: 6, transition: "width .3s" }} />
              </div>
            </div>
            {disponivel >= proLabore && proLabore > 0 && <Hint>✓ O mês cobre seu pró-labore. Saque até <b style={{ color: C.good }}>{brl(proLabore)}</b> e ainda sobra <b>{brl(lucroRetido)}</b> de lucro retido — divida entre reinvestimento e bônus do dono.</Hint>}
            {disponivel < proLabore && disponivel > 0 && <Hint>⚠ O mês cobre só parte do seu salário. Disponível: <b>{brl(disponivel)}</b> (faltam {brl(proLabore - disponivel)}). Opções: sacar menos este mês, puxar da reserva acumulada, ou olhar o ponto de equilíbrio na DRE.</Hint>}
            {disponivel <= 0 && <Hint>✗ Sem saldo disponível para pró-labore este mês. Confirme se os repasses foram marcados como recebidos na aba Caixa antes de concluir.</Hint>}
            <Hint>Regra de ouro: distribua só no fechamento do mês, nunca conforme o dinheiro entra. A cascata roda sobre o <b>caixa realizado</b> — vendas ainda não repassadas não contam.</Hint>
          </Card>

          <Card title="Parâmetros da distribuição" style={{ flex: 1, minWidth: 290 }}>
            <F label="Pró-labore alvo mensal (R$)" value={fin.proLabore} step={100} onChange={(v) => upFin({ proLabore: v })} suffix="R$" />
            <F label="Reserva de segurança (%)" value={round2((fin.reservaPct || 0) * 100)} step={1} onChange={(v) => upFin({ reservaPct: (v || 0) / 100 })} suffix="%" />
            <div style={{ margin: "14px 0 8px" }}><Label>Custos fixos mensais</Label></div>
            {(fin.custosFixos || []).map((f, i) => (
              <div key={i} style={{ display: "flex", gap: 6, marginBottom: 8, alignItems: "center" }}>
                <input type="text" value={f.nome} onChange={(e) => updFixo(i, { nome: e.target.value })} style={{ flex: 2, background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "7px 9px", borderRadius: 7, fontSize: 13, fontFamily: "inherit", minWidth: 0 }} />
                <div style={{ flex: 1, minWidth: 80 }}><NumCellCfg value={f.valor} onChange={(v) => updFixo(i, { valor: v })} /></div>
                <MiniBtn onClick={() => delFixo(i)}>✕</MiniBtn>
              </div>
            ))}
            <Btn small ghost onClick={addFixo}>+ Adicionar custo fixo</Btn>
            <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${C.line}`, display: "flex", justifyContent: "space-between", fontSize: 13 }}>
              <span style={{ color: C.sub }}>Total fixos + pró-labore</span><b style={{ fontFamily: "Sora" }}>{brl(fixosTotal + proLabore)}</b>
            </div>
            <Hint>Internet, contador, assinaturas, aluguel do espaço… Tudo que existe mesmo sem vender nada. Estes valores também entram na DRE.</Hint>
          </Card>
        </div>
      )}
    </div>
  );
}

// Célula numérica compacta para tabelas (decimal BR; pct=true exibe/recebe em %)
function NumCellCfg({ value, onChange, pct }) {
  const [draft, setDraft] = React.useState(null);
  const inS = { width: "100%", minWidth: 56, background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "6px 8px", borderRadius: 7, fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" };
  const show = draft != null ? draft : String(pct ? round2((value || 0) * 100) : (value || 0)).replace(".", ",");
  return <input type="text" inputMode="decimal" value={show} style={inS}
    onChange={(e) => { const v = e.target.value; setDraft(v); const n = parseFloat(v.replace(",", ".")); if (!isNaN(n)) onChange(pct ? n / 100 : n); else if (v === "") onChange(0); }}
    onBlur={() => setDraft(null)} />;
}

  const updCanal = (idx, patch) => up({ canais: (config.canais || []).map((c, i) => (i === idx ? { ...c, ...patch } : c)) });
  const addCanal = () => up({ canais: [...(config.canais || []), { nome: "Novo canal", comissao: 0.15, pgto: 0, tarifa: 0, ads: 0.08, frete: 0, seg: 0.03, repasseDias: 14 }] });
  const delCanal = (idx) => { if (confirm("Remover este canal?")) up({ canais: (config.canais || []).filter((_, i) => i !== idx) }); };
  const restaurarCanais = () => { if (confirm("Restaurar os canais para o padrão do sistema?")) up({ canais: JSON.parse(JSON.stringify(CANAIS)) }); };

  const onImportFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => { try { importarBackup(JSON.parse(reader.result)); } catch { alert("Não foi possível ler o arquivo. Verifique se é um backup válido (.json)."); } };
    reader.readAsText(f);
    e.target.value = "";

  const thS = { padding: "8px 6px", fontSize: 11, color: C.sub, textAlign: "left", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" };

        {/* ===== MÃO DE OBRA ===== */}

            opcoes={[["hora", "Valor por hora direto"], ["salario", "Derivar de um salário"]]} />
          {config.moModo !== "salario" && (
            <F label="Custo da sua hora de trabalho (R$/h)" value={config.moHoraDireta} step={1} onChange={(v) => up({ moHoraDireta: v })} suffix="R$/h" />
          )}
          {config.moModo === "salario" && (<>
            <Row>
              <F label="Salário / pró-labore mensal (R$)" value={config.salarioBase} step={100} onChange={(v) => up({ salarioBase: v })} suffix="R$" />
              <F label="Multiplicador de encargos" value={config.encargosMult} step={0.05} onChange={(v) => up({ encargosMult: v })} suffix="×" />
            </Row>
            <div style={{ display: "flex", gap: 6, marginTop: -4, marginBottom: 12, flexWrap: "wrap" }}>
              {[["Sem encargos", 1.0], ["Pró-labore (~1,3×)", 1.3], ["CLT (~1,7×)", 1.7]].map(([lbl, m]) => (
                <button key={lbl} onClick={() => up({ encargosMult: m })}
                  style={{ background: Math.abs((config.encargosMult || 1) - m) < 0.001 ? C.accent : C.panel2, color: Math.abs((config.encargosMult || 1) - m) < 0.001 ? "#1a1207" : C.sub, border: `1px solid ${C.line}`, borderRadius: 7, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{lbl}</button>
              ))}
            </div>
            <Row>
              <F label="Horas trabalhadas por mês" value={config.horasMes} step={4} onChange={(v) => up({ horasMes: v })} suffix="h" />
              <F label="% do tempo produtivo (0–1)" value={config.pctProdutivo} step={0.05} onChange={(v) => up({ pctProdutivo: v })} />
            </Row>
            <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 14px", marginTop: 4 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub, marginBottom: 4 }}>
                <span>Custo mensal (salário × encargos)</span><b style={{ color: C.ink }}>{brl(custoMensalMO)}</b></div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub, marginBottom: 8 }}>
                <span>Horas produtivas no mês</span><b style={{ color: C.ink }}>{round2(horasProd)} h</b></div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                <span style={{ fontSize: 13 }}>Custo da hora calculado</span>
                <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: C.accent2 }}>{brl(custoHora)}<span style={{ fontSize: 12, color: C.sub, fontWeight: 400 }}>/h</span></span></div>
            </div>
            <Hint>O tempo produtivo é a fração das suas horas realmente dedicada às peças (setup, retirada, acabamento, embalagem). Atendimento, compras e pausas ficam de fora — usar 100% subprecifica o seu trabalho.</Hint>
          </>)}
          <Hint>Este valor aparece como sugestão na etapa de mão de obra do Precificar (botão "Aplicar").</Hint>
        </Card>

        {/* ===== PARÂMETROS DE PRECIFICAÇÃO ===== */}
        <Card title="Parâmetros de precificação" style={{ flex: 1, minWidth: 330 }}>
          <Row>
            <F label="Lucro-alvo padrão por peça (R$)" value={config.lucroAlvoRS} step={1} onChange={(v) => up({ lucroAlvoRS: v })} suffix="R$" />
            <F label="Markup do preço premium (%)" value={round2((config.markupPremium || 0) * 100)} step={1} onChange={(v) => up({ markupPremium: (v || 0) / 100 })} suffix="%" />
          </Row>
          <Row>
            <F label="Tarifa de energia padrão (R$/kWh)" value={config.tarifaEnergia} step={0.05} onChange={(v) => up({ tarifaEnergia: v })} suffix="R$" />
            <div />
          </Row>
          <Sel label="Regime de imposto padrão" value={config.impostoRegime || "Simples Nacional"} onChange={(v) => { const reg = IMPOSTOS.find((x) => x.regime === v); up({ impostoRegime: v, impostoTaxa: reg ? reg.taxa : config.impostoTaxa }); }} options={IMPOSTOS.map((x) => x.regime)} />
          <F label="Taxa de imposto padrão (%)" value={round2((config.impostoTaxa || 0) * 100)} step={0.5} onChange={(v) => up({ impostoTaxa: (v || 0) / 100 })} suffix="%" />
          <Hint>O lucro-alvo e o preço premium alimentam o Precificar; a tarifa de energia vira o padrão de novas máquinas cadastradas.</Hint>
        </Card>
      </div>

      {/* ===== CANAIS DE VENDA ===== */}
      <Card title="Canais de venda (padrões do sistema)" style={{ marginTop: 16 }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 760 }}>
            <thead><tr>
              <th style={{ ...thS, minWidth: 130 }}>Canal</th><th style={thS}>Comissão %</th><th style={thS}>Tx. pgto %</th>
              <th style={thS}>Tarifa fixa R$</th><th style={thS}>Ads %</th><th style={thS}>Reserva %</th><th style={thS}>Repasse (dias)</th><th style={thS}></th>
            </tr></thead>
            <tbody>
              {(config.canais || []).map((c, i) => (
                <tr key={i} style={{ borderTop: `1px solid ${C.line}` }}>
                  <td style={{ padding: "6px 6px" }}><input type="text" value={c.nome} style={{ ...inS, minWidth: 120 }} onChange={(e) => updCanal(i, { nome: e.target.value })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell pct value={c.comissao} onChange={(v) => updCanal(i, { comissao: v })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell pct value={c.pgto} onChange={(v) => updCanal(i, { pgto: v })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell value={c.tarifa} onChange={(v) => updCanal(i, { tarifa: v })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell pct value={c.ads} onChange={(v) => updCanal(i, { ads: v })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell pct value={c.seg} onChange={(v) => updCanal(i, { seg: v })} /></td>
                  <td style={{ padding: "6px 6px" }}><NumCell value={c.repasseDias} onChange={(v) => updCanal(i, { repasseDias: Math.max(0, Math.round(v)) })} /></td>
                  <td style={{ padding: "6px 6px" }}><MiniBtn onClick={() => delCanal(i)}>✕</MiniBtn></td>

              ))}

          </table>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          <Btn small ghost onClick={addCanal}>+ Adicionar canal</Btn>
          <Btn small ghost onClick={restaurarCanais}>Restaurar padrão</Btn>
        </div>

      </Card>

      {/* ===== CARTÃO (VENDA DIRETA) ===== */}
      <Card title="Cartão — venda direta (maquininha / gateway)" style={{ marginTop: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 130 }}><F label="Taxa débito (%)" value={round2(((config.cartao || {}).taxaDebito || 0) * 100)} step={0.1} onChange={(v) => up({ cartao: { ...(config.cartao || {}), taxaDebito: (v || 0) / 100 } })} suffix="%" /></div>
          <div style={{ flex: 1, minWidth: 130 }}><F label="Crédito à vista (%)" value={round2(((config.cartao || {}).taxaVista || 0) * 100)} step={0.1} onChange={(v) => up({ cartao: { ...(config.cartao || {}), taxaVista: (v || 0) / 100 } })} suffix="%" /></div>
          <div style={{ flex: 1, minWidth: 130 }}><F label="Crédito parcelado (%)" value={round2(((config.cartao || {}).taxaParcela || 0) * 100)} step={0.1} onChange={(v) => up({ cartao: { ...(config.cartao || {}), taxaParcela: (v || 0) / 100 } })} suffix="%" /></div>
          <div style={{ flex: 1, minWidth: 130 }}><F label="Repasse do crédito (dias)" value={(config.cartao || {}).repasseDias != null ? config.cartao.repasseDias : 30} step={1} onChange={(v) => up({ cartao: { ...(config.cartao || {}), repasseDias: Math.max(0, Math.round(v)) } })} suffix="dias" /></div>
        </div>
        <Fonte value={(config.cartao || {}).porParcela === false ? "antecipado" : "parcela"} onChange={(v) => up({ cartao: { ...(config.cartao || {}), porParcela: v === "parcela" } })}
          opcoes={[["parcela", "Recebo por parcela (1/mês)"], ["antecipado", "Recebo antecipado (tudo em D+X)"]]} />
        <Hint>Usado quando um orçamento é aprovado com pagamento em cartão. No modo parcelado, cada parcela vira um recebível mensal no Financeiro; no antecipado, o valor inteiro entra no prazo de repasse (taxa de antecipação já deve estar embutida na taxa de crédito parcelado).</Hint>
      </Card>

      {/* ===== CONDIÇÕES COMERCIAIS ===== */}
      <Card title="Condições comerciais (padrão dos orçamentos)" style={{ marginTop: 16 }}>
        <Row>
          <F label="Nome da empresa / marca" text value={cond.empresa} onChange={(v) => upCond({ empresa: v })} />
          <F label="Contato (WhatsApp / e-mail)" text value={cond.contatoEmpresa} onChange={(v) => upCond({ contatoEmpresa: v })} />
        </Row>
        <Row>
          <F label="Sinal para iniciar produção (%)" value={cond.sinal} step={5} onChange={(v) => upCond({ sinal: v })} suffix="%" />
          <F label="Validade do orçamento" text value={cond.validade} onChange={(v) => upCond({ validade: v })} />
        </Row>
        <Row>
          <F label="Prazo de produção" text value={cond.prazoProducao} onChange={(v) => upCond({ prazoProducao: v })} />
          <F label="Prazo de entrega" text value={cond.prazoEntrega} onChange={(v) => upCond({ prazoEntrega: v })} />
        </Row>
        <F label="Forma de pagamento" text value={cond.pagamento} onChange={(v) => upCond({ pagamento: v })} />
        <Hint>Estes valores preenchem automaticamente os orçamentos novos (PDF e WhatsApp) e podem ser ajustados por orçamento.</Hint>
      </Card>

      {/* ===== DADOS E BACKUP ===== */}
      <Card title="Dados e backup" style={{ marginTop: 16 }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Btn small onClick={exportarBackup}>⬇ Exportar backup (.json)</Btn>
          <Btn small ghost onClick={() => fileRef.current && fileRef.current.click()}>⬆ Importar backup</Btn>
          <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={onImportFile} />
          <Btn small ghost onClick={() => { if (confirm("Isso apaga TODOS os dados (produtos, insumos, máquinas, pedidos, orçamentos e configurações). Tem certeza?") && confirm("Última confirmação: deseja realmente zerar tudo? Esta ação não pode ser desfeita.")) resetDados(); }}>🗑 Zerar todos os dados</Btn>
        </div>
        <Hint>O backup inclui catálogo, insumos, máquinas, orçamentos, pedidos, condições comerciais e estas configurações. Exporte regularmente — especialmente antes de importar dados ou trocar de dispositivo.</Hint>
      </Card>
    </div>
  );
}

  ];

  const [solPendente, setSolPendente] = React.useState(null);
  const [enviando, setEnviando] = React.useState(false);
  const [feedback, setFeedback] = React.useState(null);

  React.useEffect(() => {
    if (!userEmail) return;
    getSolicitacoesByEmail(userEmail).then((list) => {
      const pend = list.find((s) => s.status === "pendente");
      setSolPendente(pend || null);
    });
  }, [userEmail]);

  const handleSolicitar = (planoNome) => {
    if (!userEmail || enviando) return;
    setEnviando(true);
    cancelarSolicitacaoPendente(userEmail).then(() => {
      return criarSolicitacaoPlano(userEmail, plan, planoNome);
    }).then(() => {
      setSolPendente({ planoSolicitado: planoNome, status: "pendente" });
      setFeedback("Solicitação enviada! O administrador irá aprovar em breve.");
      setEnviando(false);
    }).catch(() => { setEnviando(false); });
  };

  const handleCancelar = () => {
    if (!userEmail) return;
    cancelarSolicitacaoPendente(userEmail).then(() => {
      setSolPendente(null);
      setFeedback(null);
    });
  };

  return (
    <div onClick={close} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}>

        <div style={{ color: C.sub, fontSize: 14, marginBottom: 22 }}>Mudanças de plano requerem aprovação do administrador.</div>

        {feedback && (
          <div style={{ background: `${C.good}22`, border: `1px solid ${C.good}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: C.good, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>✓ {feedback}</span>
            <button onClick={() => setFeedback(null)} style={{ background: "none", border: "none", color: C.sub, cursor: "pointer", fontSize: 16 }}>×</button>
          </div>
        )}

        {solPendente && (
          <div style={{ background: `${C.warn}18`, border: `1px solid ${C.warn}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: C.warn, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <span>⏳ Solicitação de upgrade para <b>{solPendente.planoSolicitado}</b> aguardando aprovação.</span>
            <button onClick={handleCancelar} style={{ background: "transparent", border: `1px solid ${C.warn}`, color: C.warn, padding: "4px 10px", borderRadius: 7, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancelar solicitação</button>
          </div>
        )}

        <div className="grid-3" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14 }}>
          {planos.map((p) => {
            const ehAtual = plan === p.nome;
            const solicitado = solPendente && solPendente.planoSolicitado === p.nome;
            let btnLabel = "Solicitar";
            let btnDisabled = false;
            let btnBg = p.destaque ? C.accent : "transparent";
            let btnColor = p.destaque ? "#1a1207" : C.ink;
            if (ehAtual) { btnLabel = "Plano atual"; btnDisabled = true; btnBg = C.line; btnColor = C.sub; }
            else if (solicitado) { btnLabel = "⏳ Aguardando"; btnDisabled = true; btnBg = `${C.warn}30`; btnColor = C.warn; }
            else if (solPendente) { btnDisabled = true; }
            return (
              <div key={p.nome} style={{ background: C.panel, border: `1.5px solid ${p.destaque ? C.accent : C.line}`, borderRadius: 14, padding: 18, position: "relative" }}>
                {p.destaque && <div style={{ position: "absolute", top: -10, right: 14, background: C.accent, color: "#1a1207", fontSize: 10, fontWeight: 800, padding: "2px 8px", borderRadius: 8 }}>POPULAR</div>}
                <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: p.cor }}>{p.nome}</div>
                <div style={{ margin: "6px 0 14px" }}><span style={{ fontSize: 26, fontWeight: 800, fontFamily: "Sora" }}>{p.preco}</span><span style={{ color: C.sub, fontSize: 13 }}>{p.per}</span></div>
                {p.recursos.map((rc, i) => <div key={i} style={{ fontSize: 13, color: C.sub, marginBottom: 6 }}>{rc}</div>)}
                <button onClick={() => handleSolicitar(p.nome)} disabled={btnDisabled || enviando}
                  style={{ width: "100%", marginTop: 12, background: btnBg, border: `1px solid ${p.destaque ? C.accent : C.line}`, color: btnColor, padding: "9px", borderRadius: 9, fontWeight: 700, fontSize: 13, cursor: btnDisabled ? "default" : "pointer", fontFamily: "inherit", opacity: (btnDisabled && !ehAtual && !solicitado) ? 0.4 : 1 }}>
                  {enviando ? "Enviando..." : btnLabel}
                </button>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: `1px solid ${C.line}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <span style={{ fontSize: 12, color: C.sub }}>Usuário: <b style={{ color: C.ink }}>{userKey}</b> · dados salvos no navegador</span>

                style={{ background: "transparent", border: `1px solid ${C.line}`, color: C.sub, padding: "7px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>↺ Restaurar exemplos</button>
              <button onClick={() => { if (confirm("Zerar TODOS os dados deste usuário e sair? Esta ação não pode ser desfeita.")) { zerarUsuario(userKey); onLogout && onLogout(); } }}

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  const [respondendo, setRespondendo] = React.useState(null);
  const planos = ["Free", "Pro", "Studio"];

  const refresh = () => {
    setLoadingUsers(true);
    getUsuarios().then((list) => { setUsers(list); setLoadingUsers(false); });
    getSolicitacoesPendentes().then((list) => setSolicitacoes(list));
  };

  React.useEffect(() => { refresh(); }, []);

    setRespondendo(sol.id);

      setRespondendo(null);
      refresh();
    }).catch(() => setRespondendo(null));

function H({ title, sub }) { return <div style={{ marginBottom: 20 }}><div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 24, letterSpacing: -0.4 }}>{title}</div><div style={{ color: C.sub, fontSize: 14 }}>{sub}</div></div>; }
function Card({ children, title, style }) { return <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 20, ...style }}>{title && <Label>{title}</Label>}{children}</div>; }
function Label({ children }) { return <div style={{ fontSize: 12, color: C.sub, marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>{children}</div>; }
function ST({ n, t }) { return <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "16px 0 10px" }}><span style={{ width: 20, height: 20, borderRadius: 6, background: C.panel2, color: C.accent, fontSize: 11, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{n}</span><span style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 14 }}>{t}</span></div>; }
function Row({ children }) { return <div style={{ display: "flex", gap: 10 }}>{React.Children.map(children, (c) => <div style={{ flex: 1 }}>{c}</div>)}</div>; }
function F({ label, value, onChange, step = 1, suffix, text }) {
  // mantém o que o usuário está digitando; só converte para número no blur
  const [draft, setDraft] = React.useState(null);
  const display = draft != null ? draft : (text ? (value == null ? "" : value) : (value == null ? "" : String(value).replace(".", ",")));
  return <label style={{ display: "block", marginBottom: 12 }}>{label ? <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>{label}</div> : null}
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <input type="text" inputMode={text ? "text" : "decimal"} value={display}
        onChange={(e) => {
          const v = e.target.value;
          setDraft(v);
          if (text) onChange(v);
          else {
            const n = parseFloat(v.replace(",", "."));
            if (!isNaN(n)) onChange(n);
            else if (v === "" || v === "-") onChange(0);
          }
        }}
        onBlur={() => setDraft(null)}
        style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 14, fontFamily: "inherit" }} />
      {suffix && <span style={{ fontSize: 12, color: C.sub }}>{suffix}</span>}</div></label>;
}
function Sel({ label, value, onChange, options }) {
  return <label style={{ display: "block", marginBottom: 12 }}><div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>{label}</div>
    <select value={value} onChange={(e) => onChange(e.target.value)} style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 14, fontFamily: "inherit" }}>

function Btn({ children, onClick, ghost, full, small, disabled }) {

      width: full ? "100%" : "auto" }}>{children}</button>;
}
// Input de preço totalmente livre — só propaga no blur ou Enter
function PrecoLivreInput({ value, onChange, placeholder, fontSize, fontWeight }) {
  const [local, setLocal] = React.useState("");
  const [isFocused, setIsFocused] = React.useState(false);
  const focused = React.useRef(false);
  React.useEffect(() => {
    if (!focused.current) setLocal(String(value || "").replace(".", ","));
  }, [value]);
  const commit = () => {
    const n = parseFloat(local.replace(",", "."));
    if (!isNaN(n) && n >= 0) onChange(n);
    else setLocal(String(value || "").replace(".", ","));
  };
  return (
    <input type="text" inputMode="decimal" value={local}
      placeholder={placeholder || "0,00"}
      onChange={(e) => setLocal(e.target.value)}
      onFocus={() => { focused.current = true; setIsFocused(true); }}
      onBlur={() => { focused.current = false; setIsFocused(false); commit(); }}
      onKeyDown={(e) => e.key === "Enter" && commit()}
      style={{ width: "100%", background: C.bg,
        border: `1px solid ${isFocused ? C.accent : C.line}`, color: C.ink,
        padding: "10px 14px", borderRadius: 9, fontSize: fontSize || 20,
        fontWeight: fontWeight || 800, fontFamily: isFocused || (fontSize || 20) >= 18 ? "Sora, inherit" : "inherit",
        boxSizing: "border-box", outline: "none",
        transition: "border-color 0.15s" }} />
  );
}
