}
function Hint({ children }) { return <div style={{ fontSize: 12, color: C.sub, marginTop: 8, lineHeight: 1.5 }}>{children}</div>; }
function LinhaCusto({ k, v, bold, big }) {
  return <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: big ? 15 : 14 }}>
    <span style={{ color: big ? C.ink : C.sub, fontWeight: big || bold ? 700 : 400, fontFamily: big ? "Sora" : "inherit" }}>{k}</span>
    <span style={{ fontWeight: big || bold ? 800 : 600, color: big ? C.accent : C.ink, fontFamily: big ? "Sora" : "inherit" }}>{brl(v)}</span></div>;
}

// Distribuição (anatomia) do preço praticado: custos, taxas, receita/lucro
function Distribuicao({ r }) {
  const preco = r.precoPraticado || 0;
  const d = r.distrib;
  const itens = [
    { k: "Custo de produção", v: d.custoProducaoPeca, c: C.accent },
    { k: "Despacho", v: d.despacho, c: C.pink },
    { k: "Tarifa fixa + frete", v: d.tarifaFixa, c: "#c084fc" },
    { k: "Comissão do canal", v: d.comissao, c: C.blue },
    { k: "Taxa de pagamento", v: d.pagamento, c: "#38bdf8" },
    ...(d.usarAds ? [{ k: "Ads / marketing", v: d.ads, c: "#fb923c" }] : []),
    { k: `Imposto (${pct(r.taxaImposto)})`, v: d.imposto, c: C.warn },
    ...(d.usarSeg ? [{ k: "Reserva/segurança", v: d.seguranca, c: "#94a3b8" }] : []),
    { k: "Lucro líquido", v: d.lucro, c: d.lucro >= 0 ? C.good : C.bad },
  ];
  const pctDe = (v) => preco ? `${(v / preco * 100).toFixed(1)}%` : "0%";
  return (
    <div>
      {/* barra empilhada */}
      <div style={{ display: "flex", height: 26, borderRadius: 8, overflow: "hidden", marginBottom: 12, border: `1px solid ${C.line}` }}>
        {itens.filter((i) => i.v > 0).map((i, idx) => (
          <div key={idx} title={`${i.k}: ${pctDe(i.v)}`} style={{ width: `${preco ? Math.max(0, i.v / preco * 100) : 0}%`, background: i.c }} />
        ))}
      </div>
      {/* tabela */}
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <tbody>
          {itens.map((i, idx) => (
            <tr key={idx} style={{ borderTop: idx ? `1px solid ${C.line}` : "none" }}>
              <td style={{ padding: "7px 4px" }}>
                <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 3, background: i.c, marginRight: 8 }} />
                <span style={{ color: i.k.startsWith("Lucro") ? C.ink : C.sub, fontWeight: i.k.startsWith("Lucro") ? 700 : 400 }}>{i.k}</span>
              </td>
              <td style={{ padding: "7px 4px", textAlign: "right", color: C.sub }}>{pctDe(i.v)}</td>
              <td style={{ padding: "7px 4px", textAlign: "right", fontWeight: 600, color: i.k.startsWith("Lucro") ? (i.v >= 0 ? C.good : C.bad) : C.ink }}>{brl(i.v)}</td>
            </tr>
          ))}
          <tr style={{ borderTop: `2px solid ${C.accent}` }}>
            <td style={{ padding: "8px 4px", fontWeight: 800, fontFamily: "Sora" }}>Preço de venda</td>
            <td style={{ padding: "8px 4px", textAlign: "right", color: C.sub }}>100%</td>
            <td style={{ padding: "8px 4px", textAlign: "right", fontWeight: 800, fontFamily: "Sora", color: C.accent }}>{brl(preco)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

// ---------- MÁQUINAS (cadastro) ----------
function Maquinas({ maquinas, setMaquinas }) {
  const upd = (id, patch) => setMaquinas((arr) => arr.map((m) => m.id === id ? { ...m, ...patch } : m));
  const add = () => setMaquinas((arr) => [...arr, { id: "MAQ-" + (arr.length + 1) + "-" + Date.now().toString().slice(-4), nome: "Nova máquina", tipo: "FDM", potenciaKw: 0.1, valor: 1500, vidaUtilH: 4000, manutHora: 0.15, tarifaEnergia: 0.9, horasDia: 16, diasMes: 22, eficiencia: 0.85 }]);
  const del = (id) => setMaquinas((arr) => arr.filter((m) => m.id !== id));
  // resumo da frota
  const custoHoraMedio = avg(maquinas.map((m) => custoHoraMaquina(m)));
  const custoHoraMin = maquinas.length ? Math.min(...maquinas.map((m) => custoHoraMaquina(m))) : 0;
  const custoHoraMax = maquinas.length ? Math.max(...maquinas.map((m) => custoHoraMaquina(m))) : 0;
  const capTotal = maquinas.reduce((a, m) => a + (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0), 0);
  return (
    <div>
      <H title="Máquinas" sub="Cadastro único: alimenta o custo operacional da precificação e a capacidade de produção" />

      {/* RESUMO DA FROTA */}
      <div className="grid-kpi" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 14 }}>
        <KPI label="Máquinas cadastradas" value={`${maquinas.length}`} c={C.ink} />
        <KPI label="Custo médio por hora" value={brl(custoHoraMedio)} c={C.accent} />
        <KPI label="Faixa de custo/hora" value={`${brl(custoHoraMin)}–${brl(custoHoraMax)}`} c={C.sub} />
        <KPI label="Capacidade total" value={`${Math.round(capTotal)} h/mês`} c={C.blue} />
      </div>
      <div style={{ marginBottom: 14, fontSize: 12, color: C.sub }}>
        O custo operacional "médio" da precificação usa <b style={{ color: C.ink }}>{brl(custoHoraMedio)}/h</b> — a média do custo/hora de todas as máquinas.
      </div>

      <div style={{ marginBottom: 14 }}><Btn onClick={add}>＋ Cadastrar máquina</Btn></div>
      <div style={{ display: "grid", gap: 12 }}>
        {maquinas.map((m) => {
          const capMes = (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0);
          return (
          <Card key={m.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8 }}>
              <input value={m.nome} onChange={(e) => upd(m.id, { nome: e.target.value })}
                style={{ background: "transparent", border: "none", color: C.ink, fontWeight: 700, fontSize: 16, fontFamily: "Sora", flex: 1, minWidth: 0 }} />
              <select value={m.tipo || "FDM"} onChange={(e) => upd(m.id, { tipo: e.target.value })}
                style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.sub, padding: "4px 8px", borderRadius: 6, fontSize: 12, fontFamily: "inherit" }}>
                <option>FDM</option><option>Resina</option></select>
              <MiniBtn onClick={() => del(m.id)}>✕</MiniBtn>
            </div>
            <Label>Custo operacional</Label>
            <div className="grid-maq" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10 }}>
              <F label="Potência (kW)" value={m.potenciaKw} step={0.01} onChange={(v) => upd(m.id, { potenciaKw: v })} />
              <F label="Valor (R$)" value={m.valor} step={50} onChange={(v) => upd(m.id, { valor: v })} />
              <F label="Vida útil (h)" value={m.vidaUtilH} step={100} onChange={(v) => upd(m.id, { vidaUtilH: v })} />
              <F label="Manut. (R$/h)" value={m.manutHora} step={0.01} onChange={(v) => upd(m.id, { manutHora: v })} />
              <F label="Energia (R$/kWh)" value={m.tarifaEnergia} step={0.05} onChange={(v) => upd(m.id, { tarifaEnergia: v })} />
            </div>
            <div style={{ marginTop: 6 }}><Label>Capacidade de produção</Label></div>
            <div className="grid-maq" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10 }}>
              <F label="Horas/dia" value={m.horasDia} step={1} onChange={(v) => upd(m.id, { horasDia: v })} />
              <F label="Dias/mês" value={m.diasMes} step={1} onChange={(v) => upd(m.id, { diasMes: v })} />
              <F label="Eficiência (0–1)" value={m.eficiencia} step={0.01} onChange={(v) => upd(m.id, { eficiencia: v })} />
              <div style={{ gridColumn: "span 2", alignSelf: "end", fontSize: 12, color: C.sub, paddingBottom: 12 }}>
                Capacidade útil: <b style={{ color: C.ink }}>{Math.round(capMes)} h/mês</b>
              </div>
            </div>
            <Hint>Custo/hora desta máquina: <b>{brl(custoHoraMaquina(m))}</b> (energia + depreciação + manutenção).</Hint>
          </Card>
        ); })}
      </div>
    </div>
  );
}

// ---------- PRODUÇÃO (capacidade integrada às Máquinas) ----------
function Producao({ maquinas, produtos, fila, go }) {
  // carga: horas de impressão dos pedidos em Produção/Aguardando
  const emProducao = [...(fila.aguardando || []), ...(fila.produzir || [])];
  const horasPedido = (p) => (p.itens || []).reduce((a, it) => {
    const prod = produtos.find((x) => x.sku === it.sku);
    return a + (prod ? (prod.horasImpressao || 0) * it.qtd : 0);
  }, 0);
  const horasCarga = emProducao.reduce((a, p) => a + horasPedido(p), 0);
  const capTotal = maquinas.reduce((a, m) => a + (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0), 0);
  const ocup = capTotal ? horasCarga / capTotal : 0;
  const ocupCor = ocup > 1 ? C.bad : ocup > 0.85 ? C.warn : C.good;
  return (
    <div>
      <H title="Produção" sub="Capacidade das máquinas cadastradas vs. carga dos pedidos na fila" />
      <div className="grid-kpi" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 18 }}>
        <KPI label="Capacidade útil/mês" value={`${Math.round(capTotal)} h`} c={C.ink} />
        <KPI label="Carga na fila" value={`${Math.round(horasCarga)} h`} c={C.blue} onClick={() => go("pedidos")} />
        <KPI label="Ocupação" value={pct(ocup)} c={ocupCor} />
        <KPI label="Máquinas ativas" value={`${maquinas.length}`} c={C.ink} onClick={() => go("maquinas")} />
      </div>
      <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card title="Máquinas e capacidade">
          {!maquinas.length && <Hint>Nenhuma máquina. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar →</a></Hint>}
          {maquinas.map((m) => {
            const cap = (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0);
            const share = capTotal ? cap / capTotal : 0;
            return (
              <div key={m.id} style={{ padding: "9px 0", borderBottom: `1px solid ${C.line}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{m.nome} <span style={{ color: C.sub, fontWeight: 400, fontSize: 12 }}>{m.tipo}</span></span>
                  <span style={{ fontSize: 13, color: C.sub }}>{Math.round(cap)} h/mês</span>
                </div>
                <div style={{ height: 6, background: C.bg, borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(100, share * 100)}%`, height: "100%", background: C.accent2 }} /></div>
              </div>
            );
          })}
        </Card>
        <Card title="Carga atual (pedidos a produzir)">
          {!emProducao.length && <Hint>Nenhum pedido em produção no momento.</Hint>}
          {emProducao.map((p) => {
            const h = horasPedido(p);
            return (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${C.line}` }}>
                <div><div style={{ fontWeight: 600, fontSize: 13 }}>{p.id} · {(p.itens || []).length} item(ns)</div>
                  <div style={{ fontSize: 11, color: C.sub }}>{p.cliente} · {p.etapa}</div></div>
                <span style={{ fontSize: 13, color: C.sub }}>{h.toFixed(1)} h</span>
              </div>
            );
          })}
          <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10, background: C.panel2, fontSize: 13 }}>
            {ocup > 1 ? <span style={{ color: C.bad }}>Capacidade estourada: priorize urgentes ou amplie horas/máquinas.</span>
              : ocup > 0.85 ? <span style={{ color: C.warn }}>Perto do limite — atenção a novos pedidos.</span>
              : <span style={{ color: C.good }}>Há folga de capacidade para novos pedidos.</span>}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ---------- 2 · CATÁLOGO ----------
function Catalogo({ produtos, setProdutos, criarPedido, setInput, go, insumos }) {
  const [editando, setEditando] = React.useState(null);
  const addEstoque = (sku, d) => setProdutos((p) => p.map((x) => x.sku === sku ? { ...x, estoquePronto: Math.max(0, x.estoquePronto + d) } : x));
  const remover = (sku) => { if (confirm("Remover este produto do catálogo?")) setProdutos((p) => p.filter((x) => x.sku !== sku)); };
  const salvarEdicao = (prod) => { setProdutos((p) => p.map((x) => x.sku === prod.sku ? prod : x)); setEditando(null); };
  return (
    <div>
      <H title="2 · Catálogo de produtos" sub="Produtos precificados — edite preço, canal, cores e re-simule cenários" />
      {!produtos.length && <Card><Empty txt="Nenhum produto ainda. Vá em '1 · Precificar' e clique em Salvar no catálogo." onGo={() => go("calc")} /></Card>}
      {!!produtos.length && (
        <Card>
          <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr style={{ color: C.sub, fontSize: 11, textAlign: "left", textTransform: "uppercase" }}>
              <th style={{ padding: "8px" }}>Produto</th><th style={{ padding: "8px" }}>Custo</th><th style={{ padding: "8px" }}>Preço praticado</th><th style={{ padding: "8px" }}>Margem</th><th style={{ padding: "8px" }}>Cores</th><th style={{ padding: "8px" }}>Estoque</th><th style={{ padding: "8px" }}>Ações</th></tr></thead>
            <tbody>
              {produtos.map((p) => (
                <tr key={p.sku} style={{ borderTop: `1px solid ${C.line}` }}>
                  <td style={{ padding: "10px 8px" }}><div style={{ fontWeight: 600 }}>{p.nome}</div><div style={{ fontSize: 11, color: C.sub }}>{p.sku} · {p.canal}</div></td>
                  <td style={{ padding: "10px 8px" }}>{brl(p.custo)}</td>
                  <td style={{ padding: "10px 8px", fontWeight: 600 }}>{brl(p.precoPraticado || p.precoSaudavel)}</td>
                  <td style={{ padding: "10px 8px", color: p.margem < 15 ? C.warn : C.good }}>{p.margem}%</td>
                  <td style={{ padding: "10px 8px", color: C.sub }}>{(p.cores && p.cores.length) ? `${p.cores.length} cor(es)` : "—"}</td>
                  <td style={{ padding: "10px 8px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <MiniBtn onClick={() => addEstoque(p.sku, -1)}>−</MiniBtn>
                      <span style={{ minWidth: 22, textAlign: "center", fontWeight: 700 }}>{p.estoquePronto}</span>
                      <MiniBtn onClick={() => addEstoque(p.sku, +1)}>＋</MiniBtn>
                    </div>
                  </td>
                  <td style={{ padding: "10px 8px" }}>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <Btn small ghost onClick={() => setEditando({ ...p, cores: p.cores ? [...p.cores] : [] })}>Editar</Btn>
                      <Btn small onClick={() => criarPedido({ cliente: "Cliente", canal: p.canal, sku: p.sku, produto: p.nome, qtd: 1, preco: p.precoPraticado || p.precoSaudavel, origem: "Catálogo" })}>Pedido</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
          <div style={{ fontSize: 12, color: C.sub, marginTop: 12 }}>Dica: estoque pronto = peças já impressas. Pedido com estoque vai direto para Embalar; sem estoque, entra em Produção.</div>
        </Card>
      )}
      {editando && <EditarProduto prod={editando} setProd={setEditando} onSalvar={salvarEdicao} onRemover={() => { remover(editando.sku); setEditando(null); }} close={() => setEditando(null)} insumos={insumos} />}
    </div>
  );
}

// Modal de edição de produto com re-simulação por canal + cores
function EditarProduto({ prod, setProd, onSalvar, onRemover, close, insumos }) {
  const set = (k, v) => setProd((s) => ({ ...s, [k]: v }));
  const cenarios = CANAIS.map((c) => precoDoCanal(prod.custo || 0, c, prod.impostoTaxa != null ? prod.impostoTaxa : 0.06, prod.usarAds !== false, prod.usarSeg !== false));
  const ref = cenarios.find((x) => x.nome === prod.canal) || cenarios[0];
  const preco = prod.precoPraticado || ref.precoSaudavel;
  const lucro = preco - ref.baseMaisTarifa - preco * ref.totalPct;
  const margem = preco ? lucro / preco : 0;
  const statusCor = preco >= ref.precoSaudavel ? C.good : preco >= ref.precoMinimo ? C.warn : C.bad;
  const statusTxt = preco >= ref.precoSaudavel ? "Saudável" : preco >= ref.precoMinimo ? "Apertado" : "Inviável";
  // cores disponíveis para o tipo de material do produto
  const coresMaterial = (insumos || []).filter((i) => (i.cat === "Filamento" || i.cat === "Resina") && i.material === prod.matTipo && i.cor);
  const pesoTotal = (prod.cores || []).reduce((a, c) => a + (Number(c.peso) || 0), 0);
  const addCor = () => set("cores", [...(prod.cores || []), { cor: coresMaterial[0] ? coresMaterial[0].cor : "", peso: prod.consumoUn || 0 }]);
  const updCor = (i, patch) => set("cores", prod.cores.map((c, idx) => idx === i ? { ...c, ...patch } : c));
  const delCor = (i) => set("cores", prod.cores.filter((_, idx) => idx !== i));
  return (
    <div onClick={close} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20, overflowY: "auto" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24, maxWidth: 640, width: "100%", margin: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 20 }}>Editar produto</div>
          <MiniBtn onClick={close}>✕</MiniBtn>
        </div>
        <F label="Descrição" text value={prod.nome} onChange={(v) => set("nome", v)} />
        <div style={{ fontSize: 11, color: C.sub, marginBottom: 12 }}>SKU {prod.sku} · custo de produção {brl(prod.custo)}</div>

        <Label>Cenário de preços por canal</Label>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr style={{ color: C.sub, fontSize: 11, textAlign: "left", textTransform: "uppercase" }}>
              <th style={{ padding: "6px 8px" }}>Canal</th><th style={{ padding: "6px 8px" }}>Mínimo</th><th style={{ padding: "6px 8px" }}>Saudável</th><th style={{ padding: "6px 8px" }}>Premium</th><th></th></tr></thead>
            <tbody>
              {cenarios.map((c) => (
                <tr key={c.nome} style={{ borderTop: `1px solid ${C.line}`, background: c.nome === prod.canal ? C.panel2 : "transparent" }}>
                  <td style={{ padding: "8px" }}>{c.nome}</td>
                  <td style={{ padding: "8px", color: C.sub }}>{brl(c.precoMinimo)}</td>
                  <td style={{ padding: "8px", color: C.accent, fontWeight: 700 }}>{brl(c.precoSaudavel)}</td>
                  <td style={{ padding: "8px" }}>{brl(c.precoPremium)}</td>
                  <td style={{ padding: "8px" }}>
                    <button onClick={() => { set("canal", c.nome); set("precoPraticado", round2(c.precoSaudavel)); }}
                      style={{ background: c.nome === prod.canal ? C.accent : "transparent", color: c.nome === prod.canal ? "#1a1207" : C.sub, border: `1px solid ${c.nome === prod.canal ? C.accent : C.line}`, padding: "4px 10px", borderRadius: 7, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                      {c.nome === prod.canal ? "Atual" : "Usar"}</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 14, padding: 14, borderRadius: 12, background: C.panel2 }}>
          <Label>Preço praticado — {prod.canal}</Label>
          <F label="Preço de venda" value={prod.precoPraticado || round2(ref.precoSaudavel)} step={0.1} onChange={(v) => set("precoPraticado", v)} suffix="R$" />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 4 }}>
            <span style={{ color: C.sub }}>Lucro: <b style={{ color: lucro >= 0 ? C.good : C.bad }}>{brl(lucro)}</b></span>
            <span style={{ fontWeight: 700, color: statusCor }}>{statusTxt} · {pct(margem)}</span>
          </div>
        </div>

        <div style={{ marginTop: 16 }}><Label>Cores e peso específico</Label></div>
        {(prod.cores || []).map((c, i) => (
          <div key={i} className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.4fr 0.9fr auto", gap: 10, marginBottom: 8, alignItems: "end" }}>
            <label style={{ display: "block" }}>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Cor</div>
              <select value={c.cor} onChange={(e) => updCor(i, { cor: e.target.value })}
                style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
                <option value="">— selecione —</option>
                {coresMaterial.map((ins) => <option key={ins.id} value={ins.cor}>{ins.cor}</option>)}
                {c.cor && !coresMaterial.some((ins) => ins.cor === c.cor) && <option value={c.cor}>{c.cor}</option>}
              </select>
            </label>
            <F label="Peso (g)" value={c.peso} onChange={(v) => updCor(i, { peso: v })} />
            <div style={{ paddingBottom: 8 }}><MiniBtn onClick={() => delCor(i)}>✕</MiniBtn></div>
          </div>
        ))}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Btn small ghost onClick={addCor}>＋ Adicionar cor</Btn>
          {(prod.cores && prod.cores.length > 0) && <span style={{ fontSize: 13, color: C.sub }}>Peso total: <b style={{ color: C.ink }}>{round2(pesoTotal)} g</b></span>}
        </div>
        {!coresMaterial.length && <Hint>Nenhuma cor de {prod.matTipo || "material"} cadastrada nos insumos.</Hint>}

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 8 }}>
          <Btn ghost onClick={onRemover}>Excluir produto</Btn>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn ghost onClick={close}>Cancelar</Btn>
            <Btn onClick={() => onSalvar({ ...prod, margem: round2(margem * 100), precoPraticado: round2(preco) })}>Salvar alterações</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- 3 · ORÇAMENTOS ----------
function Orcamentos({ orcamentos, setOrcamentos, aprovar, produtos, cond, setCond }) {
  const [edit, setEdit] = React.useState(null);
  const [verCond, setVerCond] = React.useState(false);
  const novo = () => {
    const o = { id: "ORC-" + (1000 + orcamentos.length + 1), cliente: "", contato: "", itens: [], total: 0, status: "Rascunho", data: hoje(),
      sinal: cond.sinal, prazoProducao: cond.prazoProducao, prazoEntrega: cond.prazoEntrega, validade: cond.validade, pagamento: cond.pagamento };
    setOrcamentos((arr) => [o, ...arr]); setEdit(o);
  };
  const salvar = (o) => {
    const total = o.itens.reduce((a, it) => a + it.preco * it.qtd, 0);
    setOrcamentos((arr) => arr.map((x) => x.id === o.id ? { ...o, total } : x)); setEdit(null);
  };
  const excluir = (id) => { if (confirm("Excluir orçamento?")) { setOrcamentos((arr) => arr.filter((x) => x.id !== id)); setEdit(null); } };
  return (
    <div>
      <H title="3 · Orçamentos" sub="Monte com vários itens, defina condições e envie por WhatsApp ou PDF" />
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <Btn onClick={novo}>＋ Novo orçamento</Btn>
        <Btn ghost onClick={() => setVerCond(true)}>⚙ Condições padrão</Btn>
      </div>
      {!orcamentos.length && <Card><Empty txt="Nenhum orçamento ainda." /></Card>}
      {orcamentos.map((o) => (
        <Card key={o.id} style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontWeight: 700, fontFamily: "Sora" }}>{o.id} <span style={{ color: C.sub, fontWeight: 400, fontSize: 13 }}>· {o.cliente || "sem cliente"}</span></div>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>{o.itens.length ? o.itens.map((i) => `${i.qtd}× ${i.nome}${i.cor ? " (" + i.cor + ")" : ""}`).join(", ") : "sem itens"} · {o.data}</div>
              <div style={{ fontWeight: 700, marginTop: 4 }}>{brl(o.total)}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <Tag t={o.status} />
              <Btn small ghost onClick={() => setEdit({ ...o, itens: o.itens.map((i) => ({ ...i })) })}>Editar</Btn>
              <Btn small ghost onClick={() => enviarWhats(o, cond)}>WhatsApp</Btn>
              <Btn small ghost onClick={() => exportarPDF(o, cond)}>PDF</Btn>
              {o.status !== "Aprovado" && <Btn small onClick={() => aprovar(o)}>Aprovar → Pedido</Btn>}
            </div>
          </div>
        </Card>
      ))}
      {edit && <EditarOrcamento orc={edit} setOrc={setEdit} produtos={produtos} onSalvar={salvar} onExcluir={() => excluir(edit.id)} close={() => setEdit(null)} />}
      {verCond && <CondicoesModal cond={cond} setCond={setCond} close={() => setVerCond(false)} />}
    </div>
  );
}

function EditarOrcamento({ orc, setOrc, produtos, onSalvar, onExcluir, close }) {
  const set = (k, v) => setOrc((s) => ({ ...s, [k]: v }));
  const addItem = () => { const p = produtos[0]; setOrc((s) => ({ ...s, itens: [...s.itens, { sku: p ? p.sku : "", nome: p ? p.nome : "", qtd: 1, cor: "", preco: p ? (p.precoPraticado || p.precoSaudavel) : 0 }] })); };
  const updItem = (i, patch) => setOrc((s) => ({ ...s, itens: s.itens.map((x, idx) => idx === i ? { ...x, ...patch } : x) }));
  const delItem = (i) => setOrc((s) => ({ ...s, itens: s.itens.filter((_, idx) => idx !== i) }));
  const pickProduto = (i, sku) => { const p = produtos.find((x) => x.sku === sku); updItem(i, { sku, nome: p ? p.nome : "", preco: p ? (p.precoPraticado || p.precoSaudavel) : 0, cor: "" }); };
  const total = orc.itens.reduce((a, it) => a + it.preco * it.qtd, 0);
  return (
    <div onClick={close} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20, overflowY: "auto" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24, maxWidth: 660, width: "100%", margin: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 20 }}>{orc.id}</div><MiniBtn onClick={close}>✕</MiniBtn>
        </div>
        <div className="grid-item" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <F label="Cliente" text value={orc.cliente} onChange={(v) => set("cliente", v)} />
          <F label="WhatsApp do cliente (DDD+número)" text value={orc.contato} onChange={(v) => set("contato", v)} />
        </div>
        <div style={{ marginTop: 12 }}><Label>Itens</Label></div>
        {orc.itens.map((it, i) => {
          const prod = produtos.find((x) => x.sku === it.sku);
          const cores = prod && prod.cores ? prod.cores : [];
          return (
            <div key={i} className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.6fr 0.5fr 0.9fr 0.9fr auto", gap: 8, marginBottom: 8, alignItems: "end" }}>
              <Sel label="Produto" value={it.sku} onChange={(v) => pickProduto(i, v)} options={produtos.map((p) => p.sku)} />
              <F label="Qtd" value={it.qtd} onChange={(v) => updItem(i, { qtd: v })} />
              {cores.length ? (

function Pedidos({ pedidos, fila, avancar, produtos, criarPedido }) {
  const [cliente, setCliente] = React.useState("");
  const [canal, setCanal] = React.useState("Mercado Livre");
  const [itens, setItens] = React.useState([]);
  const colunas = [
    { k: "Aguardando insumo", lista: fila.aguardando, c: C.bad, btn: "Revalidar insumo →" },
    { k: "Produzir", lista: fila.produzir, c: C.warn, btn: "Concluir produção →" },
    { k: "Embalar", lista: fila.embalar, c: C.accent2, btn: "Marcar embalado →" },
    { k: "Despachado", lista: fila.despachado, c: C.good, btn: null },
  ];
  const addItem = () => { if (produtos[0]) setItens((s) => [...s, { sku: produtos[0].sku, qtd: 1, cor: "" }]); };
  const updItem = (i, patch) => setItens((s) => s.map((x, idx) => idx === i ? { ...x, ...patch } : x));
  const delItem = (i) => setItens((s) => s.filter((_, idx) => idx !== i));
  const totalNovo = itens.reduce((a, it) => { const p = produtos.find((x) => x.sku === it.sku); return a + (p ? (p.precoPraticado || p.precoSaudavel) : 0) * (it.qtd || 1); }, 0);
  const criar = () => {
    if (!itens.length) return;
    const lista = itens.map((it) => { const p = produtos.find((x) => x.sku === it.sku); return { sku: it.sku, produto: p ? p.nome : "", qtd: Number(it.qtd) || 1, cor: it.cor, preco: p ? (p.precoPraticado || p.precoSaudavel) : 0 }; });
    criarPedido({ cliente: cliente || "Cliente", canal, origem: canal, itens: lista });
    setItens([]); setCliente("");
  };
  const totalPed = (p) => (p.itens || []).reduce((a, it) => a + it.preco * it.qtd, 0);
  return (
    <div>
      <H title="4 · Pedidos" sub="Vários itens por pedido · gate de estoque → Produção / Embalar → Despacho" />
      <Card style={{ marginBottom: 16 }}>
        <Label>Novo pedido (vários produtos)</Label>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
          <div style={{ flex: 1, minWidth: 150 }}><F label="Cliente" text value={cliente} onChange={setCliente} /></div>
          <div style={{ flex: 1, minWidth: 150 }}><Sel label="Canal / origem" value={canal} onChange={setCanal} options={CANAIS.map((c) => c.nome)} /></div>
        </div>
        {itens.map((it, i) => {
          const prod = produtos.find((x) => x.sku === it.sku);
          const cores = prod && prod.cores ? prod.cores : [];
          return (
            <div key={i} className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.8fr 0.6fr 1fr auto", gap: 10, marginBottom: 8, alignItems: "end" }}>
              <Sel label="Produto" value={it.sku} onChange={(v) => updItem(i, { sku: v, cor: "" })} options={produtos.map((p) => p.sku)} />
              <F label="Qtd" value={it.qtd} onChange={(v) => updItem(i, { qtd: v })} />
              {cores.length ? (
                <label style={{ display: "block" }}><div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Cor</div>
                  <select value={it.cor} onChange={(e) => updItem(i, { cor: e.target.value })} style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
                    <option value="">— cor —</option>{cores.map((c, ci) => <option key={ci} value={c.cor}>{c.cor}</option>)}
                  </select></label>
              ) : <div style={{ fontSize: 11, color: C.sub, paddingBottom: 10 }}>sem cores</div>}
              <div style={{ paddingBottom: 8 }}><MiniBtn onClick={() => delItem(i)}>✕</MiniBtn></div>
            </div>
          );
        })}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
          <Btn small ghost onClick={addItem}>＋ Adicionar item</Btn>
          {itens.length > 0 && <span style={{ fontSize: 13 }}>Total: <b style={{ color: C.accent }}>{brl(totalNovo)}</b></span>}
        </div>
        <div style={{ marginTop: 12 }}><Btn onClick={criar} disabled={!itens.length}>Criar pedido</Btn></div>
        <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>Gate por item: cada produto avalia estoque pronto → insumo → produção.</div>
      </Card>
      <div className="grid-kanban" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
        {colunas.map((col) => (
          <div key={col.k} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 13, color: col.c }}>{col.k}</span>
              <span style={{ fontSize: 12, color: C.sub }}>{col.lista.length}</span>
            </div>
            {!col.lista.length && <div style={{ fontSize: 12, color: C.sub, padding: "20px 0", textAlign: "center" }}>—</div>}
            {col.lista.map((p) => (
              <div key={p.id} style={{ background: C.panel2, borderRadius: 10, padding: 12, marginBottom: 8, borderLeft: `3px solid ${col.c}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <span style={{ fontWeight: 700, fontSize: 13 }}>{p.id}</span>
                  <PrioTag p={p.prioridade} />
                </div>
                <div style={{ fontSize: 11, color: C.sub, marginBottom: 6 }}>{p.cliente} · {p.origem}</div>
                {(p.itens || []).map((it, i) => (
                  <div key={i} style={{ fontSize: 12, display: "flex", justifyContent: "space-between", padding: "2px 0" }}>
                    <span>{it.produto} {it.cor ? <span style={{ color: C.sub }}>({it.cor})</span> : ""} ×{it.qtd}</span>
                    <span style={{ color: C.sub }}>{brl(it.preco * it.qtd)}</span>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, borderTop: `1px solid ${C.line}`, marginTop: 4, paddingTop: 4 }}>
                  <span>Total</span><span>{brl(totalPed(p))}</span>
                </div>
                {p.etapa === "Aguardando insumo" && <div style={{ fontSize: 11, color: C.bad, margin: "6px 0" }}>Falta insumo para algum item. Reponha em Insumos.</div>}
                {col.btn && <div style={{ marginTop: 8 }}><Btn small full onClick={() => avancar(p.id)}>{col.btn}</Btn></div>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function ModalEntrada({ insumo, onSave, onClose }) {
  const [qtd, setQtd] = React.useState("");
  const [custo, setCusto] = React.useState(String(insumo.custoUn).replace(".",","));
  const estiloInput = { width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "9px 10px", borderRadius: 8, fontSize: 14, fontFamily: "inherit" };

  const handleSave = () => {
    const q = parseFloat(String(qtd).replace(",","."));
    const c = parseFloat(String(custo).replace(",","."));
    if (!q || q <= 0) { alert("Informe a quantidade."); return; }
    // custo médio ponderado
    const novoEstoque = insumo.estoque + q;
    const novoCusto = ((insumo.estoque * insumo.custoUn) + (q * (isNaN(c) ? insumo.custoUn : c))) / novoEstoque;
    onSave(novoEstoque, round2(novoCusto));
  };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 20 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 28, maxWidth: 380, width: "100%" }}>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 16, marginBottom: 6 }}>📦 Entrada em estoque</div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 20 }}>{insumo.nome} — estoque atual: <b style={{ color: C.ink }}>{insumo.estoque} {insumo.un}</b></div>
        <label style={{ display: "block", marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Quantidade a entrar ({insumo.un})</div>
          <input type="text" inputMode="decimal" value={qtd} onChange={(e) => setQtd(e.target.value)} placeholder="Ex: 1000" autoFocus style={estiloInput} />
        </label>
        <label style={{ display: "block", marginBottom: 20 }}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Custo desta entrada (R$/{insumo.un}) — atualiza custo médio</div>
          <input type="text" inputMode="decimal" value={custo} onChange={(e) => setCusto(e.target.value)} style={estiloInput} />
        </label>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, background: "transparent", border: `1px solid ${C.line}`, color: C.sub, padding: "10px", borderRadius: 9, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
          <button onClick={handleSave} style={{ flex: 2, background: C.good, border: "none", color: "#0a1a0a", padding: "10px", borderRadius: 9, fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>＋ Confirmar entrada</button>
        </div>
      </div>
    </div>
  );
}

function ModalItemComposto({ insumos, onSave, onClose }) {
  const [nome, setNome] = React.useState("");
  const [cat, setCat] = React.useState("Embalagem");
  const [un, setUn] = React.useState("un");
  const [qtdCriar, setQtdCriar] = React.useState(1);
  const [descontar, setDescontar] = React.useState(true);
  const [comps, setComps] = React.useState([{ insumoId: "", qtd: 1 }]);
  const estiloInput = { width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" };

  const addComp = () => setComps((c) => [...c, { insumoId: "", qtd: 1 }]);
  const updComp = (idx, patch) => setComps((c) => c.map((x, i) => i === idx ? { ...x, ...patch } : x));
  const delComp = (idx) => setComps((c) => c.filter((_, i) => i !== idx));

  const custoUnitario = comps.reduce((acc, c) => {
    const ins = insumos.find((i) => i.id === c.insumoId);
    return acc + (ins ? ins.custoUn * (Number(c.qtd) || 0) : 0);
  }, 0);

  const handleSave = () => {
    if (!nome.trim()) { alert("Informe o nome do item composto."); return; }
    if (comps.some((c) => !c.insumoId)) { alert("Selecione o insumo de cada componente."); return; }
    if (comps.some((c) => !c.qtd || Number(c.qtd) <= 0)) { alert("Informe a quantidade de cada componente."); return; }
    onSave({ nome: nome.trim(), cat, un, qtdCriar: Number(qtdCriar) || 1, comps, custoUn: round2(custoUnitario), descontar });
  };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 20 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 28, maxWidth: 560, width: "100%", maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 17, marginBottom: 4 }}>⊕ Criar item composto</div>
        <div style={{ fontSize: 12, color: C.sub, marginBottom: 20 }}>Monte um item usando componentes do estoque (ex: Pacote P = saco + etiqueta + plástico bolha)</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
          <label style={{ gridColumn: "1/-1" }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Nome do item *</div>
            <input value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Ex: Pacote de Envio P" style={estiloInput} autoFocus />
          </label>
          <label>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Categoria</div>
            <select value={cat} onChange={(e) => setCat(e.target.value)} style={estiloInput}>
              {CATS_INSUMO.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </label>
          <label>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Unidade</div>
            <select value={un} onChange={(e) => setUn(e.target.value)} style={estiloInput}>
              {["un","g","ml","m","kg","L"].map((u) => <option key={u} value={u}>{u}</option>)}
            </select>
          </label>
          <label>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Qtd a criar</div>
            <input type="text" inputMode="decimal" value={qtdCriar}
              onChange={(e) => { const n = parseFloat(e.target.value); if (!isNaN(n)) setQtdCriar(n); }}
              style={estiloInput} />
          </label>
        </div>

        <div style={{ marginBottom: 8, fontSize: 12, color: C.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Componentes (por unidade do item)</div>
        {comps.map((c, idx) => {
          const ins = insumos.find((i) => i.id === c.insumoId);
          return (
            <div key={idx} style={{ display: "grid", gridTemplateColumns: "2fr 1fr auto", gap: 8, marginBottom: 8, alignItems: "end" }}>
              <label>
                <div style={{ fontSize: 11, color: C.sub, marginBottom: 3 }}>Insumo</div>
                <select value={c.insumoId} onChange={(e) => updComp(idx, { insumoId: e.target.value })} style={estiloInput}>
                  <option value="">— selecione —</option>
                  {insumos.map((i) => <option key={i.id} value={i.id}>{i.nome} ({i.estoque} {i.un})</option>)}
                </select>
              </label>
              <label>
                <div style={{ fontSize: 11, color: C.sub, marginBottom: 3 }}>Qtd/{un}</div>
                <input type="text" inputMode="decimal" value={c.qtd}
                  onChange={(e) => { const n = parseFloat(e.target.value.replace(",",".")); updComp(idx, { qtd: isNaN(n) ? e.target.value : n }); }}
                  style={estiloInput} />
              </label>
              <div style={{ paddingBottom: 2 }}>
                <MiniBtn onClick={() => delComp(idx)}>✕</MiniBtn>
              </div>
              {ins && <div style={{ gridColumn: "1/-1", fontSize: 11, color: C.sub, marginTop: -4, paddingLeft: 2 }}>
                Custo: {brl(ins.custoUn)}/{ins.un} → subtotal: <b style={{ color: C.ink }}>{brl(ins.custoUn * (Number(c.qtd) || 0))}</b>
                {descontar && <span style={{ color: C.warn }}> · Usará {Number(c.qtd) * Number(qtdCriar)} {ins.un} do estoque ({ins.estoque} disponível)</span>}
              </div>}
            </div>
          );
        })}
        <button onClick={addComp} style={{ background: "transparent", border: `1px dashed ${C.line}`, color: C.sub, padding: "6px 14px", borderRadius: 8, fontSize: 12, cursor: "pointer", fontFamily: "inherit", width: "100%", marginBottom: 16 }}>
          ＋ Adicionar componente
        </button>

        <div style={{ background: C.panel2, borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
            <span style={{ color: C.sub }}>Custo unitário calculado:</span>
            <span style={{ fontWeight: 800, color: C.accent, fontFamily: "Sora" }}>{brl(custoUnitario)}</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 4 }}>
            <span style={{ color: C.sub }}>Custo total ({qtdCriar} unidades):</span>
            <span style={{ fontWeight: 700, color: C.ink }}>{brl(custoUnitario * (Number(qtdCriar) || 1))}</span>
          </div>
        </div>

        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, marginBottom: 20 }}>
          <input type="checkbox" checked={descontar} onChange={(e) => setDescontar(e.target.checked)} style={{ accentColor: C.accent }} />
          Descontar automaticamente os componentes do estoque ao criar
        </label>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, background: "transparent", border: `1px solid ${C.line}`, color: C.sub, padding: "10px", borderRadius: 9, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
          <button onClick={handleSave} style={{ flex: 2, background: C.accent, border: "none", color: "#1a1207", padding: "10px", borderRadius: 9, fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>⊕ Criar item</button>
        </div>
      </div>
    </div>
  );
}

function Insumos({ insumos, setInsumos }) {
  const [catFiltro, setCatFiltro] = React.useState("Todos");
  const [modal, setModal] = React.useState(null); // "novo" | "editar" | "entrada" | "composto"
  const [itemAtual, setItemAtual] = React.useState(null);

  const valorTotal = insumos.reduce((a, i) => a + i.estoque * i.custoUn, 0);
  const cats = ["Todos", ...CATS_INSUMO];
  const lista = catFiltro === "Todos" ? insumos : insumos.filter((i) => i.cat === catFiltro);

  const handleNovo = (form) => {
    setInsumos((arr) => [...arr, { ...form, id: novoInsumoId(form.cat) }]);
    setModal(null);
  };

  const handleEditar = (form) => {
    setInsumos((arr) => arr.map((i) => i.id === itemAtual.id ? { ...itemAtual, ...form, id: itemAtual.id } : i));
    setModal(null); setItemAtual(null);
  };

  const handleEntrada = (novoEstoque, novoCusto) => {
    setInsumos((arr) => arr.map((i) => i.id === itemAtual.id ? { ...i, estoque: novoEstoque, custoUn: novoCusto } : i));
    setModal(null); setItemAtual(null);
  };

  const handleCriarComposto = ({ nome, cat, un, qtdCriar, comps, custoUn, descontar }) => {
    const novoItem = { id: novoInsumoId(cat), nome, cat, un, custoUn, estoque: qtdCriar, min: 1, consumoDia: 0, material: "", cor: "" };
    let novos = [...insumos, novoItem];
    if (descontar) {
      comps.forEach((c) => {
        const qtdTotal = Number(c.qtd) * qtdCriar;
        novos = novos.map((i) => i.id === c.insumoId ? { ...i, estoque: Math.max(0, i.estoque - qtdTotal) } : i);
      });
    }
    setInsumos(novos);
    setModal(null);
  };

  const handleDeletar = (id) => {
    if (!confirm("Excluir este insumo?")) return;
    setInsumos((arr) => arr.filter((i) => i.id !== id));
  };

  return (
    <div>
      <H title="Insumos" sub="Estoque, entradas, alertas e gestão por categoria" />

      {/* KPIs */}
      <div className="grid-kpi3" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 18 }}>
        <KPI label="Valor em estoque" value={brl(valorTotal)} c={C.blue} />
        <KPI label="Itens cadastrados" value={`${insumos.length}`} c={C.ink} />
        <KPI label="Em alerta" value={`${insumos.filter((i) => i.estoque <= i.min).length}`} c={C.bad} />
      </div>

      {/* Ações */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <Btn onClick={() => { setItemAtual(null); setModal("novo"); }}>＋ Novo insumo</Btn>
        <Btn ghost onClick={() => setModal("composto")}>⊕ Criar item composto</Btn>
        <div style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {cats.map((c) => (
            <button key={c} onClick={() => setCatFiltro(c)}
              style={{ background: catFiltro === c ? C.accent : C.panel2, color: catFiltro === c ? "#1a1207" : C.sub,
                border: `1px solid ${catFiltro === c ? C.accent : C.line}`, padding: "5px 12px", borderRadius: 20,
                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Tabela */}
      <Card>
        {lista.length === 0 && (
          <div style={{ textAlign: "center", padding: 32, color: C.sub }}>
            <div style={{ fontSize: 14, marginBottom: 12 }}>Nenhum insumo cadastrado nesta categoria.</div>
            <Btn onClick={() => setModal("novo")}>＋ Cadastrar primeiro insumo</Btn>
          </div>
        )}
        {lista.length > 0 && (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ color: C.sub, fontSize: 11, textAlign: "left", textTransform: "uppercase" }}>
                <th style={{ padding: "8px" }}>Insumo</th>
                <th style={{ padding: "8px" }}>Estoque</th>
                <th style={{ padding: "8px" }}>Custo/un</th>
                <th style={{ padding: "8px" }}>Cobertura</th>
                <th style={{ padding: "8px" }}>Status</th>
                <th style={{ padding: "8px", textAlign: "right" }}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {lista.map((i) => {
                const cobertura = i.consumoDia > 0 ? Math.round(i.estoque / i.consumoDia) : "—";
                const baixo = i.estoque <= i.min;
                return (
                  <tr key={i.id} style={{ borderTop: `1px solid ${C.line}` }}>
                    <td style={{ padding: "10px 8px" }}>
                      <div style={{ fontWeight: 600 }}>{i.nome}</div>
                      <div style={{ fontSize: 11, color: C.sub }}>
                        {i.cat}{i.material ? ` · ${i.material}` : ""}{i.cor ? ` · ${i.cor}` : ""}
                      </div>
                    </td>
                    <td style={{ padding: "10px 8px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        <MiniBtn onClick={() => setInsumos((arr) => arr.map((x) => x.id === i.id ? { ...x, estoque: Math.max(0, x.estoque - (i.un === "un" ? 1 : 10)) } : x))}>−</MiniBtn>
                        <span style={{ minWidth: 54, textAlign: "center" }}>{i.estoque} {i.un}</span>
                        <MiniBtn onClick={() => setInsumos((arr) => arr.map((x) => x.id === i.id ? { ...x, estoque: x.estoque + (i.un === "un" ? 1 : 10) } : x))}>＋</MiniBtn>
                      </div>
                      <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>mín: {i.min} {i.un}</div>
                    </td>
                    <td style={{ padding: "10px 8px" }}>{brl(i.custoUn)}<span style={{ fontSize: 10, color: C.sub }}>/{i.un}</span></td>
                    <td style={{ padding: "10px 8px", color: C.sub }}>{cobertura}{cobertura !== "—" ? " dias" : ""}</td>
                    <td style={{ padding: "10px 8px" }}><Tag t={baixo ? "Repor" : "OK"} /></td>
                    <td style={{ padding: "10px 8px" }}>
                      <div style={{ display: "flex", gap: 5, justifyContent: "flex-end", flexWrap: "wrap" }}>
                        <button onClick={() => { setItemAtual(i); setModal("entrada"); }}
                          style={{ background: C.good + "22", border: `1px solid ${C.good}`, color: C.good, padding: "3px 9px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                          📦 Entrada
                        </button>
                        <button onClick={() => { setItemAtual(i); setModal("editar"); }}
                          style={{ background: C.panel2, border: `1px solid ${C.line}`, color: C.ink, padding: "3px 9px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                          ✏
                        </button>
                        <button onClick={() => handleDeletar(i.id)}
                          style={{ background: "transparent", border: `1px solid ${C.bad}`, color: C.bad, padding: "3px 9px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                          🗑
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>

      {/* Modais */}
      {modal === "novo" && <ModalInsumo titulo="Novo insumo" onSave={handleNovo} onClose={() => setModal(null)} />}
      {modal === "editar" && itemAtual && <ModalInsumo titulo="Editar insumo" inicial={itemAtual} onSave={handleEditar} onClose={() => { setModal(null); setItemAtual(null); }} />}
      {modal === "entrada" && itemAtual && <ModalEntrada insumo={itemAtual} onSave={handleEntrada} onClose={() => { setModal(null); setItemAtual(null); }} />}
      {modal === "composto" && <ModalItemComposto insumos={insumos} onSave={handleCriarComposto} onClose={() => setModal(null)} />}
    </div>
  );
}

// Input de preço totalmente livre — só propaga no blur ou Enter
function PrecoLivreInput({ value, onChange, placeholder, fontSize, fontWeight }) {
  const [local, setLocal] = React.useState("");
  const [isFocused, setIsFocused] = React.useState(false);
  const focused = React.useRef(false);
  React.useEffect(() => {
    if (!focused.current) setLocal(String(value || "").replace(".", ","));
  }, [value]);
  const commit = () => {
    const n = parseFloat(local.replace(",", "."));
    if (!isNaN(n) && n >= 0) onChange(n);
    else setLocal(String(value || "").replace(".", ","));
  };
  return (
    <input type="text" inputMode="decimal" value={local}
      placeholder={placeholder || "0,00"}
      onChange={(e) => setLocal(e.target.value)}
      onFocus={() => { focused.current = true; setIsFocused(true); }}
      onBlur={() => { focused.current = false; setIsFocused(false); commit(); }}
      onKeyDown={(e) => e.key === "Enter" && commit()}
      style={{ width: "100%", background: C.bg,
        border: `1px solid ${isFocused ? C.accent : C.line}`, color: C.ink,
        padding: "10px 14px", borderRadius: 9, fontSize: fontSize || 20,
        fontWeight: fontWeight || 800, fontFamily: isFocused || (fontSize || 20) >= 18 ? "Sora, inherit" : "inherit",
        boxSizing: "border-box", outline: "none",
        transition: "border-color 0.15s" }} />
  );
}

function LoginApp() {
  const [session, setSession] = React.useState(() => {
    try { return JSON.parse(sessionStorage.getItem("ms3d_session") || "null"); } catch { return null; }
  });
  const handleLogin = (email) => {
    const key = emailParaKey(email);
    sessionStorage.setItem("ms3d_session", JSON.stringify(key));
    setSession(key);
  };
  const handleLogout = () => {
    sessionStorage.removeItem("ms3d_session");
    setSession(null);
  };
  if (!session) return <LoginScreen onLogin={handleLogin} />;
  return <App userKey={session} onLogout={handleLogout} />;
}

function useNomeUsuario(userKey) {
  const [nome, setNome] = React.useState("");

    getUsuarioByKey(userKey).then((u) => { if (u && u.nome) setNome(u.nome); });
  }, [userKey]);

}

function LoginScreen({ onLogin }) {
  const [modo, setModo] = React.useState("login"); // "login" | "cadastro" | "verificar" | "reset" | "reset-codigo"
  const [email, setEmail] = React.useState("");
  const [nome, setNome] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [senha2, setSenha2] = React.useState("");
  const [codigo, setCodigo] = React.useState("");
  const [codigoGerado, setCodigoGerado] = React.useState(null);
  const [pendEmail, setPendEmail] = React.useState("");
  const [novaSenha, setNovaSenha] = React.useState("");
  const [novaSenha2, setNovaSenha2] = React.useState("");
  const [erro, setErro] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  const estiloInput = { width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "10px 12px", borderRadius: 9, fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" };

  const handleLogin = () => {
    setErro("");
    if (!email.trim() || !senha) { setErro("Preencha e-mail e senha."); return; }
    setLoading(true);
    loginUsuario(email.trim(), senha).then((res) => {
      setLoading(false);
      if (!res.ok) {
        if (res.pendente) { setPendEmail(res.email); setModo("verificar"); }
        else setErro(res.erro);
        return;
      }
      onLogin(res.user.email);
    }).catch(() => { setLoading(false); setErro("Erro de conexão. Tente novamente."); });
  };

  const handleCadastro = () => {
    setErro("");
    if (!email.trim() || !senha || !senha2) { setErro("Preencha todos os campos."); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) { setErro("Digite um e-mail válido."); return; }
    if (!nome.trim()) { setErro("Informe seu nome ou empresa."); return; }
    if (senha.length < 6) { setErro("A senha deve ter ao menos 6 caracteres."); return; }
    if (senha !== senha2) { setErro("As senhas não coincidem."); return; }
    setLoading(true);
    setErro("Conectando ao servidor...");
    cadastrarUsuario(email.trim(), senha, nome.trim()).then((res) => {
      if (!res.ok) { setLoading(false); setErro(res.erro); return; }
      setErro("Conta criada! Enviando código...");
      return enviarEmailVerificacao(res.email, res.codigo).then((enviou) => {
        setLoading(false);
        setPendEmail(res.email);
        setCodigoGerado(enviou ? null : res.codigo);
        setErro("");
        setModo("verificar");
      });
    }).catch((e) => { setLoading(false); setErro("Erro: " + (e.message || "Falha na conexão com o servidor.")); });
  };

  const handleVerificar = () => {
    setErro("");
    if (!codigo.trim()) { setErro("Digite o código de verificação."); return; }
    setLoading(true);
    verificarCodigo(pendEmail, codigo).then((res) => {
      setLoading(false);
      if (!res.ok) { setErro(res.erro); return; }
      onLogin(pendEmail);
    }).catch(() => { setLoading(false); setErro("Erro de conexão. Tente novamente."); });
  };

  const handleReenviar = () => {
    setErro("");
    setLoading(true);
    reenviarCodigo(pendEmail).then((novoCodigo) => {
      return enviarEmailVerificacao(pendEmail, novoCodigo).then((enviou) => {
        setLoading(false);
        setCodigoGerado(enviou ? null : novoCodigo);
        setErro("Novo código enviado.");
      });
    }).catch(() => { setLoading(false); setErro("Erro ao reenviar. Tente novamente."); });
  };

  const handleSolicitarReset = () => {
    setErro("");
    if (!email.trim()) { setErro("Digite seu e-mail."); return; }
    setLoading(true);
    solicitarResetSenha(email.trim()).then((res) => {
      const cod = res ? res.codigo : gerarCodigo();
      const emailDest = res ? res.email : email.trim();
      return enviarEmailReset(emailDest, cod).then((enviou) => {
        setLoading(false);
        setPendEmail(email.trim());
        setCodigoGerado(enviou || !res ? null : cod);
        setModo("reset-codigo");
      });
    }).catch(() => { setLoading(false); setErro("Erro de conexão. Tente novamente."); });
  };

  const handleConfirmarReset = () => {
    setErro("");
    if (!codigo.trim()) { setErro("Digite o código recebido por e-mail."); return; }
    if (!novaSenha || novaSenha.length < 6) { setErro("A nova senha deve ter ao menos 6 caracteres."); return; }
    if (novaSenha !== novaSenha2) { setErro("As senhas não coincidem."); return; }
    setLoading(true);
    confirmarResetSenha(pendEmail, codigo, novaSenha).then((res) => {
      setLoading(false);
      if (!res.ok) { setErro(res.erro); return; }
      setModo("login"); setSenha(""); setEmail(pendEmail);
    }).catch(() => { setLoading(false); setErro("Erro de conexão. Tente novamente."); });
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans',system-ui,sans-serif", color: C.ink, padding: 20 }}>
      <Estilos />
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 20, padding: 36, width: "100%", maxWidth: 420 }}>
        {/* Logo */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
          <div style={{ width: 40, height: 40, borderRadius: 11, background: `linear-gradient(135deg,${C.accent},#ff9466)`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#1a1207", fontSize: 18 }}>M</div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, lineHeight: 1.2 }}>Margem Segura <span style={{ color: C.accent }}>3D</span></div>
        </div>

        {/* ---- RESET SENHA: SOLICITAR ---- */}
        {modo === "reset" && (<>
          <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 16, marginBottom: 6 }}>Recuperar senha</div>
          <div style={{ fontSize: 13, color: C.sub, marginBottom: 20, lineHeight: 1.6 }}>
            Digite seu e-mail cadastrado. Enviaremos um código para redefinir a senha.
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>E-mail</div>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="seu@email.com"
              autoFocus onKeyDown={(e) => e.key === "Enter" && handleSolicitarReset()}
              style={estiloInput} />
          </div>
          {erro && <div style={{ color: C.bad, fontSize: 13, marginBottom: 12, padding: "8px 12px", background: `${C.bad}18`, borderRadius: 8 }}>{erro}</div>}
          <button onClick={handleSolicitarReset} disabled={loading}
            style={{ width: "100%", background: C.accent, color: "#1a1207", border: "none", borderRadius: 9, padding: "12px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit", marginBottom: 10 }}>
            {loading ? "Enviando..." : "Enviar código →"}
          </button>
          <button onClick={() => { setModo("login"); setErro(""); }} style={{ width: "100%", background: "transparent", border: "none", color: C.sub, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>← Voltar ao login</button>
        </>)}

        {/* ---- RESET SENHA: CONFIRMAR CÓDIGO + NOVA SENHA ---- */}
        {modo === "reset-codigo" && (<>
          <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 16, marginBottom: 6 }}>Nova senha</div>
          <div style={{ fontSize: 13, color: C.sub, marginBottom: 20, lineHeight: 1.6 }}>
            Código enviado para <b style={{ color: C.ink }}>{pendEmail}</b>. Digite o código e sua nova senha.
          </div>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Código recebido</div>
            <input value={codigo} onChange={(e) => setCodigo(e.target.value)} placeholder="000000" maxLength={6}
              autoFocus style={{ ...estiloInput, fontSize: 20, letterSpacing: 4, textAlign: "center" }} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Nova senha</div>
            <input type="password" value={novaSenha} onChange={(e) => setNovaSenha(e.target.value)} placeholder="mínimo 6 caracteres" style={estiloInput} />
          </div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Confirmar nova senha</div>
            <input type="password" value={novaSenha2} onChange={(e) => setNovaSenha2(e.target.value)} placeholder="repita a senha"
              onKeyDown={(e) => e.key === "Enter" && handleConfirmarReset()} style={estiloInput} />
          </div>
          {erro && <div style={{ color: C.bad, fontSize: 13, marginBottom: 12, padding: "8px 12px", background: `${C.bad}18`, borderRadius: 8 }}>{erro}</div>}
          <button onClick={handleConfirmarReset}
            style={{ width: "100%", background: C.accent, color: "#1a1207", border: "none", borderRadius: 9, padding: "12px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit", marginBottom: 10 }}>
            Redefinir senha →
          </button>
          <button onClick={() => { setModo("login"); setErro(""); }} style={{ width: "100%", background: "transparent", border: "none", color: C.sub, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>← Voltar ao login</button>
        </>)}

        {/* ---- TELA DE VERIFICAÇÃO ---- */}
        {modo === "verificar" && (<>
          <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 16, marginBottom: 6 }}>Verificar e-mail</div>
          <div style={{ fontSize: 13, color: C.sub, marginBottom: 20, lineHeight: 1.6 }}>
            {EMAILJS_CONFIGURADO
              ? <>Enviamos um código de 6 dígitos para <b style={{ color: C.ink }}>{pendEmail}</b>. Verifique sua caixa de entrada.</>
              : <>E-mail não configurado. Use o código abaixo para ativar sua conta:<br />
                  <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 24, color: C.accent, letterSpacing: 4 }}>{codigoGerado}</span></>}
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Código de verificação</div>
            <input value={codigo} onChange={(e) => setCodigo(e.target.value)} placeholder="000000" maxLength={6}
              autoFocus onKeyDown={(e) => e.key === "Enter" && handleVerificar()}
              style={{ ...estiloInput, fontSize: 22, letterSpacing: 6, textAlign: "center" }} />
          </div>
          {erro && <div style={{ color: erro.includes("gerado") ? C.good : C.bad, fontSize: 13, marginBottom: 12, padding: "8px 12px", background: erro.includes("gerado") ? `${C.good}18` : `${C.bad}18`, borderRadius: 8 }}>{erro}</div>}
          <button onClick={handleVerificar} disabled={loading}
            style={{ width: "100%", background: C.accent, color: "#1a1207", border: "none", borderRadius: 9, padding: "12px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit", marginBottom: 10 }}>
            Confirmar →
          </button>
          <button onClick={handleReenviar} disabled={loading}
            style={{ width: "100%", background: "transparent", border: `1px solid ${C.line}`, color: C.sub, borderRadius: 9, padding: "9px", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
            {loading ? "Aguarde..." : "↺ Reenviar código"}
          </button>
          <button onClick={() => { setModo("login"); setErro(""); }} style={{ width: "100%", background: "transparent", border: "none", color: C.sub, fontSize: 12, cursor: "pointer", marginTop: 10, fontFamily: "inherit" }}>← Voltar ao login</button>
        </>)}

        {/* ---- LOGIN / CADASTRO ---- */}
        {modo !== "verificar" && modo !== "reset" && modo !== "reset-codigo" && (<>
          <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
            {["login", "cadastro"].map((m) => (
              <button key={m} onClick={() => { setModo(m); setErro(""); setSenha(""); setSenha2(""); }}
                style={{ flex: 1, background: modo === m ? C.accent : "transparent", color: modo === m ? "#1a1207" : C.sub,
                  border: `1px solid ${modo === m ? C.accent : C.line}`, borderRadius: 9, padding: "9px", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                {m === "login" ? "Entrar" : "Criar conta"}
              </button>
            ))}
          </div>

          {modo === "cadastro" && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Nome / Empresa</div>
              <input value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Seu nome ou nome da empresa"
                autoFocus style={estiloInput} />
            </div>
          )}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>E-mail</div>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="seu@email.com"
              autoFocus={modo === "login"} style={estiloInput} />
          </div>
          <div style={{ marginBottom: modo === "cadastro" ? 14 : 20 }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Senha</div>
            <input type="password" value={senha} onChange={(e) => setSenha(e.target.value)} placeholder="••••••"
              onKeyDown={(e) => e.key === "Enter" && modo === "login" && handleLogin()}
              style={estiloInput} />
          </div>
          {modo === "cadastro" && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Confirmar senha</div>
              <input type="password" value={senha2} onChange={(e) => setSenha2(e.target.value)} placeholder="••••••"
                onKeyDown={(e) => e.key === "Enter" && handleCadastro()}
                style={estiloInput} />
            </div>
          )}
          {erro && <div style={{ color: C.bad, fontSize: 13, marginBottom: 14, padding: "8px 12px", background: `${C.bad}18`, borderRadius: 8 }}>{erro}</div>}
          <button onClick={modo === "login" ? handleLogin : handleCadastro} disabled={loading}
            style={{ width: "100%", background: C.accent, color: "#1a1207", border: "none", borderRadius: 9, padding: "12px", fontWeight: 800, fontSize: 14, cursor: loading ? "wait" : "pointer", fontFamily: "inherit" }}>
            {loading ? "Aguarde..." : modo === "login" ? "Entrar →" : "Criar conta →"}
          </button>

          {modo === "login" && (
            <button onClick={() => { setModo("reset"); setErro(""); }}
              style={{ width: "100%", background: "transparent", border: "none", color: C.sub, fontSize: 12, cursor: "pointer", marginTop: 10, fontFamily: "inherit", textDecoration: "underline" }}>
              Esqueci minha senha
            </button>
          )}
          {modo === "cadastro" && (
            <div style={{ marginTop: 16, padding: "12px", background: C.panel2, borderRadius: 10, fontSize: 12, color: C.sub, lineHeight: 1.6 }}>
              📋 Plano <b style={{ color: C.ink }}>Free</b> ao criar. Atualize para <b style={{ color: C.accent }}>Pro</b> ou <b style={{ color: C.accent2 }}>Studio</b> dentro do app.
            </div>
          )}
          <div style={{ marginTop: 16, fontSize: 11, color: C.sub, textAlign: "center", lineHeight: 1.6 }}>
            Dados salvos localmente no navegador · Cada conta é isolada
          </div>
        </>)}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LoginApp />);
</script>
</body>
</html>
