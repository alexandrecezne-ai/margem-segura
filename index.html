// ---------- DASHBOARD (centro de controle) ----------
function Dashboard({ pedidos, fila, produtos, insumos, itensBaixos, go, maquinas, pratos, config }) {
  const [periodo, setPeriodo] = React.useState("mes");
  const PERIODOS = [["hoje","Hoje"],["semana","7 dias"],["mes","Este mês"],["trimestre","3 meses"],["tudo","Tudo"]];

  const totalPed = (p) => (p.itens || []).reduce((a, it) => a + (it.preco || 0) * (it.qtd || 1), 0);

  // Filtrar por período
  const vendasAll = pedidos.filter((p) => p.etapa === "Despachado");
  const vendas = vendasAll.filter((p) => dataNoperiodo(p.data, periodo));
  const receita = vendas.reduce((a, p) => a + totalPed(p), 0);
  const valorEstoque = insumos.reduce((a, i) => a + i.estoque * i.custoUn, 0);
  const margemMedia = produtos.length ? produtos.reduce((a, p) => a + (p.margem || 0), 0) / produtos.length : 0;

  // Métricas de produção (a partir das vendas despachadas)
  let lucroTotal = 0, horasMes = 0;
  const rankMap = {};
  const canaisDash = (config && config.canais && config.canais.length) ? config.canais : CANAIS;
  vendas.forEach((pedido) => {
    const cn = canaisDash.find((c) => c.nome === pedido.canal) || { comissao: 0, pgto: 0, tarifa: 0, ads: 0, seg: 0 };
    const pg = pedido.pagamento && pedido.pagamento.forma ? pedido.pagamento : null;
    const txPgto = taxaPgtoPedido(pg, cn, (config && config.cartao) || {});
    (pedido.itens || []).forEach((item) => {
      const prod = produtos.find((p) => p.sku === item.sku);
      const horas = prod ? (prod.horasImpressao || 0) : 0;
      const qtd = item.qtd || 1;
      const rev = (item.preco || 0) * qtd;
      // lucro real: receita − custo da peça − taxas do canal/forma de pagamento do pedido (mesma lógica da DRE)
      const custoItem = (prod ? (prod.custo || 0) : 0) * qtd;
      const adsPct = prod && prod.usarAds === false ? 0 : (cn.ads || 0);
      const segPct = prod && prod.usarSeg === false ? 0 : (cn.seg || 0);
      const taxaPct = (pg ? 0 : (cn.comissao || 0)) + txPgto + adsPct + segPct + (prod && prod.impostoTaxa != null ? prod.impostoTaxa : 0.06);
      const lucro = rev - custoItem - rev * taxaPct - (pg ? 0 : (cn.tarifa || 0)) * qtd;
      lucroTotal += lucro;
      horasMes += horas * qtd;
      // ranking
      const k = item.sku || item.produto;
      if (!rankMap[k]) rankMap[k] = { sku: k, nome: item.produto || (prod ? prod.nome : k), qtd: 0, receita: 0, lucro: 0, margem: 0, horas: 0 };
      rankMap[k].qtd += qtd;
      rankMap[k].receita += rev;
      rankMap[k].lucro += lucro;
      rankMap[k].horas += horas * qtd;
      rankMap[k].margem = rankMap[k].receita > 0 ? round2((rankMap[k].lucro / rankMap[k].receita) * 100) : 0;
    });
  });
  const ranking = Object.values(rankMap).sort((a, b) => b.receita - a.receita);
  const margemPonderada = receita > 0 ? lucroTotal / receita : 0;
  const lucroHora = horasMes > 0 ? lucroTotal / horasMes : 0;

  // Utilização de máquinas no período
  const diasNoPeriodo = { hoje: 1, semana: 7, mes: new Date().getDate(), trimestre: 90, tudo: 30 }[periodo] || 30;
  const utilMaquinas = (maquinas || []).map((m) => {
    const capHoras = (m.horasDia || 0) * (m.eficiencia || 1) * diasNoPeriodo;
    // Horas usadas = pratos concluídos desta máquina no período
    const horasUsadas = (pratos || []).filter((p) => p.status === "concluido" && p.maquinaId === m.id && dataNoperiodo(p.criadoEm, periodo))
      .reduce((a, p) => a + (p.horasTotal || 0), 0);
    const util = capHoras > 0 ? horasUsadas / capHoras : 0;
    return { ...m, capHoras, horasUsadas, util };
  });

  // Sugestões (sempre da operação atual, sem filtro de período)
  const sugestoes = [];
  if (fila.aguardando.length) sugestoes.push({ t: `${fila.aguardando.length} pedido(s) parado(s) por falta de insumo`, go: "estoque", c: C.bad });
  if (fila.produzir.length) sugestoes.push({ t: `${fila.produzir.length} pedido(s) aguardando produção`, go: "pedidos", c: C.warn });
  if (fila.embalar.length) sugestoes.push({ t: `${fila.embalar.length} pedido(s) prontos para embalar`, go: "pedidos", c: C.accent2 });
  if (itensBaixos) sugestoes.push({ t: `${itensBaixos} insumo(s) abaixo do mínimo — repor`, go: "estoque", c: C.bad });
  const semMargem = produtos.filter((p) => (p.margem || 0) < 15);
  if (semMargem.length) sugestoes.push({ t: `${semMargem.length} produto(s) com margem < 15% — revisar`, go: "catalogo", c: C.warn });
  if (!sugestoes.length) sugestoes.push({ t: "Operação saudável — tudo em dia ✓", go: "dashboard", c: C.good });

  return (
    <div>
      {/* Cabeçalho + Filtro de período */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 24, letterSpacing: -0.4 }}>Dashboard</div>
          <div style={{ color: C.sub, fontSize: 14 }}>Centro de controle da operação</div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {PERIODOS.map(([id, label]) => (
            <button key={id} onClick={() => setPeriodo(id)}
              style={{ background: periodo === id ? C.accent : C.panel2, color: periodo === id ? "#1a1207" : C.sub, border: `1px solid ${periodo === id ? C.accent : C.line}`, padding: "6px 14px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* KPIs — financeiro */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 14 }}>
        <KPI label="Receita despachada" value={brl(receita)} c={C.good} />
        <KPI label="Lucro estimado" value={brl(lucroTotal)} c={lucroTotal > 0 ? C.good : C.bad} />
        <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, cursor: "pointer" }} onClick={() => go("catalogo")}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 2 }}>Margem ponderada pelas vendas</div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: margemPonderada > 0.15 ? C.good : C.warn }}>{pct(margemPonderada)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>catálogo: {margemMedia.toFixed(1)}% média simples</div>
        </div>
      </div>

      {/* KPIs — produção */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 14, marginBottom: 18 }}>
        <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 2 }}>Horas de impressão</div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: C.blue }}>{horasMes.toFixed(1)}h</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>nos pedidos despachados no período</div>
        </div>
        <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 2 }}>Lucro / hora de impressão</div>
          <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: lucroHora > 25 ? C.good : lucroHora > 10 ? C.warn : lucroHora > 0 ? C.bad : C.sub }}>
            {horasMes > 0 ? `${brl(lucroHora)}/h` : "—"}
          </div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>{horasMes > 0 ? `${brl(lucroTotal)} ÷ ${horasMes.toFixed(1)}h` : "Sem vendas no período"}</div>
        </div>
      </div>

      {/* Linha 2: Esteira + Sugestões */}
      <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 14, marginBottom: 14 }}>
        <Card title="Esteira de pedidos (operação atual)">
          <Esteira fila={fila} />
          <div style={{ marginTop: 14 }}>
            {pedidos.filter((p) => p.etapa !== "Despachado").slice(0, 5).map((p) => (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.line}` }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{p.id} · {brl(totalPed(p))}</div>
                  <div style={{ fontSize: 11, color: C.sub }}>{p.cliente} · {p.data || "—"}</div>
                </div>
                <EtapaTag e={p.etapa} />
              </div>
            ))}
          </div>
        </Card>
        <Card title="Alertas e sugestões">
          {sugestoes.map((s, i) => (
            <div key={i} onClick={() => go(s.go)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", marginBottom: 8, background: C.panel2, borderRadius: 10, cursor: "pointer", borderLeft: `3px solid ${s.c}` }}>
              <span style={{ fontSize: 13 }}>{s.t}</span>
            </div>
          ))}
          <div style={{ marginTop: 8, paddingTop: 10, borderTop: `1px solid ${C.line}`, fontSize: 12, color: C.sub }}>
            Estoque insumos: <b style={{ color: C.ink }}>{brl(valorEstoque)}</b>
          </div>
        </Card>
      </div>

      {/* Utilização das máquinas */}
      {utilMaquinas.length > 0 && (
        <Card style={{ marginBottom: 14 }}>
          <Label>Utilização das máquinas — {PERIODOS.find(([id]) => id === periodo)?.[1]}</Label>
          <div style={{ display: "grid", gap: 12 }}>
            {utilMaquinas.map((m) => {
              const cor = m.util > 0.9 ? C.bad : m.util > 0.7 ? C.warn : m.util > 0.3 ? C.good : C.blue;
              return (
                <div key={m.id}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 4 }}>
                    <span style={{ fontWeight: 600, fontSize: 13 }}>🖨 {m.nome} <span style={{ color: C.sub, fontWeight: 400, fontSize: 11 }}>{m.tipo}</span></span>
                    <div style={{ display: "flex", gap: 16, fontSize: 12, color: C.sub }}>
                      <span>Usado: <b style={{ color: C.ink }}>{m.horasUsadas.toFixed(1)}h</b></span>
                      <span>Disponível: <b style={{ color: C.ink }}>{m.capHoras.toFixed(1)}h</b></span>
                      <span style={{ fontFamily: "Sora", fontWeight: 800, color: cor }}>{pct(m.util)}</span>
                    </div>
                  </div>
                  <div style={{ height: 10, background: C.bg, borderRadius: 6, overflow: "hidden", position: "relative" }}>
                    <div style={{ width: `${Math.min(100, m.util * 100)}%`, height: "100%", background: cor, borderRadius: 6, transition: "width 0.4s" }} />
                  </div>
                  <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>
                    {m.util === 0 ? "Nenhum prato concluído no período" : m.util > 0.9 ? "Máquina sobrecarregada" : m.util > 0.7 ? "Alta utilização" : m.util > 0.3 ? "Utilização saudável" : "Capacidade ociosa"}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Ranking */}
      <Card title={`Ranking de produtos — ${PERIODOS.find(([id]) => id === periodo)?.[1]}`}>
        {ranking.length === 0 && <div style={{ color: C.sub, fontSize: 13, padding: "12px 0" }}>Nenhum pedido despachado no período selecionado.</div>}
        {ranking.length > 0 && (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ color: C.sub, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.8, textAlign: "left" }}>
                  <th style={{ padding: "6px 8px", width: 32 }}>#</th>
                  <th style={{ padding: "6px 8px" }}>Produto</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>Qtd</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>Faturamento</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>Lucro est.</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>Margem</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>H. impres.</th>
                  <th style={{ padding: "6px 8px", textAlign: "right" }}>Lucro/h</th>
                  <th style={{ padding: "6px 8px" }}>Participação</th>
                </tr>
              </thead>
              <tbody>
                {ranking.map((item, idx) => {
                  const share = receita > 0 ? item.receita / receita : 0;
                  const lh = item.horas > 0 ? item.lucro / item.horas : null;
                  const corM = (item.margem || 0) < 15 ? C.bad : (item.margem || 0) < 25 ? C.warn : C.good;
                  const med = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `${idx + 1}`;
                  return (
                    <tr key={item.sku} style={{ borderTop: `1px solid ${C.line}`, background: idx === 0 ? `${C.accent}0a` : "transparent" }}>
                      <td style={{ padding: "10px 8px", fontFamily: "Sora", fontWeight: 800 }}>{med}</td>
                      <td style={{ padding: "10px 8px" }}><div style={{ fontWeight: 600 }}>{item.nome}</div><div style={{ fontSize: 11, color: C.sub }}>{item.sku}</div></td>
                      <td style={{ padding: "10px 8px", textAlign: "right", fontWeight: 700 }}>{item.qtd}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: C.good, fontWeight: 700 }}>{brl(item.receita)}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: item.lucro >= 0 ? C.good : C.bad }}>{brl(item.lucro)}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right" }}><span style={{ fontWeight: 700, color: corM }}>{(item.margem || 0).toFixed(1)}%</span></td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: C.sub }}>{item.horas.toFixed(1)}h</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: lh != null ? (lh > 25 ? C.good : lh > 10 ? C.warn : C.bad) : C.sub }}>{lh != null ? `${brl(lh)}/h` : "—"}</td>
                      <td style={{ padding: "10px 8px", minWidth: 110 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          <div style={{ flex: 1, height: 6, background: C.bg, borderRadius: 4, overflow: "hidden" }}>
                            <div style={{ width: `${share * 100}%`, height: "100%", background: C.accent, borderRadius: 4 }} />
                          </div>
                          <span style={{ fontSize: 11, color: C.sub, minWidth: 30, textAlign: "right" }}>{pct(share)}</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{ borderTop: `2px solid ${C.line}`, fontWeight: 700, fontSize: 13 }}>
                  <td colSpan={2} style={{ padding: "10px 8px", color: C.sub, fontSize: 12 }}>TOTAL</td>
                  <td style={{ padding: "10px 8px", textAlign: "right" }}>{ranking.reduce((a, i) => a + i.qtd, 0)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", color: C.good }}>{brl(receita)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", color: lucroTotal >= 0 ? C.good : C.bad }}>{brl(lucroTotal)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", color: margemPonderada > 0.15 ? C.good : C.warn }}>{pct(margemPonderada)}</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", color: C.sub }}>{horasMes.toFixed(1)}h</td>
                  <td style={{ padding: "10px 8px", textAlign: "right", color: lucroHora > 25 ? C.good : C.warn }}>{horasMes > 0 ? `${brl(lucroHora)}/h` : "—"}</td>
                  <td />
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

function Esteira({ fila }) {
  const etapas = [
    { k: "Aguardando", n: fila.aguardando.length, c: C.bad },
    { k: "Produzir", n: fila.produzir.length, c: C.warn },
    { k: "Embalar", n: fila.embalar.length, c: C.accent2 },
    { k: "Despachado", n: fila.despachado.length, c: C.good },
  ];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      {etapas.map((e, i) => (
        <React.Fragment key={e.k}>
          <div style={{ flex: 1, background: C.panel2, borderRadius: 10, padding: "12px 10px", textAlign: "center", borderTop: `3px solid ${e.c}` }}>
            <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: e.c }}>{e.n}</div>
            <div style={{ fontSize: 11, color: C.sub }}>{e.k}</div>
          </div>
          {i < etapas.length - 1 && <span style={{ color: C.sub, fontSize: 16 }}>→</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ---------- 1 · PRECIFICAR (wizard de 6 etapas) ----------
function Calculadora({ input, set, setInput, r, insumos, maquinas, config, salvarNoCatalogo, gerarOrcamento, go }) {
  const [etapa, setEtapa] = React.useState(0);
  const statusColor = r.status === "Saudável" ? C.good : r.status === "Apertado" ? C.warn : C.bad;
  const passos = ["Identificação", "Material", "Operacional", "Mão de obra", "Acessórios", "Despacho", "Resumo"];
  const acessInsumo = insumos.filter((i) => i.cat === "Acessório");
  const embInsumo = insumos.filter((i) => i.cat === "Embalagem");
  // cores disponíveis no estoque para o tipo de material selecionado
  const coresMaterial = insumos.filter((i) => (i.cat === "Filamento" || i.cat === "Resina") && i.material === input.matTipo && i.cor);

  // helpers de lista (acessórios / despacho)
  const addItem = (campo, item) => setInput((s) => ({ ...s, [campo]: [...(s[campo] || []), item] }));
  const updItem = (campo, idx, patch) => setInput((s) => ({ ...s, [campo]: s[campo].map((x, i) => i === idx ? { ...x, ...patch } : x) }));
  const delItem = (campo, idx) => setInput((s) => ({ ...s, [campo]: s[campo].filter((_, i) => i !== idx) }));

  return (
    <div>
      <H title="1 · Precificar produto" sub="Monte o custo de produção passo a passo" />
      {/* progresso */}
      <div style={{ display: "flex", gap: 4, marginBottom: 18, flexWrap: "wrap" }}>
        {passos.map((p, i) => (
          <button key={p} onClick={() => setEtapa(i)} style={{ flex: 1, minWidth: 90, background: i === etapa ? C.accent : i < etapa ? C.panel2 : C.panel,
            color: i === etapa ? "#1a1207" : i < etapa ? C.ink : C.sub, border: `1px solid ${i === etapa ? C.accent : C.line}`,
            borderRadius: 8, padding: "8px 6px", fontSize: 11.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {i < 6 ? `${i + 1}. ` : ""}{p}
          </button>
        ))}
      </div>

      <div className="grid-wizard" style={{ display: "grid", gridTemplateColumns: "1.15fr 0.85fr", gap: 18 }}>
        <Card>
          {/* ---- 1 IDENTIFICAÇÃO ---- */}
          {etapa === 0 && (<>
            <ST n="1" t="Identificação do produto" />
            <F label="Descrição do produto" text value={input.nome} onChange={(v) => set("nome", v)} />
            <Hint>O SKU é gerado automaticamente quando você salvar no catálogo (a partir da descrição). O canal de venda e o preço são definidos no resumo, ao final.</Hint>
          </>)}

          {/* ---- 2 MATERIAL ---- */}
          {etapa === 1 && (<>
            <ST n="2" t="Custo de material" />
            <Sel label="Tipo de material" value={input.matTipo} onChange={(v) => {
              const m = MATERIAIS.find((x) => x.tipo === v);
              set("matTipo", v); if (m && input.matFonte !== "estoque") set("custoMaterial", m.refUn);
            }} options={MATERIAIS.map((m) => m.tipo)} />
            <Fonte value={input.matFonte} onChange={(v) => set("matFonte", v)}
              opcoes={[["estoque", "Custo médio do estoque"], ["manual", "Informar custo manual"]]} />
            {input.matFonte === "estoque" ? (
              <div style={{ padding: "10px 12px", borderRadius: 10, background: C.panel2, marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: C.sub }}>Custo médio de {input.matTipo} no estoque</div>
                <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: C.accent }}>{brl(r.custoMatUn)} <span style={{ fontSize: 12, color: C.sub, fontWeight: 400 }}>/ g</span></div>
                <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>Média ponderada por estoque de todas as cores/variações de {input.matTipo}.</div>
              </div>
            ) : (
              <F label="Custo por grama (R$/g)" value={input.custoMaterial} step={0.001} onChange={(v) => set("custoMaterial", v)} suffix="R$" />
            )}
            <Row>
              <F label={input.coresAtivo ? "Peso total (soma das cores)" : "Peso da peça (g)"} value={input.coresAtivo ? round2(r.pesoPeca) : input.consumo}
                onChange={(v) => set("consumo", v)} />
              <F label="Perdas/suporte (g)" value={input.perdas} onChange={(v) => set("perdas", v)} />
            </Row>
            <Hint>Custo de material = (peso + perdas) × custo por grama. Atual: <b>{brl(r.custoMaterial)}</b></Hint>

            <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 10, background: C.panel2 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 14 }}>
                <input type="checkbox" checked={input.coresAtivo} onChange={(e) => set("coresAtivo", e.target.checked)} /> Cadastrar peso por cor (opcional)
              </label>
              {input.coresAtivo && (<div style={{ marginTop: 10 }}>
                {(input.cores || []).map((c, idx) => (
                  <div key={idx} className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.4fr 0.9fr auto", gap: 10, marginBottom: 8, alignItems: "end" }}>
                    <label style={{ display: "block" }}>
                      <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Cor</div>
                      <select value={c.cor} onChange={(e) => updItem("cores", idx, { cor: e.target.value })}
                        style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
                        <option value="">— selecione —</option>
                        {coresMaterial.map((i) => <option key={i.id} value={i.cor}>{i.cor}</option>)}
                      </select>
                    </label>
                    <F label="Peso (g)" value={c.peso} onChange={(v) => updItem("cores", idx, { peso: v })} />
                    <div style={{ paddingBottom: 8 }}><MiniBtn onClick={() => delItem("cores", idx)}>✕</MiniBtn></div>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                  <Btn small ghost onClick={() => addItem("cores", { cor: coresMaterial[0] ? coresMaterial[0].cor : "", peso: input.consumo })}>＋ Adicionar cor</Btn>
                  <span style={{ fontSize: 13, color: C.sub }}>Peso total: <b style={{ color: C.ink }}>{round2(r.pesoPeca)} g</b></span>
                </div>
                {!coresMaterial.length && <Hint>Nenhuma cor de {input.matTipo} cadastrada nos insumos. <a onClick={() => go("estoque")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar insumo →</a></Hint>}
                <Hint>O peso da peça passa a ser a soma das cores. A cor não muda o preço — preço único por produto.</Hint>
              </div>)}
            </div>
          </>)}

          {/* ---- 3 OPERACIONAL ---- */}
          {etapa === 2 && (<>
            <ST n="3" t="Custo operacional (energia + depreciação + manutenção)" />
            <Fonte value={input.opMode} onChange={(v) => set("opMode", v)}
              opcoes={[["maquina", "Máquina específica"], ["medio", "Custo médio das máquinas"], ["manual", "Valor manual"]]} />
            {input.opMode === "maquina" && (
              maquinas.length ? <Sel label="Máquina" value={input.maquinaId} onChange={(v) => set("maquinaId", v)} options={maquinas.map((m) => m.id)} />
                : <Hint>Nenhuma máquina cadastrada. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar máquinas →</a></Hint>
            )}
            {input.opMode === "medio" && (
              maquinas.length
                ? <Hint>Usando a <b>média do custo/hora</b> de {maquinas.length} máquina(s): <b style={{ color: C.accent }}>{brl(avg(maquinas.map((m) => custoHoraMaquina(m))))}/h</b>.</Hint>
                : <Hint>Nenhuma máquina cadastrada para calcular a média. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Cadastrar →</a></Hint>
            )}
            {input.opMode === "manual" && <F label="Custo operacional manual (por peça)" value={input.opManual} step={0.1} onChange={(v) => set("opManual", v)} suffix="R$" />}
            <F label="Tempo de impressão (h)" value={input.horasImpressao} step={0.5} onChange={(v) => set("horasImpressao", v)} />
            {input.opMode !== "manual" && <Hint>Energia + depreciação (valor ÷ vida útil) + manutenção, multiplicados pelas horas. <a onClick={() => go("maquinas")} style={{ color: C.accent, cursor: "pointer" }}>Editar máquinas →</a></Hint>}
            <Hint>Custo operacional atual: <b>{brl(r.custoOperacional)}</b></Hint>
          </>)}

          {/* ---- 4 MÃO DE OBRA ---- */}
          {etapa === 3 && (<>
            <ST n="4" t="Custo de mão de obra" />
            <Fonte value={input.moMode} onChange={(v) => set("moMode", v)}
              opcoes={[["tempo", "Por tempo de trabalho"], ["manual", "Valor manual"], ["nao", "Não considerar"]]} />
            {input.moMode === "tempo" && (<>
              <F label="Custo da hora de trabalho (R$/h)" value={input.moHora} step={1} onChange={(v) => set("moHora", v)} suffix="R$" />
              {config && Math.abs((input.moHora || 0) - custoHoraEfetivo(config)) > 0.005 && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: -6, marginBottom: 10 }}>
                  <span style={{ fontSize: 12, color: C.sub }}>Configurações: <b style={{ color: C.accent2 }}>{brl(custoHoraEfetivo(config))}/h</b>{config.moModo === "salario" ? " (derivado do salário)" : ""}</span>
                  <button onClick={() => set("moHora", round2(custoHoraEfetivo(config)))} style={{ background: C.panel2, border: `1px solid ${C.line}`, color: C.ink, borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Aplicar</button>
                </div>
              )}
              <Row><F label="Setup (min)" value={input.setup} onChange={(v) => set("setup", v)} /><F label="Retirada (min)" value={input.retirada} onChange={(v) => set("retirada", v)} /></Row>
              <Row><F label="Acabamento (min)" value={input.acabamento} onChange={(v) => set("acabamento", v)} /><F label="Embalar (min)" value={input.embalagemMin} onChange={(v) => set("embalagemMin", v)} /></Row>
            </>)}
            {input.moMode === "manual" && <F label="Custo de mão de obra manual" value={input.moManual} step={0.5} onChange={(v) => set("moManual", v)} suffix="R$" />}
            {input.moMode === "nao" && <Hint>Mão de obra não será considerada no custo.</Hint>}
            <Hint>Mão de obra atual: <b>{brl(r.custoMaoObra)}</b></Hint>
          </>)}

          {/* ---- 5 ACESSÓRIOS ---- */}
          {etapa === 4 && (<>
            <ST n="5" t="Custo de acessórios" />
            <Hint>Argola, rabicho, barbante… Adicione quantos precisar, do estoque ou manual.</Hint>
            {(input.acessorios || []).map((a, idx) => (
              <ItemLinha key={idx} item={a} insumosLista={acessInsumo} tipoLabel="acessório"
                onChange={(patch) => updItem("acessorios", idx, patch)} onDel={() => delItem("acessorios", idx)} />
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn small ghost onClick={() => addItem("acessorios", { fonte: "estoque", insumoId: acessInsumo[0] ? acessInsumo[0].id : "", qtd: 1, custoManual: 0 })}>＋ Acessório do estoque</Btn>
              <Btn small ghost onClick={() => addItem("acessorios", { fonte: "manual", insumoId: "", descManual: "", qtd: 1, custoManual: 1 })}>＋ Acessório manual</Btn>
            </div>
            <Hint>Total de acessórios: <b>{brl(r.custoAcessorios)}</b></Hint>
          </>)}

          {/* ---- 6 DESPACHO ---- */}
          {etapa === 5 && (<>
            <ST n="6" t="Custo de despacho" />
            <Hint>Caixa, saco, sacola, proteção… Do estoque ou manual.</Hint>
            {(input.despacho || []).map((d, idx) => (
              <ItemLinha key={idx} item={d} insumosLista={embInsumo} tipoLabel="embalagem"
                onChange={(patch) => updItem("despacho", idx, patch)} onDel={() => delItem("despacho", idx)} />
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn small ghost onClick={() => addItem("despacho", { fonte: "estoque", insumoId: embInsumo[0] ? embInsumo[0].id : "", qtd: 1, custoManual: 0 })}>＋ Embalagem do estoque</Btn>
              <Btn small ghost onClick={() => addItem("despacho", { fonte: "manual", insumoId: "", descManual: "", qtd: 1, custoManual: 1 })}>＋ Item manual</Btn>
            </div>
            <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 10, background: C.panel2 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 14 }}>
                <input type="checkbox" checked={input.brindeAtivo} onChange={(e) => set("brindeAtivo", e.target.checked)} /> Incluir brinde
              </label>
              {input.brindeAtivo && <div style={{ marginTop: 8 }}><F label="Valor do brinde" value={input.brindeValor} step={0.1} onChange={(v) => set("brindeValor", v)} suffix="R$" /></div>}
            </div>
            <Hint>Total de despacho: <b>{brl(r.custoDespacho)}</b></Hint>
          </>)}

          {/* ---- RESUMO ---- */}
          {etapa === 6 && (<>
            <ST n="✓" t="Resumo e definição de preço" />
            <Label>Custo de produção</Label>
            <LinhaCusto k="Material" v={r.custoMaterial} />
            <LinhaCusto k="Operacional" v={r.custoOperacional} />
            <LinhaCusto k="Mão de obra" v={r.custoMaoObra} />
            <LinhaCusto k="Acessórios" v={r.custoAcessorios} />
            <div style={{ borderTop: `1px solid ${C.line}`, margin: "8px 0", paddingTop: 8 }}>
              <LinhaCusto k={`Subtotal + falhas (${pct(input.taxaFalhas)})`} v={r.custoProducao} bold />
            </div>
            <LinhaCusto k="Despacho (logística)" v={r.custoLogistico} />
            <div style={{ borderTop: `2px solid ${C.accent}`, margin: "8px 0", paddingTop: 8 }}>
              <LinhaCusto k="CUSTO DE PRODUÇÃO DA PEÇA" v={r.custoTotalPeca} big />
            </div>
            <Row><F label="Taxa de falhas (0–1)" value={input.taxaFalhas} step={0.01} onChange={(v) => set("taxaFalhas", v)} /><div /></Row>

            <div style={{ marginTop: 18 }}><Label>Meta de lucro líquido</Label></div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              {["rs","pct"].map((m) => (
                <button key={m} onClick={() => { set("lucroAlvoModo", m); set("lucroAlvoValor", m === "rs" ? (config && config.lucroAlvoRS != null ? config.lucroAlvoRS : 15) : 0.20); }}
                  style={{ flex: 1, background: input.lucroAlvoModo === m ? C.accent : C.panel2, color: input.lucroAlvoModo === m ? "#1a1207" : C.sub,
                    border: `1px solid ${input.lucroAlvoModo === m ? C.accent : C.line}`, borderRadius: 8, padding: "7px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                  {m === "rs" ? "R$ fixo por peça" : "% de margem"}
                </button>
              ))}
            </div>
            <F label={input.lucroAlvoModo === "rs" ? "Lucro mínimo desejado por peça (R$)" : "Margem de lucro desejada (ex: 0.25 = 25%)"}
              value={input.lucroAlvoValor} step={input.lucroAlvoModo === "rs" ? 0.5 : 0.01}
              onChange={(v) => set("lucroAlvoValor", v)} />
            <Hint>
              {input.lucroAlvoModo === "rs"
                ? <>Preço "Saudável" = cobre todos os custos + <b style={{color:C.accent}}>{brl(input.lucroAlvoValor)}</b> de lucro líquido por peça.</>
                : <>Preço "Saudável" garante margem líquida de <b style={{color:C.accent}}>{pct(input.lucroAlvoValor)}</b> sobre o preço de venda.</>}
            </Hint>

            <div style={{ marginTop: 18 }}><Label>Imposto praticado</Label></div>
            <Row>
              <Sel label="Regime tributário" value={input.impostoRegime} onChange={(v) => {
                const reg = IMPOSTOS.find((x) => x.regime === v);
                set("impostoRegime", v);
                if (reg && v !== "Personalizado") set("impostoTaxa", reg.taxa);
              }} options={IMPOSTOS.map((i) => i.regime)} />
              <F label="Alíquota sobre a venda" value={input.impostoTaxa}
                step={0.005} onChange={(v) => { set("impostoTaxa", v); set("impostoRegime", "Personalizado"); }} suffix="(0–1)" />
            </Row>
            <Hint>Imposto = {pct(r.taxaImposto)} sobre o preço de venda. Afeta todos os cenários de preço abaixo.</Hint>

            <div style={{ marginTop: 18 }}><Label>Componentes opcionais</Label></div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <Toggle ativo={input.usarAds} onClick={() => set("usarAds", !input.usarAds)}
                titulo="Ads / Marketing" desc={`${pct(r.canal.ads)} do preço`} />
              <Toggle ativo={input.usarSeg} onClick={() => set("usarSeg", !input.usarSeg)}
                titulo="Reserva de segurança" desc={`${pct(r.canal.seg)} do preço`} />
            </div>
            <Hint>Desligar um componente o remove do cálculo de preço e da distribuição.</Hint>

            <div style={{ marginTop: 18 }}><Label>Cenário de preços por canal</Label></div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ color: C.sub, fontSize: 11, textAlign: "left", textTransform: "uppercase" }}>
                  <th style={{ padding: "6px 8px" }}>Canal</th><th style={{ padding: "6px 8px" }}>Mínimo</th>
                  <th style={{ padding: "6px 8px" }}>Saudável</th><th style={{ padding: "6px 8px" }}>Premium</th><th style={{ padding: "6px 8px" }}></th></tr></thead>
                <tbody>
                  {r.cenarios.map((c) => (
                    <tr key={c.nome} style={{ borderTop: `1px solid ${C.line}`, background: c.nome === r.canalRef ? C.panel2 : "transparent" }}>
                      <td style={{ padding: "9px 8px", fontWeight: 600 }}>{c.nome}</td>
                      <td style={{ padding: "9px 8px", color: C.sub }}>{brl(c.precoMinimo)}</td>
                      <td style={{ padding: "9px 8px", color: C.accent, fontWeight: 700 }}>{brl(c.precoSaudavel)}</td>
                      <td style={{ padding: "9px 8px" }}>{brl(c.precoPremium)}</td>
                      <td style={{ padding: "9px 8px" }}>
                        <button onClick={() => { set("canalRef", c.nome); set("precoPraticado", round2(c.precoSaudavel)); }}
                          style={{ background: c.nome === r.canalRef ? C.accent : "transparent", color: c.nome === r.canalRef ? "#1a1207" : C.sub,
                            border: `1px solid ${c.nome === r.canalRef ? C.accent : C.line}`, padding: "4px 10px", borderRadius: 7, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                          {c.nome === r.canalRef ? "Selecionado" : "Usar"}</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ marginTop: 12 }}>
              <button onClick={() => {
                if (!input.showCanaisConfig && !input.canaisCustom) set("canaisCustom", JSON.parse(JSON.stringify((config && config.canais && config.canais.length) ? config.canais : CANAIS)));
                set("showCanaisConfig", !input.showCanaisConfig);
              }} style={{ background: "transparent", border: `1px solid ${C.line}`, color: C.sub, padding: "6px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                ⚙ {input.showCanaisConfig ? "Ocultar" : "Personalizar taxas dos canais"}
              </button>
              {input.canaisCustom && <button onClick={() => { set("canaisCustom", null); set("showCanaisConfig", false); }}
                style={{ marginLeft: 8, background: "transparent", border: `1px solid ${C.bad}`, color: C.bad, padding: "6px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                ↺ Restaurar padrão
              </button>}
            </div>

            {input.showCanaisConfig && input.canaisCustom && (
              <div style={{ marginTop: 12, overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead><tr style={{ color: C.sub, fontSize: 10, textTransform: "uppercase", textAlign: "left" }}>
                    <th style={{ padding: "6px 6px" }}>Canal</th>
                    <th style={{ padding: "6px 6px" }}>Comissão</th>
                    <th style={{ padding: "6px 6px" }}>Pgto</th>
                    <th style={{ padding: "6px 6px" }}>Ads</th>
                    <th style={{ padding: "6px 6px" }}>Tarifa R$</th>
                    <th style={{ padding: "6px 6px" }}>Frete R$</th>
                    <th style={{ padding: "6px 6px" }}>Reserva</th>
                  </tr></thead>
                  <tbody>
                    {input.canaisCustom.map((c, idx) => {
                      const upd = (campo, val) => {
                        const novo = input.canaisCustom.map((x, i) => i === idx ? { ...x, [campo]: val } : x);
                        set("canaisCustom", novo);
                      };
                      const inp = (campo, val) => (
                        <input type="text" inputMode="decimal" defaultValue={String(val).replace(".",",")}
                          onBlur={(e) => { const n = parseFloat(e.target.value.replace(",",".")); if (!isNaN(n)) upd(campo, n); }}
                          style={{ width: 64, background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "4px 6px", borderRadius: 6, fontSize: 12, fontFamily: "inherit", textAlign: "right" }} />
                      );
                      return (
                        <tr key={c.nome} style={{ borderTop: `1px solid ${C.line}` }}>
                          <td style={{ padding: "6px 6px", fontWeight: 600 }}>{c.nome}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("comissao", c.comissao)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("pgto", c.pgto)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("ads", c.ads)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("tarifa", c.tarifa)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("frete", c.frete)}</td>
                          <td style={{ padding: "6px 6px" }}>{inp("seg", c.seg)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <Hint>Valores decimais: comissão 16% = 0.16 · Tarifa e Frete em R$ · Clique fora do campo para aplicar.</Hint>
              </div>
            )}

            <div style={{ marginTop: 16, padding: "14px", borderRadius: 12, background: C.panel2 }}>
              <Label>Preço que será praticado — {r.canalRef}</Label>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 6 }}>Preço de venda (R$) — digite livremente e pressione Enter ou clique fora para aplicar</div>
              <PrecoLivreInput value={input.precoPraticado || round2(r.precoSaudavel)} onChange={(v) => set("precoPraticado", v)} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 8, flexWrap: "wrap", gap: 6 }}>
                <span style={{ color: C.sub }}>Lucro líquido: <b style={{ color: r.lucroPraticado >= 0 ? C.good : C.bad }}>{brl(r.lucroPraticado)}</b>
                  {" · "}{pct(r.margemAtual)}
                  {input.lucroAlvoModo === "rs" && r.lucroPraticado < input.lucroAlvoValor &&
                    <span style={{ color: C.warn, marginLeft: 6 }}>(meta: {brl(input.lucroAlvoValor)})</span>}
                  {input.lucroAlvoModo === "pct" && r.margemAtual < input.lucroAlvoValor &&
                    <span style={{ color: C.warn, marginLeft: 6 }}>(meta: {pct(input.lucroAlvoValor)})</span>}
                </span>
                <span style={{ fontWeight: 700, color: statusColor }}>{r.status}</span>
              </div>

              {/* Lucro por hora de produção */}
              {input.horasImpressao > 0 && (() => {
                const lucroHora = r.lucroPraticado / input.horasImpressao;
                const cor = lucroHora <= 0 ? C.bad : lucroHora < input.moHora ? C.warn : C.good;
                const aviso = lucroHora <= 0 ? "Prejuízo por hora" : lucroHora < input.moHora ? "Abaixo da sua hora trabalhada" : "Acima da hora trabalhada ✓";
                return (
                  <div style={{ marginTop: 12, padding: "12px 14px", borderRadius: 10, background: C.bg, border: `1px solid ${cor}44`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <div style={{ fontSize: 11, color: C.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8 }}>Lucro líquido por hora de máquina</div>
                      <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>{brl(r.lucroPraticado)} ÷ {input.horasImpressao}h de impressão</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: cor }}>{brl(lucroHora)}<span style={{ fontSize: 13, fontWeight: 400 }}>/h</span></div>
                      <div style={{ fontSize: 11, color: cor }}>{aviso}</div>
                    </div>
                  </div>
                );
              })()}
            </div>

            <div style={{ marginTop: 18 }}><Label>Distribuição do preço praticado</Label></div>
            <Distribuicao r={r} />
          </>)}

          {/* navegação */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 8 }}>
            <Btn ghost disabled={etapa === 0} onClick={() => setEtapa((e) => Math.max(0, e - 1))}>← Voltar</Btn>
            {etapa < 6 ? <Btn onClick={() => setEtapa((e) => Math.min(6, e + 1))}>Próximo →</Btn>
              : <span style={{ fontSize: 12, color: C.sub, alignSelf: "center" }}>Pronto! Salve no catálogo ao lado →</span>}
          </div>
        </Card>

        {/* painel lateral fixo */}
        <div>
          <Card style={{ marginBottom: 16 }}>
            <Label>Custo de produção</Label>
            <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 30, color: C.accent }}>{brl(r.custoTotalPeca)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>saída desta etapa</div>
            <div style={{ marginTop: 14 }}>
              <Bar label="Material" v={r.custoMaterial} total={r.custoTotalPeca} c={C.accent} fmt={brl} />
              <Bar label="Operacional" v={r.custoOperacional} total={r.custoTotalPeca} c={C.blue} fmt={brl} />
              <Bar label="Mão de obra" v={r.custoMaoObra} total={r.custoTotalPeca} c={C.accent2} fmt={brl} />
              <Bar label="Acessórios" v={r.custoAcessorios} total={r.custoTotalPeca} c={C.purple} fmt={brl} />
              <Bar label="Despacho" v={r.custoLogistico} total={r.custoTotalPeca} c={C.pink} fmt={brl} />
            </div>
          </Card>
          <Card>
            <Label>Preço · {r.canalRef}</Label>
            <PriceRow label="Mínimo" value={r.precoMinimo} sub="cobre custos" />
            <PriceRow label="Saudável" value={r.precoSaudavel} sub={`+ ${brl(CFG.lucroAlvoRS)} lucro`} big accent />
            <PriceRow label="Premium" value={r.precoPremium} sub={`+${pct(CFG.markupPremium)}`} />
            <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10, background: C.panel2, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 12, color: C.sub }}>Praticado: {brl(r.precoPraticado)}</span>
              <span style={{ fontWeight: 700, color: statusColor, fontSize: 13 }}>{r.status} · {pct(r.margemAtual)}</span>
            </div>
            {input.horasImpressao > 0 && (() => {
              const lh = r.lucroPraticado / input.horasImpressao;
              const cor = lh <= 0 ? C.bad : lh < (input.moHora || 25) ? C.warn : C.good;
              return (
                <div style={{ marginTop: 10, padding: "10px 12px", borderRadius: 10, background: C.bg, border: `1px solid ${cor}55` }}>
                  <div style={{ fontSize: 11, color: C.sub }}>Lucro / hora de máquina</div>
                  <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 20, color: cor, marginTop: 2 }}>
                    {brl(lh)}<span style={{ fontSize: 12, fontWeight: 400, color: C.sub }}>/h</span>
                  </div>
                  <div style={{ fontSize: 10, color: C.sub, marginTop: 1 }}>{brl(r.lucroPraticado)} ÷ {input.horasImpressao}h</div>
                </div>
              );
            })()}
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <Btn onClick={salvarNoCatalogo} full>＋ Salvar no catálogo</Btn>
              <Btn onClick={gerarOrcamento} ghost full>✎ Orçamento</Btn>
            </div>
            {etapa < 6 && <Hint>Defina o canal e o preço praticado no passo "Resumo".</Hint>}
          </Card>
        </div>
      </div>
    </div>
  );
}

// Linha de item (acessório/despacho) com fonte estoque/manual
function ItemLinha({ item, insumosLista, onChange, onDel, tipoLabel }) {
  const insSel = item.fonte === "estoque" ? insumosLista.find((i) => i.id === item.insumoId) : null;
  const custoUn = item.fonte === "estoque" ? (insSel ? insSel.custoUn : 0) : (item.custoManual || 0);
  const subtotal = custoUn * (item.qtd || 0);
  return (
    <div style={{ background: C.panel2, borderRadius: 10, padding: 12, marginBottom: 8 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
        <select value={item.fonte} onChange={(e) => onChange({ fonte: e.target.value })}
          style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "6px 8px", borderRadius: 8, fontSize: 12, fontFamily: "inherit" }}>
          <option value="estoque">Do estoque</option><option value="manual">Manual</option>
        </select>
        <span style={{ fontSize: 11, color: C.sub }}>{tipoLabel}</span>
        <div style={{ marginLeft: "auto" }}><MiniBtn onClick={onDel}>✕</MiniBtn></div>
      </div>
      <div className="grid-item" style={{ display: "grid", gridTemplateColumns: "1.6fr 0.9fr 0.7fr", gap: 10 }}>
        {/* Descrição */}
        {item.fonte === "estoque" ? (
          <label style={{ display: "block" }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Descrição</div>
            <select value={item.insumoId} onChange={(e) => onChange({ insumoId: e.target.value })}
              style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontFamily: "inherit" }}>
              {insumosLista.length ? insumosLista.map((i) => <option key={i.id} value={i.id}>{i.nome}</option>) : <option value="">— sem itens no estoque —</option>}
            </select>
          </label>
        ) : (
          <F label="Descrição" text value={item.descManual || ""} onChange={(v) => onChange({ descManual: v })} />
        )}
        {/* Custo unitário */}
        {item.fonte === "estoque" ? (
          <label style={{ display: "block" }}>
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>Custo unitário</div>
            <div style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.sub, padding: "8px 10px", borderRadius: 8, fontSize: 14 }}>{brl(custoUn)}</div>
          </label>
        ) : (
          <F label="Custo unitário" value={item.custoManual} step={0.1} onChange={(v) => onChange({ custoManual: v })} suffix="R$" />
        )}
        {/* Quantidade */}
        <F label="Qtd" value={item.qtd} onChange={(v) => onChange({ qtd: v })} />
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", fontSize: 12, color: C.sub, marginTop: 6 }}>
        Subtotal: <b style={{ color: C.ink, marginLeft: 6 }}>{brl(subtotal)}</b>
      </div>
    </div>
  );
}
function Fonte({ value, onChange, opcoes }) {
  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
      {opcoes.map(([v, label]) => (
        <button key={v} onClick={() => onChange(v)} style={{ flex: 1, minWidth: 110, background: value === v ? C.accent : C.panel2,
          color: value === v ? "#1a1207" : C.sub, border: `1px solid ${value === v ? C.accent : C.line}`, borderRadius: 8,
          padding: "8px 6px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{label}</button>
      ))}

}
function Toggle({ ativo, onClick, titulo, desc }) {

    <button onClick={onClick} style={{ flex: 1, minWidth: 150, textAlign: "left", display: "flex", alignItems: "center", gap: 10,
      background: ativo ? "rgba(255,107,53,.10)" : C.panel2, border: `1px solid ${ativo ? C.accent : C.line}`,

}
function Hint({ children }) { return <div style={{ fontSize: 12, color: C.sub, marginTop: 8, lineHeight: 1.5 }}>{children}</div>; }
function LinhaCusto({ k, v, bold, big }) {
  return <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: big ? 15 : 14 }}>
    <span style={{ color: big ? C.ink : C.sub, fontWeight: big || bold ? 700 : 400, fontFamily: big ? "Sora" : "inherit" }}>{k}</span>
    <span style={{ fontWeight: big || bold ? 800 : 600, color: big ? C.accent : C.ink, fontFamily: big ? "Sora" : "inherit" }}>{brl(v)}</span></div>;
}

// Distribuição (anatomia) do preço praticado: custos, taxas, receita/lucro
function Distribuicao({ r }) {
  const preco = r.precoPraticado || 0;
  const d = r.distrib;
  const itens = [
    { k: "Custo de produção", v: d.custoProducaoPeca, c: C.accent },
    { k: "Despacho", v: d.despacho, c: C.pink },
    { k: "Tarifa fixa + frete", v: d.tarifaFixa, c: "#c084fc" },
    { k: "Comissão do canal", v: d.comissao, c: C.blue },
    { k: "Taxa de pagamento", v: d.pagamento, c: "#38bdf8" },
    ...(d.usarAds ? [{ k: "Ads / marketing", v: d.ads, c: "#fb923c" }] : []),
    { k: `Imposto (${pct(r.taxaImposto)})`, v: d.imposto, c: C.warn },
    ...(d.usarSeg ? [{ k: "Reserva/segurança", v: d.seguranca, c: "#94a3b8" }] : []),
    { k: "Lucro líquido", v: d.lucro, c: d.lucro >= 0 ? C.good : C.bad },
  ];
  const pctDe = (v) => preco ? `${(v / preco * 100).toFixed(1)}%` : "0%";
  return (
    <div>
      {/* barra empilhada */}
      <div style={{ display: "flex", height: 26, borderRadius: 8, overflow: "hidden", marginBottom: 12, border: `1px solid ${C.line}` }}>
        {itens.filter((i) => i.v > 0).map((i, idx) => (
          <div key={idx} title={`${i.k}: ${pctDe(i.v)}`} style={{ width: `${preco ? Math.max(0, i.v / preco * 100) : 0}%`, background: i.c }} />
        ))}
      </div>
      {/* tabela */}
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <tbody>
          {itens.map((i, idx) => (
            <tr key={idx} style={{ borderTop: idx ? `1px solid ${C.line}` : "none" }}>
              <td style={{ padding: "7px 4px" }}>
                <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 3, background: i.c, marginRight: 8 }} />
                <span style={{ color: i.k.startsWith("Lucro") ? C.ink : C.sub, fontWeight: i.k.startsWith("Lucro") ? 700 : 400 }}>{i.k}</span>
              </td>
              <td style={{ padding: "7px 4px", textAlign: "right", color: C.sub }}>{pctDe(i.v)}</td>
              <td style={{ padding: "7px 4px", textAlign: "right", fontWeight: 600, color: i.k.startsWith("Lucro") ? (i.v >= 0 ? C.good : C.bad) : C.ink }}>{brl(i.v)}</td>
            </tr>
          ))}
          <tr style={{ borderTop: `2px solid ${C.accent}` }}>
            <td style={{ padding: "8px 4px", fontWeight: 800, fontFamily: "Sora" }}>Preço de venda</td>
            <td style={{ padding: "8px 4px", textAlign: "right", color: C.sub }}>100%</td>
            <td style={{ padding: "8px 4px", textAlign: "right", fontWeight: 800, fontFamily: "Sora", color: C.accent }}>{brl(preco)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

// ---------- MÁQUINAS (cadastro) ----------
function Maquinas({ maquinas, setMaquinas, config }) {
  const upd = (id, patch) => setMaquinas((arr) => arr.map((m) => m.id === id ? { ...m, ...patch } : m));
  const add = () => setMaquinas((arr) => [...arr, { id: "MAQ-" + (arr.length + 1) + "-" + Date.now().toString().slice(-4), nome: "Nova máquina", tipo: "FDM", potenciaKw: 0.1, valor: 1500, vidaUtilH: 4000, manutHora: 0.15, tarifaEnergia: (config && config.tarifaEnergia != null ? config.tarifaEnergia : 0.9), horasDia: 16, diasMes: 22, eficiencia: 0.85 }]);
  const del = (id) => setMaquinas((arr) => arr.filter((m) => m.id !== id));
  // resumo da frota
  const custoHoraMedio = avg(maquinas.map((m) => custoHoraMaquina(m)));
  const custoHoraMin = maquinas.length ? Math.min(...maquinas.map((m) => custoHoraMaquina(m))) : 0;
  const custoHoraMax = maquinas.length ? Math.max(...maquinas.map((m) => custoHoraMaquina(m))) : 0;
  const capTotal = maquinas.reduce((a, m) => a + (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0), 0);
  return (
    <div>
      <H title="Máquinas" sub="Cadastro único: alimenta o custo operacional da precificação e a capacidade de produção" />

      {/* RESUMO DA FROTA */}
      <div className="grid-kpi" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 14 }}>
        <KPI label="Máquinas cadastradas" value={`${maquinas.length}`} c={C.ink} />
        <KPI label="Custo médio por hora" value={brl(custoHoraMedio)} c={C.accent} />
        <KPI label="Faixa de custo/hora" value={`${brl(custoHoraMin)}–${brl(custoHoraMax)}`} c={C.sub} />
        <KPI label="Capacidade total" value={`${Math.round(capTotal)} h/mês`} c={C.blue} />
      </div>
      <div style={{ marginBottom: 14, fontSize: 12, color: C.sub }}>
        O custo operacional "médio" da precificação usa <b style={{ color: C.ink }}>{brl(custoHoraMedio)}/h</b> — a média do custo/hora de todas as máquinas.
      </div>

      <div style={{ marginBottom: 14 }}><Btn onClick={add}>＋ Cadastrar máquina</Btn></div>
      <div style={{ display: "grid", gap: 12 }}>
        {maquinas.map((m) => {
          const capMes = (m.horasDia || 0) * (m.diasMes || 0) * (m.eficiencia || 0);
          return (
          <Card key={m.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8 }}>
              <input value={m.nome} onChange={(e) => upd(m.id, { nome: e.target.value })}
                style={{ background: "transparent", border: "none", color: C.ink, fontWeight: 700, fontSize: 16, fontFamily: "Sora", flex: 1, minWidth: 0 }} />
              <select value={m.tipo || "FDM"} onChange={(e) => upd(m.id, { tipo: e.target.value })}
                style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.sub, padding: "4px 8px", borderRadius: 6, fontSize: 12, fontFamily: "inherit" }}>
                <option>FDM</option><option>Resina</option></select>
              <MiniBtn onClick={() => del(m.id)}>✕</MiniBtn>
            </div>
            <Label>Custo operacional</Label>
            <div className="grid-maq" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10 }}>
              <F label="Potência (kW)" value={m.potenciaKw} step={0.01} onChange={(v) => upd(m.id, { potenciaKw: v })} />
              <F label="Valor (R$)" value={m.valor} step={50} onChange={(v) => upd(m.id, { valor: v })} />
              <F label="Vida útil (h)" value={m.vidaUtilH} step={100} onChange={(v) => upd(m.id, { vidaUtilH: v })} />
              <F label="Manut. (R$/h)" value={m.manutHora} step={0.01} onChange={(v) => upd(m.id, { manutHora: v })} />
              <F label="Energia (R$/kWh)" value={m.tarifaEnergia} step={0.05} onChange={(v) => upd(m.id, { tarifaEnergia: v })} />
            </div>
            <div style={{ marginTop: 6 }}><Label>Capacidade de produção</Label></div>
            <div className="grid-maq" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10 }}>
              <F label="Horas/dia" value={m.horasDia} step={1} onChange={(v) => upd(m.id, { horasDia: v })} />
              <F label="Dias/mês" value={m.diasMes} step={1} onChange={(v) => upd(m.id, { diasMes: v })} />
              <F label="Eficiência (0–1)" value={m.eficiencia} step={0.01} onChange={(v) => upd(m.id, { eficiencia: v })} />
              <div style={{ gridColumn: "span 2", alignSelf: "end", fontSize: 12, color: C.sub, paddingBottom: 12 }}>
                Capacidade útil: <b style={{ color: C.ink }}>{Math.round(capMes)} h/mês</b>
              </div>
            </div>
            <Hint>Custo/hora desta máquina: <b>{brl(custoHoraMaquina(m))}</b> (energia + depreciação + manutenção).</Hint>
          </Card>
        ); })}
      </div>
    </div>
  );
}

const STATUS_PRATO = { planejado: { label: "Planejado", cor: C.blue }, imprimindo: { label: "Imprimindo", cor: C.warn }, concluido: { label: "Concluído", cor: C.good } };

function ProducaoAvulsa({ prodAvulsa, setProdAvulsa, maquinas }) {

      </Card>

function novoPratoId(pratos) { return `PR-${String((pratos || []).length + 1).padStart(3, "0")}-${Date.now().toString(36).slice(-3).toUpperCase()}`; }

  const [maqId, setMaqId] = React.useState(maquinas[0] ? maquinas[0].id : "");
  const [qtds, setQtds] = React.useState(() => {
    const m = {};
    itensDisp.forEach((it) => { m[`${it.pedidoId}_${it.sku}_${it.cor}`] = it.qtdSel || it.qtd; });
    return m;
  });

  const horasTotal = itensDisp.reduce((a, it) => a + (it.horasImpressao || 0) * (Number(qtds[chave(it)]) || 0), 0);

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 20 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 28, maxWidth: 580, width: "100%", maxHeight: "90vh", overflowY: "auto" }}>

            style={{ width: "100%", background: C.bg, border: `1px solid ${C.line}`, color: C.ink, padding: "9px 10px", borderRadius: 8, fontSize: 14, fontFamily: "inherit" }}>
            <option value="">— Sem máquina definida —</option>
            {maquinas.map((m) => <option key={m.id} value={m.id}>{m.nome} ({m.tipo})</option>)}

        </label>

        <div style={{ fontSize: 11, color: C.sub, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Peças neste prato</div>
        {itensDisp.map((it) => {
          const k = chave(it);
          const q = Number(qtds[k]) || 0;

                <span style={{ minWidth: 32, textAlign: "center", fontWeight: 700 }}>{q}</span>

              </div>
            </div>
          );
        })}

        <div style={{ marginTop: 16, padding: "12px 14px", background: C.panel2, borderRadius: 10, display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: 13, color: C.sub }}>Estimativa de impressão</span>

            onSave({ maqId, itens, horasTotal });
